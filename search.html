方法二：直接检查逐层坐标 1layoutCompactByLevels :: Tree a -&gt; Tree (a, (Int, Int)) 2layoutCompactByLevels tree = normalize (build tree) 3 where 4 build Empty = Empty 5 build (Branch value left right) = 6 Branch (value, (0, 1)) 7 (shiftLayout (-distance) 1 leftLayout) 8 (shiftLayout distance 1 rightLayout) 9 where 10 leftLayout = build left 11 rightLayout = build right 12 distance = head 13 [d | d &lt;- [1..], levelsSeparated d leftLayout rightLayout] 14 15 normalize Empty = Empty 16 normalize layout = 17 shiftLayout (1 - minimum (map fst (positions layout))) 0 layout 18 19levelsSeparated :: Int -&gt; Tree (a, (Int, Int)) -&gt; Tree (a, (Int, Int)) -&gt; Bool 20levelsSeparated distance left right = and 21 [maximum leftLevel - distance &lt; minimum rightLevel + distance 22 | (leftLevel, rightLevel) &lt;- zip (levels left) (levels right)] 23 24levels :: Tree (a, (Int, Int)) -&gt; [[Int]] 25levels tree = takeWhile (not . null) [atDepth depth tree | depth &lt;- [1..]] 26 where 27 atDepth _ Empty = [] 28 atDepth target (Branch (_, (x, y)) left right) 29 | target == y = [x] 30 | otherwise = atDepth target left ++ atDepth target right 31 32positions :: Tree (a, (Int, Int)) -&gt; [(Int, Int)] 33positions Empty = [] 34positions (Branch (_, position) left right) = 35 position : positions left ++ positions right 36 37shiftLayout :: Int -&gt; Int -&gt; Tree (a, (Int, Int)) -&gt; Tree (a, (Int, Int)) 38shiftLayout _ _ Empty = Empty 39shiftLayout dx dy (Branch (value, (x, y)) left right) = 40 Branch (value, (x + dx, y + dy)) 41 (shiftLayout dx dy left) 42 (shiftLayout dx dy right) 这个版本不建立专门的轮廓类型，而是先生成带相对坐标的子树，再逐层读取实际横坐标并测试安全距离。代码更直观，但重复扫描子树，效率低于方法一。
方法对比 方法 中间数据 特点 相对坐标 + 轮廓 每层左右边界 合并高效，推荐 直接检查逐层坐标 完整坐标树 容易理解，重复遍历较多 测试 1&gt;&gt;&gt; layoutCompact (Branch &#39;a&#39; (Branch &#39;b&#39; Empty (leaf &#39;c&#39;)) (leaf &#39;d&#39;)) 2Branch (&#39;a&#39;,(2,1)) (Branch (&#39;b&#39;,(1,2)) Empty (Branch (&#39;c&#39;,(2,3)) Empty Empty)) (Branch (&#39;d&#39;,(3,2)) Empty Empty) 3&gt;&gt;&gt; positions (layoutCompactByLevels (Branch &#39;a&#39; (leaf &#39;b&#39;) (leaf &#39;c&#39;))) 4[(2,1),(1,2),(3,2)] 参考 官方文档 Haskell 99 题学习路线 `,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p66.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p67.html":{title:"P67 - 二叉树的括号字符串表示",tags:["Haskell","99题","二叉树"],content:`P67 - 二叉树的括号字符串表示 A string representation of binary trees
官方模块：Problems.P67　核心函数：treeToString、stringToTree
← P66 紧凑布局 | P68 遍历序列重建 →
编码规则 叶子只写字符；非叶节点写成 根(左,右)；空子树写为空串。例如 a(b(d,e),c(,f(g,)))。
实现 方法一：手写递归下降 1treeToString :: Tree Char -&gt; String 2treeToString Empty = &#34;&#34; 3treeToString (Branch c Empty Empty) = [c] 4treeToString (Branch c left right) = 5 c : &#39;(&#39; : treeToString left ++ &#34;,&#34; ++ treeToString right ++ &#34;)&#34; 6 7stringToTree :: String -&gt; Maybe (Tree Char) 8stringToTree &#34;&#34; = Just Empty 9stringToTree input = do 10 (tree, rest) &lt;- parseTree input 11 if null rest then Just tree else Nothing 12 13parseTree :: String -&gt; Maybe (Tree Char, String) 14parseTree [] = Nothing 15parseTree (c:&#39;(&#39;:rest) = do 16 (left, afterLeft) &lt;- parseOptional rest 17 (right, afterRight) &lt;- case afterLeft of 18 &#39;,&#39;:xs -&gt; parseOptional xs 19 _ -&gt; Nothing 20 case afterRight of 21 &#39;)&#39;:xs -&gt; Just (Branch c left right, xs) 22 _ -&gt; Nothing 23parseTree (c:rest) = Just (leaf c, rest) 24 25parseOptional :: String -&gt; Maybe (Tree Char, String) 26parseOptional input@(&#39;,&#39;:_) = Just (Empty, input) 27parseOptional input@(&#39;)&#39;:_) = Just (Empty, input) 28parseOptional input = parseTree input 编码直接跟随树结构，解析器则显式返回尚未消费的字符串。
方法二：差异列表 + ReadP 1import Text.ParserCombinators.ReadP 2 3treeToStringDL :: Tree Char -&gt; String 4treeToStringDL tree = build tree &#34;&#34; 5 where 6 build Empty = id 7 build (Branch c Empty Empty) = (c :) 8 build (Branch c left right) = 9 (c :) . (&#39;(&#39; :) . build left . (&#39;,&#39; :) . build right . (&#39;)&#39; :) 10 11stringToTreeReadP :: String -&gt; Maybe (Tree Char) 12stringToTreeReadP input = case 13 [tree | (tree, &#34;&#34;) &lt;- readP_to_S (treeParser &lt;* eof) input] of 14 [] -&gt; Nothing 15 trees -&gt; Just (last trees) 16 17treeParser :: ReadP (Tree Char) 18treeParser = do 19 c &lt;- satisfy (\`notElem\` &#34;(),&#34;) 20 (do 21 char &#39;(&#39; 22 left &lt;- optionalTree &#39;,&#39; 23 char &#39;,&#39; 24 right &lt;- optionalTree &#39;)&#39; 25 char &#39;)&#39; 26 pure (Branch c left right)) 27 &lt;++ pure (leaf c) 28 29optionalTree :: Char -&gt; ReadP (Tree Char) 30optionalTree delimiter = do 31 remaining &lt;- look 32 if not (null remaining) &amp;&amp; head remaining == delimiter 33 then pure Empty 34 else treeParser 差异列表版本通过函数组合构造字符串，不反复复制左侧前缀；ReadP 版本则把分隔符、选择和输入结束检查交给标准解析组合子。
方法对比 方法 编码 解码 手写递归 直接使用 ++ 显式传递剩余输入 差异列表 + ReadP 函数组合 标准解析组合子 测试 1&gt;&gt;&gt; treeToString tree1 2&#34;a(b(d,e),c(,f(g,)))&#34; 3&gt;&gt;&gt; stringToTree (treeToString tree1) == Just tree1 4True 5&gt;&gt;&gt; stringToTree &#34;a(b,c&#34; 6Nothing 7&gt;&gt;&gt; treeToStringDL tree1 == treeToString tree1 8True 9&gt;&gt;&gt; stringToTreeReadP (treeToString tree1) == Just tree1 10True 解析函数同时返回未消费后缀，顶层只接受后缀为空的结果，从而拒绝尾随垃圾字符。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p67.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p68.html":{title:"P68 - 根据中序和前序序列重建二叉树",tags:["Haskell","99题","二叉树"],content:`P68 - 根据中序和前序序列重建二叉树 In-order and pre-order sequences of binary trees
官方模块：Problems.P68　核心函数：inorder、preorder、ordersToTree
← P67 括号字符串表示 | P69 点串表示 →
遍历 1inorder :: Tree a -&gt; [a] 2inorder Empty = [] 3inorder (Branch x left right) = inorder left ++ [x] ++ inorder right 4 5preorder :: Tree a -&gt; [a] 6preorder Empty = [] 7preorder (Branch x left right) = [x] ++ preorder left ++ preorder right 重建思路 前序首元素是根。在中序序列中找到根，其左侧长度就是左子树节点数；据此切分剩余前序序列，再递归重建两侧。题目约定节点值互不相同。
方法一：列表切分 1ordersToTree :: Eq a =&gt; [a] -&gt; [a] -&gt; Maybe (Tree a) 2ordersToTree [] [] = Just Empty 3ordersToTree inorderValues (root:preorderValues) = do 4 let (leftIn, rest) = break (== root) inorderValues 5 rightIn &lt;- case rest of 6 _:xs -&gt; Just xs 7 [] -&gt; Nothing 8 let (leftPre, rightPre) = splitAt (length leftIn) preorderValues 9 left &lt;- ordersToTree leftIn leftPre 10 right &lt;- ordersToTree rightIn rightPre 11 pure (Branch root left right) 12ordersToTree _ _ = Nothing 方法二：中序位置索引 1import qualified Data.Map.Strict as Map 2 3ordersToTreeFast :: Ord a =&gt; [a] -&gt; [a] -&gt; Maybe (Tree a) 4ordersToTreeFast inorderValues preorderValues 5 | length inorderValues /= length preorderValues = Nothing 6 | Map.size positions /= length inorderValues = Nothing 7 | otherwise = do 8 (tree, rest) &lt;- build 0 (length inorderValues - 1) preorderValues 9 if null rest then Just tree else Nothing 10 where 11 positions = Map.fromList (zip inorderValues [0..]) 12 13 build low high remaining 14 | low &gt; high = Just (Empty, remaining) 15 build low high (root:rest) = do 16 position &lt;- Map.lookup root positions 17 if position &lt; low || position &gt; high 18 then Nothing 19 else do 20 (left, afterLeft) &lt;- build low (position - 1) rest 21 (right, afterRight) &lt;- build (position + 1) high afterLeft 22 pure (Branch root left right, afterRight) 23 build _ _ [] = Nothing 中序值到位置的 Map 让每次根节点定位从线性查找降为 O(log⁡n)O(\\log n)O(logn)，同时用上下界表示子序列，避免重复执行 break 和 splitAt。
方法对比 方法 根位置查找 最坏复杂度 列表切分 break 线性扫描 O(n²) 位置索引 Map.lookup O(n log n) 测试 1&gt;&gt;&gt; inorder tree1 2&#34;dbeacgf&#34; 3&gt;&gt;&gt; preorder tree1 4&#34;abdecfg&#34; 5&gt;&gt;&gt; ordersToTree (inorder tree1) (preorder tree1) == Just tree1 6True 7&gt;&gt;&gt; ordersToTree &#34;ab&#34; &#34;a&#34; 8Nothing 9&gt;&gt;&gt; ordersToTreeFast (inorder tree1) (preorder tree1) == Just tree1 10True 若把 Map 换成适合节点编号的数组，中序位置查找还可以进一步降为 O(1)O(1)O(1)，使整体达到 O(n)O(n)O(n)。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p68.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p69.html":{title:"P69 - 二叉树的点串表示",tags:["Haskell","99题","二叉树"],content:`P69 - 二叉树的点串表示 Dotstring representation of binary trees
官方模块：Problems.P69　核心函数：treeToDotstring、dotstringToTree
← P68 遍历序列重建 | P70 多路树节点串 →
编码规则 按前序遍历输出节点字符，空树输出 .。因为每个非空节点必有两个子树，这种编码不需要括号和分隔符也能唯一解析。
实现 方法一：递归下降 1treeToDotstring :: Tree Char -&gt; String 2treeToDotstring Empty = &#34;.&#34; 3treeToDotstring (Branch x left right) = 4 x : treeToDotstring left ++ treeToDotstring right 5 6dotstringToTree :: String -&gt; Maybe (Tree Char) 7dotstringToTree input = do 8 (tree, rest) &lt;- parseDotstring input 9 if null rest then Just tree else Nothing 10 11parseDotstring :: String -&gt; Maybe (Tree Char, String) 12parseDotstring [] = Nothing 13parseDotstring (&#39;.&#39;:rest) = Just (Empty, rest) 14parseDotstring (x:rest) = do 15 (left, afterLeft) &lt;- parseDotstring rest 16 (right, afterRight) &lt;- parseDotstring afterLeft 17 pure (Branch x left right, afterRight) 方法二：反向扫描栈 1import Control.Monad (foldM) 2 3dotstringToTreeStack :: String -&gt; Maybe (Tree Char) 4dotstringToTreeStack input = do 5 stack &lt;- foldM step [] (reverse input) 6 case stack of 7 [tree] -&gt; Just tree 8 _ -&gt; Nothing 9 where 10 step stack &#39;.&#39; = Just (Empty : stack) 11 step (left:right:rest) value = 12 Just (Branch value left right : rest) 13 step _ _ = Nothing 14 15treeToDotstringDL :: Tree Char -&gt; String 16treeToDotstringDL tree = build tree &#34;&#34; 17 where 18 build Empty = (&#39;.&#39; :) 19 build (Branch value left right) = 20 (value :) . build left . build right 把点串反向读取时，两个子树一定先于根出现。. 把空树压栈，普通字符弹出左右两棵子树并组成新树；最终栈必须恰好只剩一棵树。
方法对比 方法 解码状态 编码构造 递归下降 未消费字符串 ++ 拼接 反向扫描 显式树栈 差异列表 测试 1&gt;&gt;&gt; treeToDotstring tree1 2&#34;abd..e..c.fg...&#34; 3&gt;&gt;&gt; dotstringToTree (treeToDotstring tree1) == Just tree1 4True 5&gt;&gt;&gt; dotstringToTree &#34;a.&#34; 6Nothing 7&gt;&gt;&gt; dotstringToTreeStack (treeToDotstring tree1) == Just tree1 8True 9&gt;&gt;&gt; treeToDotstringDL tree1 == treeToDotstring tree1 10True 编码长度恰为 2n+12n+12n+1：nnn 个节点字符，加上 n+1n+1n+1 个空子树标记。编码和解析都是 O(n)O(n)O(n)。

官方模块：Problems.P70　核心函数：stringToMultitree、multitreeToString
← P69 点串表示 | P71 内部路径长度 →
数据结构与编码 多路树不能为空，每个节点保存任意数量的子树。深度优先输出节点字符，每次回退到父节点时输出 ^，包括从根退出。
1data MultiwayTree a = MultiwayTree a [MultiwayTree a] 2 deriving (Eq, Show) 3 4multitreeToString :: MultiwayTree Char -&gt; String 5multitreeToString (MultiwayTree x children) = 6 x : concatMap multitreeToString children ++ &#34;^&#34; 解析 方法一：递归下降 1stringToMultitree :: String -&gt; Maybe (MultiwayTree Char) 2stringToMultitree input = do 3 (tree, rest) &lt;- parseNode input 4 if null rest then Just tree else Nothing 5 6parseNode :: String -&gt; Maybe (MultiwayTree Char, String) 7parseNode [] = Nothing 8parseNode (&#39;^&#39;:_) = Nothing 9parseNode (x:rest) = do 10 (children, remaining) &lt;- parseChildren rest 11 pure (MultiwayTree x children, remaining) 12 13parseChildren :: String -&gt; Maybe ([MultiwayTree Char], String) 14parseChildren [] = Nothing 15parseChildren (&#39;^&#39;:rest) = Just ([], rest) 16parseChildren input = do 17 (child, afterChild) &lt;- parseNode input 18 (siblings, rest) &lt;- parseChildren afterChild 19 pure (child : siblings, rest) 方法二：显式节点栈 1import Control.Monad (foldM) 2 3stringToMultitreeStack :: String -&gt; Maybe (MultiwayTree Char) 4stringToMultitreeStack input = do 5 (frames, result) &lt;- foldM step ([], Nothing) input 6 case (frames, result) of 7 ([], Just tree) -&gt; Just tree 8 _ -&gt; Nothing 9 where 10 step (_, Just _) _ = Nothing 11 step (frames, Nothing) &#39;^&#39; = close frames 12 step (frames, Nothing) value = 13 Just ((value, []) : frames, Nothing) 14 15 close [] = Nothing 16 close [(value, reversedChildren)] = 17 Just ([], Just (MultiwayTree value (reverse reversedChildren))) 18 close ((value, reversedChildren):(parent, siblings):rest) = 19 let child = MultiwayTree value (reverse reversedChildren) 20 in Just ((parent, child : siblings) : rest, Nothing) 21 22multitreeToStringDL :: MultiwayTree Char -&gt; String 23multitreeToStringDL tree = build tree &#34;&#34; 24 where 25 build (MultiwayTree value children) = 26 (value :) . foldr ((.) . build) id children . (&#39;^&#39; :) 普通字符把新节点框架压栈，^ 关闭栈顶节点并把它接到父节点。根节点关闭后不得再出现字符。编码的差异列表版本同样只用函数组合追加内容。
方法对比 方法 解析结构 特点 递归下降 调用栈对应树层级 与文法直接对应 显式节点栈 框架保存尚未关闭的节点 单次 fold，状态清晰 测试 1&gt;&gt;&gt; multitreeToString multitree5 2&#34;afg^^c^bd^e^^^&#34; 3&gt;&gt;&gt; stringToMultitree &#34;afg^^c^bd^e^^^&#34; == Just multitree5 4True 5&gt;&gt;&gt; stringToMultitree &#34;a^junk&#34; 6Nothing 7&gt;&gt;&gt; stringToMultitreeStack (multitreeToString multitree5) == Just multitree5 8True 9&gt;&gt;&gt; multitreeToStringDL multitree5 == multitreeToString multitree5 10True 编码和解析都线性访问字符串，时间复杂度 O(n)O(n)O(n)。

官方模块：Problems.P71　核心函数：internalPathLength
← P70 多路树节点串 | P72 后序遍历 →
题目描述 内部路径长度定义为根到每个节点的路径长度之和。根深度为 0，根的孩子深度为 1。
实现 方法一：深度优先递归 1internalPathLength :: MultiwayTree a -&gt; Int 2internalPathLength = go 0 3 where 4 go depth (MultiwayTree _ children) = 5 depth + sum (map (go (depth + 1)) children) 深度作为只读上下文向下传递，当前节点贡献自己的深度，再汇总全部孩子。
方法二：累计子树大小 1internalPathLength :: MultiwayTree a -&gt; Int 2internalPathLength tree = snd (measure tree) 3 where 4 measure (MultiwayTree _ children) = 5 (1 + sum childSizes, sum (zipWith (+) childSizes childPaths)) 6 where 7 measuredChildren = map measure children 8 childSizes = map fst measuredChildren 9 childPaths = map snd measuredChildren 每条“父节点到孩子”的边会被孩子子树中的所有节点经过，因此这条边对路径长度总和的贡献等于孩子子树大小。measure 同时返回节点数和内部路径长度，不需要显式传递深度。
方法对比 方法 关键状态 深度优先 从根向下传递当前深度 累计子树大小 从孩子向上返回规模和路径和 测试 1&gt;&gt;&gt; internalPathLength multitree1 20 3&gt;&gt;&gt; internalPathLength multitree5 49 5&gt;&gt;&gt; internalPathLength (MultiwayTree &#39;a&#39; [MultiwayTree &#39;b&#39; []]) 61 每个节点访问一次，时间复杂度 O(n)O(n)O(n)，递归栈深度为树高 O(h)O(h)O(h)。

官方模块：Problems.P72　核心函数：postOrderSequence
← P71 内部路径长度 | P73 S 表达式 →
思路与实现 多路树的后序遍历先依次遍历所有孩子，最后访问根节点。
方法一：concatMap 递归 1postOrderSequence :: MultiwayTree a -&gt; [a] 2postOrderSequence (MultiwayTree x children) = 3 concatMap postOrderSequence children ++ [x] 方法二：累加参数（差异列表） 1postOrderSequence :: MultiwayTree a -&gt; [a] 2postOrderSequence tree = gather tree [] 3 where 4 gather (MultiwayTree x children) tail = 5 foldr gather (x : tail) children gather tree tail 把“遍历结果后面要接的列表”作为参数传入。foldr 保持孩子从左到右的顺序，根节点 x 则放在所有孩子之后。整个过程只使用 (:)，不会反复复制左侧列表。
方法对比 方法 构造方式 复杂度 concatMap 递归 子树结果通过 ++ 拼接 偏斜结构可能重复复制 累加参数 直接把结果接到尾参数前 O(n) 测试 1&gt;&gt;&gt; postOrderSequence multitree5 2&#34;gfcdeba&#34; 3&gt;&gt;&gt; postOrderSequence (MultiwayTree 1 []) 4[1] 参考 官方文档 Haskell 99 题学习路线 ← P71 内部路径长度 | P73 S 表达式 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p72.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p73.html":{title:"P73 - 多路树的 S 表达式表示",tags:["Haskell","99题","多路树"],content:`P73 - 多路树的 S 表达式表示 Multiway tree representation with S-expressions
官方模块：Problems.P73　核心函数：treeToSexp、sexpToTree
← P72 后序遍历 | P74 不用 do 的 IO →
编码规则 叶子直接写字符；有孩子的节点写成 (根 子树1 子树2 ...)。
方法一：递归下降 1treeToSexp :: MultiwayTree Char -&gt; String 2treeToSexp (MultiwayTree x []) = [x] 3treeToSexp (MultiwayTree x children) = 4 &#34;(&#34; ++ [x] ++ &#34; &#34; ++ unwords (map treeToSexp children) ++ &#34;)&#34; 递归下降解析 1sexpToTree :: String -&gt; Maybe (MultiwayTree Char) 2sexpToTree input = do 3 (tree, rest) &lt;- parse (dropWhile (== &#39; &#39;) input) 4 if null (dropWhile (== &#39; &#39;) rest) then Just tree else Nothing 5 6parse :: String -&gt; Maybe (MultiwayTree Char, String) 7parse [] = Nothing 8parse (&#39;(&#39;:rest) = do 9 (root, afterRoot) &lt;- nextChar rest 10 (children, remaining) &lt;- parseList afterRoot 11 pure (MultiwayTree root children, remaining) 12parse (&#39;)&#39;:_) = Nothing 13parse (x:rest) = Just (MultiwayTree x [], rest) 14 15nextChar input = case dropWhile (== &#39; &#39;) input of 16 x:rest | x /= &#39;(&#39; &amp;&amp; x /= &#39;)&#39; -&gt; Just (x, rest) 17 _ -&gt; Nothing 18 19parseList input = case dropWhile (== &#39; &#39;) input of 20 &#39;)&#39;:rest -&gt; Just ([], rest) 21 [] -&gt; Nothing 22 xs -&gt; do 23 (child, afterChild) &lt;- parse xs 24 (siblings, rest) &lt;- parseList afterChild 25 pure (child : siblings, rest) 方法二：ReadP 解析组合子 1import Text.ParserCombinators.ReadP 2 3sexpToTreeReadP :: String -&gt; Maybe (MultiwayTree Char) 4sexpToTreeReadP input = case 5 [tree | (tree, &#34;&#34;) &lt;- readP_to_S (skipSpaces *&gt; treeP &lt;* skipSpaces &lt;* eof) input] of 6 [] -&gt; Nothing 7 trees -&gt; Just (last trees) 8 where 9 treeP = branchP &lt;++ leafP 10 11 leafP = MultiwayTree &lt;$&gt; nodeChar &lt;*&gt; pure [] 12 13 branchP = do 14 char &#39;(&#39; 15 skipSpaces 16 root &lt;- nodeChar 17 children &lt;- many (skipSpaces *&gt; treeP) 18 skipSpaces 19 char &#39;)&#39; 20 pure (MultiwayTree root children) 21 22 nodeChar = satisfy (\\c -&gt; c /= &#39;(&#39; &amp;&amp; c /= &#39;)&#39; &amp;&amp; c /= &#39; &#39;) 23 24treeToSexpDL :: MultiwayTree Char -&gt; String 25treeToSexpDL tree = build tree &#34;&#34; 26 where 27 build (MultiwayTree value []) = (value :) 28 build (MultiwayTree value children) = 29 (&#39;(&#39; :) . (value :) . foldr addChild id children . (&#39;)&#39; :) 30 addChild child rest = (&#39; &#39; :) . build child . rest ReadP 用组合子直接描述“叶子或括号分支”的文法；差异列表编码避免多层 ++。它与方法一显式管理剩余字符串的方式形成对照。
方法对比 方法 空白和分支处理 手写递归下降 显式 dropWhile 和剩余字符串 ReadP skipSpaces、many 和选择组合子 测试 1&gt;&gt;&gt; treeToSexp multitree5 2&#34;(a (f g) c (b d e))&#34; 3&gt;&gt;&gt; sexpToTree (treeToSexp multitree5) == Just multitree5 4True 5&gt;&gt;&gt; sexpToTree &#34;(a b&#34; 6Nothing 7&gt;&gt;&gt; sexpToTreeReadP (treeToSexp multitree5) == Just multitree5 8True 9&gt;&gt;&gt; treeToSexpDL multitree5 == treeToSexp multitree5 10True 参考 官方文档 Haskell 99 题学习路线 ← P72 后序遍历 | P74 不用 do 的 IO →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p73.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p74.html":{title:"P74 - 不用 do 记法编写 IO",tags:["Haskell","99题","Monad"],content:`P74 - 不用 do 记法编写 IO IO monad without do notation
官方模块：Problems.P74　核心函数：askGoldbach
← P73 S 表达式 | P75 Maybe Monad →
题目描述 从输入句柄读取一个偶数，调用 P40 分解，再把 n=a+b 写到输出句柄。要求不用 do，直接使用 (&gt;&gt;=) 和 (&gt;&gt;)。
实现 方法一：&raquo;= 绑定风格 1import System.IO (Handle, hGetLine, hPutStr, hPutStrLn) 2 3askGoldbach :: Handle -&gt; Handle -&gt; IO () 4askGoldbach input output = 5 hGetLine input &gt;&gt;= \\text -&gt; 6 let n = read text :: Integer 7 (a,b) = goldbach n 8 in hPutStr output (show n ++ &#34;=&#34;) 9 &gt;&gt; hPutStr output (show a ++ &#34;+&#34;) 10 &gt;&gt; hPutStrLn output (show b) (&gt;&gt;=) 把读取到的字符串交给后续函数；(&gt;&gt;) 只关心动作顺序，忽略前一个动作的 () 结果。
方法二：纯格式化后一次输出 1askGoldbach :: Handle -&gt; Handle -&gt; IO () 2askGoldbach input output = 3 hGetLine input &gt;&gt;= 4 hPutStrLn output . format . (read :: String -&gt; Integer) 5 6format :: Integer -&gt; String 7format n = show n ++ &#34;=&#34; ++ show a ++ &#34;+&#34; ++ show b 8 where 9 (a, b) = goldbach n 这个版本把哥德巴赫分解和字符串拼接留在纯函数 format 中，IO 部分只做一次读取和一次写入。两种方法都遵守“不使用 do”的限制。
方法对比 方法 IO 动作组织 多次顺序写入 用 (&gt;&gt;) 串联三个输出动作 一次格式化输出 纯函数生成整行，只执行一次写入 测试 使用内容为 104 的输入句柄时，输出为：
1104=3+101 return 在这里不是命令式语言的“返回语句”，而是把普通值放入某个 Monad 的函数。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p74.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p75.html":{title:"P75 - Maybe Monad 校验输入",tags:["Haskell","99题","Monad"],content:`P75 - Maybe Monad 校验输入 Maybe monad
官方模块：Problems.P75　核心函数：maybeGoldbach
← P74 不用 do 的 IO | P76 Either Monad →
题目描述 解析字符串并验证它是大于 2 的偶数，然后返回原数及其哥德巴赫分解。任一步失败都返回 Nothing。
实现 方法一：do 记法 1import Control.Monad (guard) 2import Text.Read (readMaybe) 3 4maybeGoldbach :: String -&gt; Maybe (Integer, (Integer, Integer)) 5maybeGoldbach text = do 6 n &lt;- readMaybe text 7 guard (n &gt; 2) 8 guard (even n) 9 pure (n, goldbach n) readMaybe 处理解析失败，guard False 在 Maybe 中产生 Nothing。do 把三种失败路径串成一条直线。
方法二：模式匹配版（不需 Maybe Monad） 1maybeGoldbach :: String -&gt; Maybe (Integer, (Integer, Integer)) 2maybeGoldbach text = 3 case readMaybe text of 4 Nothing -&gt; Nothing 5 Just n 6 | n &lt;= 2 || odd n -&gt; Nothing 7 | otherwise -&gt; let (a, b) = goldbach n 8 in Just (n, (a, b)) 用 case 显式处理，不依赖 Monad 抽象。
方法对比 方法 失败传播 Maybe monad readMaybe 和 guard 自动短路 模式匹配 每种失败分支显式返回 Nothing 测试 1&gt;&gt;&gt; maybeGoldbach &#34;28&#34; 2Just (28,(5,23)) 3&gt;&gt;&gt; maybeGoldbach &#34;27&#34; 4Nothing 5&gt;&gt;&gt; maybeGoldbach &#34;hello&#34; 6Nothing Maybe 能表达成功或失败，却不能说明失败原因；P76 用 Either 补上错误信息。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p75.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p76.html":{title:"P76 - Either Monad 返回错误原因",tags:["Haskell","99题","Monad"],content:`P76 - Either Monad 返回错误原因 Either monad
官方模块：Problems.P76　核心函数：eitherGoldbach
← P75 Maybe Monad | P77 List Monad →
题目描述 重写 P75：成功值放在 Right，解析、范围或奇偶校验失败时在 Left 中返回具体原因。
实现 方法一：do 记法 1import Text.Read (readMaybe) 2 3eitherGoldbach :: String -&gt; Either String (Integer, (Integer, Integer)) 4eitherGoldbach text = do 5 n &lt;- case readMaybe text of 6 Nothing -&gt; Left &#34;not a number&#34; 7 Just x -&gt; Right x 8 if n &gt; 2 then Right () else Left &#34;not greater than 2&#34; 9 if even n then Right () else Left &#34;not an even number&#34; 10 pure (n, goldbach n) Either e 的 Monad 实例遇到第一个 Left e 就停止后续计算，因此返回最先发现的错误。
方法二：显式 case 版 1eitherGoldbach :: String -&gt; Either String (Integer, (Integer, Integer)) 2eitherGoldbach text = 3 case readMaybe text of 4 Nothing -&gt; Left &#34;not a number&#34; 5 Just n 6 | n &lt;= 2 -&gt; Left &#34;not greater than 2&#34; 7 | odd n -&gt; Left &#34;not an even number&#34; 8 | otherwise -&gt; Right (n, goldbach n) 不使用 Either Monad，纯 case 匹配。
方法对比 方法 错误策略 Either monad 每项校验保留独立错误，首个 Left 自动短路 显式 case 解析和 guard 集中在一处分支 测试 1&gt;&gt;&gt; eitherGoldbach &#34;28&#34; 2Right (28,(5,23)) 3&gt;&gt;&gt; eitherGoldbach &#34;1&#34; 4Left &#34;not greater than 2&#34; 5&gt;&gt;&gt; eitherGoldbach &#34;27&#34; 6Left &#34;not an even number&#34; 7&gt;&gt;&gt; eitherGoldbach &#34;hello&#34; 8Left &#34;not a number&#34; 要点总结 Maybe 适合只关心成败的内部组合。 Either String 更适合需要向调用者解释失败原因的边界接口。 参考 官方文档 Haskell 99 题学习路线 ← P75 Maybe Monad | P77 List Monad →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p76.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p77.html":{title:"P77 - List Monad 枚举随机游走路径",tags:["Haskell","99题","Monad"],content:`P77 - List Monad 枚举随机游走路径 List monad
官方模块：Problems.P77　核心函数：randomWalkPaths
← P76 Either Monad | P78 Writer Monad 与 Collatz →
题目描述 从位置 0 出发，每一步可以移动 -1、0 或 1。返回长度为 nnn 的所有选择所形成的位置路径，路径包含起点。
实现 方法一：list monad do 记法 1randomWalkPaths :: Int -&gt; [[Int]] 2randomWalkPaths n 3 | n &lt; 0 = [] 4 | otherwise = map reverse (walk n) 5 where 6 walk 0 = [[0]] 7 walk k = do 8 reversedPath@(position:_) &lt;- walk (k - 1) 9 step &lt;- [-1, 0, 1] 10 pure ((position + step) : reversedPath) 列表 Monad 把每次 step 的三个可能分支与已有路径做笛卡尔积。内部反向保存路径可用 (:) 常数时间扩展，最后统一 reverse。
方法二：先枚举步长，再求前缀和 1import Control.Monad (replicateM) 2 3randomWalkPaths :: Int -&gt; [[Int]] 4randomWalkPaths n 5 | n &lt; 0 = [] 6 | otherwise = map (scanl (+) 0) (replicateM n [-1, 0, 1]) replicateM n choices 先生成所有长度为 nnn 的步长序列，再用 scanl (+) 0 把步长转换成包含起点的位置序列。方法一直接扩展路径，方法二则把“选择”和“累计位置”分成两步。
方法对比 方法 中间表示 递归扩展 反向的位置路径 replicateM + scanl 步长序列，然后转为位置 测试 1&gt;&gt;&gt; randomWalkPaths 1 2[[0,-1],[0,0],[0,1]] 3&gt;&gt;&gt; length (randomWalkPaths 4) 481 5&gt;&gt;&gt; all ((== 5) . length) (randomWalkPaths 4) 6True nnn 步共有 3n3^n3n 条路径，输出规模本身就是指数级。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p77.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p78.html":{title:"P78 - 用 Writer Monad 统计 Collatz 步数",tags:["Haskell","99题","Monad"],content:`P78 - 用 Writer Monad 统计 Collatz 步数 Collatz conjecture with Writer
官方模块：Problems.P78　核心函数：collatz
← P77 List Monad | P79 Monad Transformer 后缀求值 →
题目描述 正整数为奇数时变为 3n+13n+13n+1，为偶数时变为 n/2n/2n/2。用 Writer 的累积日志统计到达 1 所需的步数。
实现 方法一：递归过程中写日志 1import Control.Monad.Writer (Writer, execWriter, tell) 2import Data.Monoid (Sum(..)) 3 4collatz :: Integral a =&gt; a -&gt; a 5collatz n 6 | n &lt; 1 = error &#34;collatz: positive input required&#34; 7 | otherwise = getSum (execWriter (walk n)) 8 9walk :: Integral a =&gt; a -&gt; Writer (Sum a) () 10walk 1 = pure () 11walk n = do 12 tell (Sum 1) 13 walk (if odd n then 3*n + 1 else n \`div\` 2) Sum a 的 Monoid 运算是加法，tell (Sum 1) 每执行一次就把计数增加 1；execWriter 丢弃普通返回值，只取日志。
方法二：先生成序列，再统一记录 1collatzViaSequence :: Integral a =&gt; a -&gt; a 2collatzViaSequence n 3 | n &lt; 1 = error &#34;collatz: positive input required&#34; 4 | otherwise = getSum . execWriter $ 5 mapM_ (const (tell (Sum 1))) (tail (collatzSequence n)) 6 7collatzSequence :: Integral a =&gt; a -&gt; [a] 8collatzSequence 1 = [1] 9collatzSequence n = n : collatzSequence next 10 where 11 next = if odd n then 3 * n + 1 else n \`div\` 2 这个版本先构造从输入到 1 的完整序列。除去首项后，每个元素对应一次状态转移，再用 Writer 为每项记录 Sum 1。它占用更多内存，但把数列生成和效果累积分离开。
方法对比 方法 过程 递归写日志 计算下一项时立即 tell 序列后处理 先生成惰性序列，再用 Writer 统计转移 测试 1&gt;&gt;&gt; collatz 1 20 3&gt;&gt;&gt; collatz 6 48 5&gt;&gt;&gt; collatz 27 6111 7&gt;&gt;&gt; collatzViaSequence 27 8111 算法是否对所有正整数终止正是 Collatz 猜想的内容；代码只能对实际输入执行，不能证明全局终止性。
参考 官方文档 Haskell 99 题学习路线 ← P77 List Monad | P79 Monad Transformer 后缀求值 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p78.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p79.html":{title:"P79 - 用 Monad Transformer 求值后缀表达式",tags:["Haskell","99题","Monad"],content:"P79 - 用 Monad Transformer 求值后缀表达式 Evaluate postfix notation with monad transformers\n官方模块：Problems.P79　核心函数：calculatePostfix\n← P78 Writer Monad 与 Collatz | P80 图表示转换 →\n状态、失败与日志 StateT [Integer] 保存操作数栈； MaybeT 表示栈下溢、除零等失败； Writer 保存每一步的栈和操作符。 1import Control.Monad (mzero) 2import Control.Monad.State 3import Control.Monad.Trans.Maybe 4import Control.Monad.Writer 5 6data Operator = Negate | Add | Subtract | Multiply | Divide | Modulo 7 deriving (Eq, Show) 8data Element = Operator Operator | Operand Integer 9 deriving (Eq, Show) 10 11type History = [([Integer], Maybe Operator)] 12type Calculation = MaybeT (StateT [Integer] (Writer History)) 实现 方法一：MaybeT + StateT + Writer 1calculatePostfix :: [Element] -&gt; (Maybe Integer, History) 2calculatePostfix expression = (answer, history) 3 where 4 ((status, stack), history) = 5 runWriter (runStateT (runMaybeT (mapM_ step expression)) []) 6 answer = case (status, stack) of 7 (Just (), [x]) -&gt; Just x 8 _ -&gt; Nothing 9 10step :: Element -&gt; Calculation () 11step (Operand n) = modify (n:) &gt;&gt; record Nothing 12step (Operator op) = apply op &gt;&gt; record (Just op) 13 14record :: Maybe Operator -&gt; Calculation () 15record op = get &gt;&gt;= \\stack -&gt; tell [(stack, op)] 16 17pop :: Calculation Integer 18pop = do 19 stack &lt;- get 20 case stack of 21 [] -&gt; mzero 22 x:rest -&gt; put rest &gt;&gt; pure x 23 24apply :: Operator -&gt; Calculation () 25apply Negate = pop &gt;&gt;= \\x -&gt; modify ((-x):) 26apply op = do 27 b &lt;- pop 28 a &lt;- pop 29 value &lt;- binary op a b 30 modify (value:) 31 32binary :: Operator -&gt; Integer -&gt; Integer -&gt; Calculation Integer 33binary Add a b = pure (a + b) 34binary Subtract a b = pure (a - b) 35binary Multiply a b = pure (a * b) 36binary Divide _ 0 = mzero 37binary Divide a b = pure (a `div` b) 38binary Modulo _ 0 = mzero 39binary Modulo a b = pure (a `mod` b) 40binary Negate _ _ = mzero 方法二：用 ExceptT 保留失败原因 1import Control.Monad.Except 2 3type CalculationE = ExceptT String (StateT [Integer] (Writer History)) 4 5calculatePostfixEither :: [Element] -&gt; (Either String Integer, History) 6calculatePostfixEither expression = (answer, history) 7 where 8 ((status, stack), history) = 9 runWriter (runStateT (runExceptT (mapM_ stepE expression)) []) 10 answer = case (status, stack) of 11 (Left message, _) -&gt; Left message 12 (Right (), [value]) -&gt; Right value 13 (Right (), _) -&gt; Left &#34;expression did not leave one value&#34; 14 15stepE :: Element -&gt; CalculationE () 16stepE (Operand n) = modify (n :) &gt;&gt; recordE Nothing 17stepE (Operator operator) = applyE operator &gt;&gt; recordE (Just operator) 18 19recordE :: Maybe Operator -&gt; CalculationE () 20recordE operator = get &gt;&gt;= \\stack -&gt; tell [(stack, operator)] 21 22popE :: CalculationE Integer 23popE = do 24 stack &lt;- get 25 case stack of 26 [] -&gt; throwError &#34;stack underflow&#34; 27 value:rest -&gt; put rest &gt;&gt; pure value 28 29applyE :: Operator -&gt; CalculationE () 30applyE Negate = popE &gt;&gt;= \\value -&gt; modify ((-value) :) 31applyE operator = do 32 right &lt;- popE 33 left &lt;- popE 34 value &lt;- binaryE operator left right 35 modify (value :) 36 37binaryE :: Operator -&gt; Integer -&gt; Integer -&gt; CalculationE Integer 38binaryE Add a b = pure (a + b) 39binaryE Subtract a b = pure (a - b) 40binaryE Multiply a b = pure (a * b) 41binaryE Divide _ 0 = throwError &#34;division by zero&#34; 42binaryE Divide a b = pure (a `div` b) 43binaryE Modulo _ 0 = throwError &#34;modulo by zero&#34; 44binaryE Modulo a b = pure (a `mod` b) 45binaryE Negate _ _ = throwError &#34;unexpected binary negate&#34; 状态栈和 Writer 历史保持不变，只把最外层失败效果从 MaybeT 换成 ExceptT String。这样仍然会在错误处短路，同时调用者能区分栈下溢、除零和最终栈元素数量错误。\n方法对比 方法 失败信息 成功结果 MaybeT 只有 Nothing Maybe Integer ExceptT String 具体错误文本 Either String Integer 测试 1&gt;&gt;&gt; calculatePostfix [Operand 3, Operand 4, Operand 2, 2... Operator Subtract, Operator Multiply] 3(Just 6,[([3],Nothing),([4,3],Nothing),([2,4,3],Nothing), 4 ([2,3],Just Subtract),([6],Just Multiply)]) 5&gt;&gt;&gt; fst (calculatePostfix [Operand 1, Operand 0, Operator Divide]) 6Nothing 7&gt;&gt;&gt; fst (calculatePostfixEither [Operand 1, Operand 0, Operator Divide]) 8Left &#34;division by zero&#34; Transformer 的层次使三种效果保持独立：错误不会伪造结果，状态不需要手工穿线，历史也不会混入求值返回类型。\n参考 官方文档 Haskell 99 题学习路线 ← P78 Writer Monad 与 Collatz | P80 图表示转换 →\n",url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p79.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p80.html":{title:"P80 - 图的表示转换",tags:["Haskell","99题","图"],content:`P80 - 图的表示转换 Convert between graph representations
官方模块：Problems.P80　核心类型：ConvertibleGraph
← P79 后缀表达式 | P81 两点间所有路径 →
四种表示 1import Data.List (nub) 2import qualified Data.Map.Strict as Map 3import qualified Data.Set as Set 4 5type Vertex = Int 6type Edge = (Vertex, Vertex) 7newtype Lists = Lists ([Vertex], [Edge]) deriving (Eq, Show) 8newtype Adjacency = Adjacency [(Vertex, [Vertex])] deriving (Eq, Show) 9newtype Paths = Paths [[Vertex]] deriving (Eq, Show) 10newtype G = G (Map.Map Vertex (Set.Set Vertex)) deriving (Eq, Show) 11 12normalize (u,v) | u &lt;= v = (u,v) 13 | otherwise = (v,u) 将每种表示先转成规范的“顶点集合 + 无向边集合”，再从规范形式构造目标类型。
方法一：规范顶点集与边集 转为规范形式 1class ConvertibleGraph g where 2 canonical :: g -&gt; (Set.Set Vertex, Set.Set Edge) 3 4instance ConvertibleGraph Lists where 5 canonical (Lists (vs,es)) = 6 (Set.fromList vs, Set.fromList (map normalize es)) 7 8instance ConvertibleGraph Adjacency where 9 canonical (Adjacency rows) = 10 (Set.fromList (map fst rows), 11 Set.fromList [normalize (u,v) | (u,ns) &lt;- rows, v &lt;- ns]) 12 13instance ConvertibleGraph Paths where 14 canonical (Paths ps) = 15 (Set.fromList (concat ps), 16 Set.fromList [normalize e | path &lt;- ps, e &lt;- zip path (drop 1 path)]) 17 18instance ConvertibleGraph G where 19 canonical (G graph) = 20 (Map.keysSet graph, 21 Set.fromList [normalize (u,v) | (u,ns) &lt;- Map.toList graph 22 , v &lt;- Set.toList ns]) 构造目标表示 1toLists graph = Lists (Set.toList vs, Set.toList es) 2 where (vs,es) = canonical graph 3 4toAdjacency graph = Adjacency 5 [(v, [other v e | e &lt;- Set.toList es, contains v e]) | v &lt;- Set.toList vs] 6 where 7 (vs,es) = canonical graph 8 contains v (a,b) = v == a || v == b 9 other v (a,b) = if v == a then b else a 10 11toPaths graph = Paths 12 (map (\\(u,v) -&gt; [u,v]) (Set.toList es) ++ map (:[]) isolated) 13 where 14 (vs,es) = canonical graph 15 touched = Set.fromList [x | (u,v) &lt;- Set.toList es, x &lt;- [u,v]] 16 isolated = Set.toList (Set.difference vs touched) 17 18toG graph = G $ Set.foldl addEdge base es 19 where 20 (vs,es) = canonical graph 21 base = Map.fromSet (const Set.empty) vs 22 addEdge m (u,v) = Map.insertWith Set.union u (Set.singleton v) 23 $ Map.insertWith Set.union v (Set.singleton u) m 方法二：邻接 Map 作为中间表示 1class ToAdjacencyMap g where 2 adjacencyMap :: g -&gt; Map.Map Vertex (Set.Set Vertex) 3 4instance ToAdjacencyMap Lists where 5 adjacencyMap (Lists (vertices, edges)) = foldl addUndirected base edges 6 where base = Map.fromList [(vertex, Set.empty) | vertex &lt;- vertices] 7 8instance ToAdjacencyMap Adjacency where 9 adjacencyMap (Adjacency rows) = foldl addUndirected base edges 10 where 11 base = Map.fromList [(vertex, Set.empty) | (vertex, _) &lt;- rows] 12 edges = [(vertex, neighbor) | (vertex, neighbors) &lt;- rows 13 , neighbor &lt;- neighbors] 14 15instance ToAdjacencyMap Paths where 16 adjacencyMap (Paths paths) = foldl addUndirected base edges 17 where 18 base = Map.fromList [(vertex, Set.empty) | vertex &lt;- concat paths] 19 edges = concatMap (\\path -&gt; zip path (drop 1 path)) paths 20 21instance ToAdjacencyMap G where 22 adjacencyMap (G graph) = graph 23 24addUndirected :: Map.Map Vertex (Set.Set Vertex) -&gt; Edge 25 -&gt; Map.Map Vertex (Set.Set Vertex) 26addUndirected graph (u, v) = 27 Map.insertWith Set.union u (Set.singleton v) 28 (Map.insertWith Set.union v (Set.singleton u) graph) 29 30toListsViaMap :: ToAdjacencyMap g =&gt; g -&gt; Lists 31toListsViaMap graph = Lists (Map.keys table, edges) 32 where 33 table = adjacencyMap graph 34 edges = [(u, v) | (u, neighbors) &lt;- Map.toList table 35 , v &lt;- Set.toList neighbors, u &lt;= v] 36 37toAdjacencyViaMap :: ToAdjacencyMap g =&gt; g -&gt; Adjacency 38toAdjacencyViaMap graph = Adjacency 39 [(vertex, Set.toList neighbors) 40 | (vertex, neighbors) &lt;- Map.toList (adjacencyMap graph)] 41 42toPathsViaMap :: ToAdjacencyMap g =&gt; g -&gt; Paths 43toPathsViaMap graph = Paths 44 (map (\\(u, v) -&gt; [u, v]) edges ++ map (:[]) isolated) 45 where 46 table = adjacencyMap graph 47 Lists (_, edges) = toListsViaMap graph 48 isolated = [vertex | (vertex, neighbors) &lt;- Map.toList table 49 , Set.null neighbors] 50 51toGViaMap :: ToAdjacencyMap g =&gt; g -&gt; G 52toGViaMap = G . adjacencyMap 第一种路线把无向边去重后作为中心；第二种路线始终维护对称邻接 Map，再从 Map 导出其他表示。邻接查询密集时第二种更自然，比较图结构或做集合运算时第一种更方便。
方法对比 中间表示 优势 (Set Vertex, Set Edge) 规范比较、边去重直接 Map Vertex (Set Vertex) 邻居查询和图遍历直接 测试 1&gt;&gt;&gt; canonical (toG (Paths [[1,2,3],[1,3],[4]])) == 2... canonical (Lists ([1,2,3,4],[(1,2),(2,3),(1,3)])) 3True 4&gt;&gt;&gt; canonical (toGViaMap (Paths [[1,2,3],[1,3],[4]])) == 5... canonical (toG (Paths [[1,2,3],[1,3],[4]])) 6True 参考 官方文档 Haskell 99 题学习路线 ← P79 后缀表达式 | P81 两点间所有路径 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p80.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p81.html":{title:"P81 - 两点间所有无环路径",tags:["Haskell","99题","图"],content:`P81 - 两点间所有无环路径 Find all acyclic paths between two vertices
官方模块：Problems.P81　核心函数：paths
← P80 图表示转换 | P82 包含指定顶点的环 →
实现 DFS 的状态包含当前路径已访问顶点。每条递归分支都有自己的 visited，所以一条分支的选择不会污染其他候选路径。
方法一：DFS 回溯 1neighbors :: Vertex -&gt; G -&gt; Set.Set Vertex 2neighbors v (G graph) = Map.findWithDefault Set.empty v graph 3 4paths :: Vertex -&gt; Vertex -&gt; G -&gt; [[Vertex]] 5paths start target graph = go start Set.empty 6 where 7 go current visited 8 | current == target = [[target]] 9 | Set.member current visited = [] 10 | otherwise = 11 [current : rest 12 | next &lt;- Set.toList (neighbors current graph) 13 , rest &lt;- go next (Set.insert current visited)] 方法二：按长度扩展路径（BFS） 1pathsBreadthFirst :: Vertex -&gt; Vertex -&gt; G -&gt; [[Vertex]] 2pathsBreadthFirst start target graph = expand [[start]] 3 where 4 expand [] = [] 5 expand frontier = completed ++ expand nextFrontier 6 where 7 completed = [path | path &lt;- frontier, last path == target] 8 unfinished = [path | path &lt;- frontier, last path /= target] 9 nextFrontier = 10 [path ++ [next] 11 | path &lt;- unfinished 12 , next &lt;- Set.toAscList (neighbors (last path) graph) 13 , next \`notElem\` path] frontier 中的路径长度始终相同，因此结果按边数从少到多产生。路径自身就是访问集合，扩展时禁止加入已经出现的顶点。与 DFS 相比，它更早得到短路径，但会同时保存大量候选路径。
方法对比 方法 输出顺序 内存 DFS 先完整探索一条分支 与递归深度和输出有关 BFS 按路径长度递增 需要保存整层候选路径 测试 1&gt;&gt;&gt; let graph = toG (Paths [[1,2,3],[1,3,4,2],[5,6]]) 2&gt;&gt;&gt; sort (paths 1 4 graph) 3[[1,2,3,4],[1,2,4],[1,3,2,4],[1,3,4]] 4&gt;&gt;&gt; paths 2 6 graph 5[] 6&gt;&gt;&gt; paths 1 1 graph 7[[1]] 8&gt;&gt;&gt; sort (pathsBreadthFirst 1 4 graph) == sort (paths 1 4 graph) 9True 简单路径数量在稠密图中可能是指数级，算法成本至少与输出总长度成正比。
参考 官方文档 Haskell 99 题学习路线 ← P80 图表示转换 | P82 包含指定顶点的环 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p81.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p82.html":{title:"P82 - 包含指定顶点的所有环",tags:["Haskell","99题","图"],content:`P82 - 包含指定顶点的所有环 Find cycles containing a given vertex
官方模块：Problems.P82　核心函数：cycles
← P81 两点间所有路径 | P83 生成树 →
思路与实现 从目标顶点的每个邻居出发做 DFS。允许最后回到起点，但在此前不能重复顶点；长度 2 的立即折返不算无向图中的环。
方法一：专用 DFS 回溯 1cycles :: Vertex -&gt; G -&gt; [[Vertex]] 2cycles start graph = 3 [reverse path 4 | next &lt;- Set.toList (neighbors start graph) 5 , path &lt;- walk next (Set.singleton start) [start]] 6 where 7 walk current visited reversedPath 8 | current == start = 9 [reversedPath | length reversedPath &gt;= 3] 10 | Set.member current visited = [] 11 | otherwise = concat 12 [walk next (Set.insert current visited) (current : reversedPath) 13 | next &lt;- Set.toList (neighbors current graph)] 结果不重复末尾的起点，并且顺时针、逆时针被视为两条不同遍历，这与官方示例一致。
方法二：复用 P81 的简单路径 1cycles :: Vertex -&gt; G -&gt; [[Vertex]] 2cycles start graph = 3 [start : init path 4 | next &lt;- Set.toList (neighbors start graph) 5 , path &lt;- paths next start graph 6 , length path &gt;= 3 7 ] P81 的 paths next start graph 已经保证路径中不重复顶点。去掉路径末尾重复的 start，再把起点放回开头，就得到包含指定顶点的环。长度过滤排除了无向边上的立即折返。
方法对比 方法 特点 专用 DFS 一次搜索直接生成环，状态最少 复用简单路径 组合已有函数，定义更短但会生成并过滤长度 2 的路径 测试 1&gt;&gt;&gt; let graph = toG (Paths [[1,2,3],[1,3,4,2],[5,6]]) 2&gt;&gt;&gt; sort (cycles 1 graph) 3[[1,2,3],[1,2,4,3],[1,3,2],[1,3,4,2]] 4&gt;&gt;&gt; cycles 5 graph 5[] 参考 官方文档 Haskell 99 题学习路线 ← P81 两点间所有路径 | P83 生成树 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p82.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p83.html":{title:"P83 - 构造所有生成树",tags:["Haskell","99题","图"],content:`P83 - 构造所有生成树 Construct all spanning trees
官方模块：Problems.P83　核心函数：spanningTrees、isTree、isConnected
← P82 包含指定顶点的环 | P84 最小生成树 →
判定基础 含 nnn 个顶点的无向图是树，当且仅当它连通且恰有 n−1n-1n−1 条边。因此生成树可从原图边集中选择 n−1n-1n−1 条，再过滤连通候选。
方法一：组合后过滤 1isConnected :: G -&gt; Bool 2isConnected graph 3 | Set.null vs = True 4 | otherwise = reachable (Set.findMin vs) == vs 5 where 6 (vs,_) = canonical graph 7 reachable start = visit Set.empty [start] 8 visit seen [] = seen 9 visit seen (v:stack) 10 | Set.member v seen = visit seen stack 11 | otherwise = visit (Set.insert v seen) 12 (Set.toList (neighbors v graph) ++ stack) 13 14isTree :: G -&gt; Bool 15isTree graph = isConnected graph &amp;&amp; Set.size es == max 0 (Set.size vs - 1) 16 where (vs,es) = canonical graph 17 18spanningTrees :: G -&gt; [G] 19spanningTrees graph 20 | Set.null vs = [] 21 | otherwise = 22 [tree | chosen &lt;- combinations (Set.size vs - 1) (Set.toList es) 23 , let tree = toG (Lists (Set.toList vs, chosen)) 24 , isConnected tree] 25 where (vs,es) = canonical graph 方法二：增量合并连通分量 1spanningTreesIncremental :: G -&gt; [G] 2spanningTreesIncremental graph 3 | Set.null vertices = [] 4 | otherwise = 5 [toG (Lists (Set.toList vertices, chosen)) 6 | chosen &lt;- grow (Set.toList edges) initialComponents []] 7 where 8 (vertices, edges) = canonical graph 9 target = Set.size vertices - 1 10 initialComponents = map Set.singleton (Set.toList vertices) 11 12 grow remaining components chosen 13 | length chosen == target = 14 [reverse chosen | length components == 1] 15 | length chosen + length remaining &lt; target = [] 16 grow [] _ _ = [] 17 grow (edge@(u, v):rest) components chosen = 18 grow rest components chosen ++ include 19 where 20 componentU = componentOf u components 21 componentV = componentOf v components 22 include 23 | componentU == componentV = [] 24 | otherwise = grow rest merged (edge : chosen) 25 merged = Set.union componentU componentV 26 : filter (\\component -&gt; component /= componentU &amp;&amp; component /= componentV) 27 components 28 29 componentOf vertex = head . filter (Set.member vertex) 每加入一条边就合并两个连通分量；若端点已经在同一分量，加入它一定成环，可以立刻剪枝。选满 n−1n-1n−1 条边时只需检查是否剩一个分量，不必重新执行 DFS。
方法对比 方法 候选检查 组合后过滤 先选满 n-1 条边，再检查连通性 增量合并 选边时立即排除环和边数不足分支 测试 1&gt;&gt;&gt; isTree (toG (Paths [[1,2,3],[1,4,5]])) 2True 3&gt;&gt;&gt; isConnected (toG (Lists ([1,2,3],[]))) 4False 5&gt;&gt;&gt; length (spanningTrees (toG (Paths [[1,2,3,1]]))) 63 7&gt;&gt;&gt; length (spanningTreesIncremental (toG (Paths [[1,2,3,1]]))) 83 组合枚举最坏需要检查 (mn−1)\\binom{m}{n-1}(n−1m​) 个候选，适合练习而非大型图。
参考 官方文档 Haskell 99 题学习路线 ← P82 包含指定顶点的环 | P84 最小生成树 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p83.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p84.html":{title:"P84 - 用 Prim 算法构造最小生成树",tags:["Haskell","99题","图"],content:`P84 - 用 Prim 算法构造最小生成树 Construct a minimum spanning tree
官方模块：Problems.P84　核心函数：minimumSpanningTree
← P83 生成树 | P85 图同构 →
算法 从任意顶点开始，反复选择连接“树内”和“树外”的最小权边。加入这条边不会产生环；连通图在加入 n−1n-1n−1 条边后覆盖全部顶点。
实现 方法一：Prim 贪心 1minimumSpanningTree :: G -&gt; Map.Map Edge Int -&gt; G 2minimumSpanningTree graph weights 3 | Set.null vs = graph 4 | otherwise = grow (Set.singleton (Set.findMin vs)) [] 5 where 6 (vs,es) = canonical graph 7 grow inside chosen 8 | inside == vs = toG (Lists (Set.toList vs, chosen)) 9 | null crossing = toG (Lists ([],[])) 10 | otherwise = 11 let edge@(u,v) = minimumByWeight crossing 12 newVertex = if Set.member u inside then v else u 13 in grow (Set.insert newVertex inside) (edge : chosen) 14 where 15 crossing = [e | e@(u,v) &lt;- Set.toList es 16 , Set.member u inside /= Set.member v inside] 17 18 minimumByWeight = minimumBy 19 (comparing (\\edge -&gt; Map.findWithDefault 0 edge weights)) 需要导入 Data.List (minimumBy) 和 Data.Ord (comparing)。权重映射的键必须使用 P80 的规范化无向边。
方法二：Kruskal 算法 1import Data.List (sortOn) 2 3minimumSpanningTreeKruskal :: G -&gt; Map.Map Edge Int -&gt; G 4minimumSpanningTreeKruskal graph weights = 5 choose sortedEdges initialComponents [] 6 where 7 (vertices, edges) = canonical graph 8 sortedEdges = sortOn edgeWeight (Set.toList edges) 9 edgeWeight edge = Map.findWithDefault 0 edge weights 10 initialComponents = map Set.singleton (Set.toList vertices) 11 12 choose [] _ chosen 13 | length chosen == Set.size vertices - 1 = build chosen 14 | Set.null vertices = build [] 15 | otherwise = toG (Lists ([], [])) 16 choose (edge@(u, v):rest) components chosen 17 | componentU == componentV = choose rest components chosen 18 | otherwise = choose rest merged (edge : chosen) 19 where 20 componentU = componentOf u components 21 componentV = componentOf v components 22 merged = Set.union componentU componentV 23 : filter (\\component -&gt; component /= componentU &amp;&amp; component /= componentV) 24 components 25 26 componentOf vertex = 27 head . filter (Set.member vertex) 28 29 build chosen = toG (Lists (Set.toList vertices, chosen)) Kruskal 按权重从小到大检查边。这里用顶点集合列表表示连通分量：端点已经属于同一分量时跳过该边，否则合并两个分量。它比并查集版本短，但每次查找和合并分量都是线性的。
方法对比 方法 生长方式 当前实现复杂度 Prim 从一个顶点向外扩展 O(nm) Kruskal 按全局边权合并分量 O(m log m + mn) 测试 1&gt;&gt;&gt; let g = toG (Paths [[1,2,3],[1,3]]) 2&gt;&gt;&gt; let w = Map.fromList [((1,2),5),((2,3),1),((1,3),2)] 3&gt;&gt;&gt; canonical (minimumSpanningTree g w) 4(fromList [1,2,3],fromList [(1,3),(2,3)]) 5&gt;&gt;&gt; canonical (minimumSpanningTreeKruskal g w) 6(fromList [1,2,3],fromList [(1,3),(2,3)]) 当前版本每轮线性扫描所有边，复杂度 O(nm)O(nm)O(nm)；使用优先队列可优化到 O(mlog⁡n)O(m\\log n)O(mlogn)。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p84.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p85.html":{title:"P85 - 判断图同构",tags:["Haskell","99题","图"],content:`P85 - 判断图同构 Graph isomorphism
官方模块：Problems.P85　核心函数：isomorphic
← P84 最小生成树 | P86 图着色 →
题目描述 若存在顶点双射，使一张图中的边映射后恰好等于另一张图的边，两图同构。顶点编号本身没有意义。
实现 方法一：标准实现 先比较顶点数、边数和度数多重集，排除显然不可能的情况，再枚举顶点双射并检查边集。进一步优化时可以只枚举相同度数顶点之间的对应。
1import Data.List (permutations, sort) 2 3isomorphic :: G -&gt; G -&gt; Bool 4isomorphic left right 5 | Set.size lvs /= Set.size rvs = False 6 | Set.size les /= Set.size res = False 7 | degrees left /= degrees right = False 8 | otherwise = any preservesEdge candidateMappings 9 where 10 (lvs,les) = canonical left 11 (rvs,res) = canonical right 12 lvertices = Set.toList lvs 13 rvertices = Set.toList rvs 14 candidateMappings = map (Map.fromList . zip lvertices) 15 (permutations rvertices) 16 preservesEdge mapping = Set.map (rename mapping) les == res 17 rename mapping (u,v) = normalize (mapping Map.! u, mapping Map.! v) 18 19degrees graph = sort 20 [Set.size (neighbors v graph) | v &lt;- Set.toList (fst (canonical graph))] 度数过滤不会改变正确性，却能提前排除大量不可能情况。进一步优化可在构造映射时增量检查已映射边。
方法二：部分映射回溯 1import Data.List (sortOn) 2import Data.Ord (Down(..)) 3 4isomorphicBacktracking :: G -&gt; G -&gt; Bool 5isomorphicBacktracking left right 6 | Set.size leftVertices /= Set.size rightVertices = False 7 | Set.size leftEdges /= Set.size rightEdges = False 8 | degrees left /= degrees right = False 9 | otherwise = search orderedLeft Map.empty rightVertices 10 where 11 (leftVertices, leftEdges) = canonical left 12 (rightVertices, rightEdges) = canonical right 13 orderedLeft = sortOn 14 (Down . Set.size . (\`neighbors\` left)) 15 (Set.toList leftVertices) 16 17 search [] _ _ = True 18 search (vertex:rest) mapping unused = any try candidates 19 where 20 wantedDegree = Set.size (neighbors vertex left) 21 candidates = 22 [candidate | candidate &lt;- Set.toList unused 23 , Set.size (neighbors candidate right) == wantedDegree] 24 25 try candidate = 26 consistent candidate mapping 27 &amp;&amp; search rest (Map.insert vertex candidate mapping) 28 (Set.delete candidate unused) 29 30 consistent candidate mapping = and 31 [Set.member (normalize (other, vertex)) leftEdges 32 == Set.member (normalize (mappedOther, candidate)) rightEdges 33 | (other, mappedOther) &lt;- Map.toList mapping] 先处理高度数顶点，只尝试映射到同度数的未用顶点。每增加一对映射，就比较它与所有已映射顶点之间的“有边/无边”关系；一旦不一致立即回溯，不再枚举剩余排列。
方法对比 方法 搜索单位 剪枝时机 全排列 完整双射 映射完成后比较全部边 部分映射回溯 一对顶点 每加入一对立即检查已映射关系 测试 1&gt;&gt;&gt; isomorphic (toG (Paths [[1,2,3],[2,4]])) 2... (toG (Paths [[1,2,3],[1,4]])) 3False 4&gt;&gt;&gt; isomorphic (toG (Paths [[1,2,3,1]])) 5... (toG (Paths [[4,5,6,4]])) 6True 7&gt;&gt;&gt; isomorphicBacktracking (toG (Paths [[1,2,3,1]])) 8... (toG (Paths [[4,5,6,4]])) 9True 朴素枚举最坏为 O(n!⋅m)O(n!\\cdot m)O(n!⋅m)，这正是本题困难所在。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p85.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p86.html":{title:"P86 - 图着色",tags:["Haskell","99题","图"],content:`P86 - 图着色 Color a graph with the Welsh-Powell algorithm
官方模块：Problems.P86　核心函数：colorGraph
← P85 图同构 | P87 深度优先遍历 →
算法 Welsh-Powell 是贪心着色：按度数从高到低处理顶点，每个顶点选择尚未被邻居使用的最小正整数颜色。它保证合法，但不保证颜色数全局最少。
实现 方法一：Welsh-Powell 贪心 1import Data.List (sortOn) 2import Data.Ord (Down(..)) 3 4colorGraph :: G -&gt; [(Vertex, Int)] 5colorGraph graph = Map.toAscList (foldl color Map.empty order) 6 where 7 vs = Set.toList (fst (canonical graph)) 8 order = sortOn (Down . Set.size . (\`neighbors\` graph)) vs 9 10 color assigned vertex = Map.insert vertex available assigned 11 where 12 used = Set.fromList 13 [c | neighbor &lt;- Set.toList (neighbors vertex graph) 14 , Just c &lt;- [Map.lookup neighbor assigned]] 15 available = head [c | c &lt;- [1..], Set.notMember c used] 方法二：回溯求最少颜色 1colorGraphOptimal :: G -&gt; [(Vertex, Int)] 2colorGraphOptimal graph = Map.toAscList $ head 3 [coloring 4 | colorCount &lt;- [0..length vertices] 5 , Just coloring &lt;- [assign colorCount vertices Map.empty] 6 ] 7 where 8 vertices = sortOn 9 (Down . Set.size . (\`neighbors\` graph)) 10 (Set.toList (fst (canonical graph))) 11 12 assign _ [] coloring = Just coloring 13 assign colorCount (vertex:rest) coloring = firstJust 14 [assign colorCount rest (Map.insert vertex color coloring) 15 | color &lt;- [1..colorCount] 16 , all (\\neighbor -&gt; Map.lookup neighbor coloring /= Just color) 17 (Set.toList (neighbors vertex graph))] 18 19 firstJust [] = Nothing 20 firstJust (Just value:_) = Just value 21 firstJust (Nothing:rest) = firstJust rest 从 0、1、2……种颜色依次尝试，找到的第一个完整着色必然使用最少颜色。高度数顶点优先可以提前制造冲突，但最坏情况仍是指数搜索。
方法对比 方法 保证 代价 Welsh-Powell 快速得到合法着色 不保证颜色数最少 回溯 得到最少颜色着色 指数级，只适合小图 测试 1&gt;&gt;&gt; colorGraph (toG (Paths [[1,2,3,1]])) 2[(1,1),(2,2),(3,3)] 3&gt;&gt;&gt; let graph = toG (Paths [[1,2,3,4],[1,4]]) 4&gt;&gt;&gt; let coloring = Map.fromList (colorGraph graph) 5&gt;&gt;&gt; all (\\(u,v) -&gt; coloring Map.! u /= coloring Map.! v) 6... (Set.toList (snd (canonical graph))) 7True 8&gt;&gt;&gt; maximum (map snd (colorGraphOptimal (toG (Paths [[1,2,3,1]])))) 93 在简单列表和集合实现下，复杂度约 O(n2)O(n^2)O(n2)。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p86.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p87.html":{title:"P87 - 图的深度优先遍历",tags:["Haskell","99题","图"],content:`P87 - 图的深度优先遍历 Depth-first graph traversal
官方模块：Problems.P87　核心函数：depthFirst
← P86 图着色 | P88 连通分量 →
题目描述 从指定顶点出发，以深度优先顺序返回所有可达顶点。邻居来自 Set，因此这里按升序展开，结果可复现。
实现 方法一：标准实现 1depthFirst :: G -&gt; Vertex -&gt; [Vertex] 2depthFirst graph start = reverse (snd (visit start (Set.empty, []))) 3 where 4 visit vertex state@(seen, order) 5 | Set.member vertex seen = state 6 | otherwise = foldl (flip visit) state&#39; 7 (Set.toAscList (neighbors vertex graph)) 8 where state&#39; = (Set.insert vertex seen, vertex : order) 状态 (seen, order) 显式在线程中传递；先记录当前顶点，再递归邻居，就是前序 DFS。
方法二：显式栈 1depthFirstStack :: G -&gt; Vertex -&gt; [Vertex] 2depthFirstStack graph start = visit Set.empty [start] 3 where 4 visit _ [] = [] 5 visit seen (vertex:stack) 6 | Set.member vertex seen = visit seen stack 7 | otherwise = vertex : visit seen&#39; 8 (Set.toAscList (neighbors vertex graph) ++ stack) 9 where 10 seen&#39; = Set.insert vertex seen 递归版本把待访问邻居放在调用栈中；这个版本将它们显式放入列表栈。邻居加入栈顶，所以仍会先深入当前分支。
方法对比 方法 待访问状态 递归 DFS Haskell 调用栈 显式栈 普通顶点列表 测试 1&gt;&gt;&gt; let graph = toG (Paths [[1,2,3,4,5],[2,4],[6,7]]) 2&gt;&gt;&gt; depthFirst graph 1 3[1,2,3,4,5] 4&gt;&gt;&gt; depthFirst graph 6 5[6,7] 6&gt;&gt;&gt; depthFirstStack graph 1 == depthFirst graph 1 7True 每个顶点和边至多处理常数次，时间复杂度 O(∣V∣+∣E∣)O(|V|+|E|)O(∣V∣+∣E∣)。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p87.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p88.html":{title:"P88 - 图的连通分量",tags:["Haskell","99题","图"],content:`P88 - 图的连通分量 Connected components
官方模块：Problems.P88　核心函数：connectedComponents
← P87 深度优先遍历 | P89 二分图判定 →
思路与实现 方法一：标准解法 从尚未归类的最小顶点出发做 P87 的 DFS，所得可达集合就是一个连通分量；从剩余顶点中删除它并重复。
1connectedComponents :: G -&gt; [[Vertex]] 2connectedComponents graph = collect allVertices 3 where 4 allVertices = fst (canonical graph) 5 collect remaining 6 | Set.null remaining = [] 7 | otherwise = component : collect 8 (Set.difference remaining (Set.fromList component)) 9 where 10 component = depthFirst graph (Set.findMin remaining) 方法二：逐边合并分量 1connectedComponentsByEdges :: G -&gt; [[Vertex]] 2connectedComponentsByEdges graph = 3 map Set.toAscList (foldl mergeEdge initial (Set.toList edges)) 4 where 5 (vertices, edges) = canonical graph 6 initial = map Set.singleton (Set.toList vertices) 7 8 mergeEdge components (u, v) 9 | componentU == componentV = components 10 | otherwise = Set.union componentU componentV 11 : filter (\\component -&gt; component /= componentU &amp;&amp; component /= componentV) 12 components 13 where 14 componentU = componentOf u components 15 componentV = componentOf v components 16 17 componentOf vertex = head . filter (Set.member vertex) 初始时每个顶点各自形成分量。每读取一条边，就合并端点所在集合；所有边处理完后，剩余集合正是连通分量。这与按顶点执行 DFS 的方法形成对照。
方法对比 方法 输入驱动 重复 DFS 从尚未访问的顶点扩展 逐边合并 由边连接顶点集合 测试 1&gt;&gt;&gt; let graph = toG (Paths [[1,2,3,4,5],[2,4],[6,7]]) 2&gt;&gt;&gt; sort (map sort (connectedComponents graph)) 3[[1,2,3,4,5],[6,7]] 4&gt;&gt;&gt; connectedComponents (toG (Lists ([],[]))) 5[] 6&gt;&gt;&gt; sort (map sort (connectedComponentsByEdges graph)) 7[[1,2,3,4,5],[6,7]] 各次 DFS 访问的顶点集合互不相交，整体复杂度仍为 O(∣V∣+∣E∣)O(|V|+|E|)O(∣V∣+∣E∣)。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p88.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p89.html":{title:"P89 - 判断二分图",tags:["Haskell","99题","图"],content:`P89 - 判断二分图 Determine whether a graph is bipartite
官方模块：Problems.P89　核心函数：bipartite
← P88 连通分量 | P90 N 皇后 →
核心思想 二分图等价于可以用两种颜色给顶点着色，使每条边两端颜色不同。对每个连通分量做 BFS；访问边 (u,v) 时，未着色的 v 获得 u 的相反颜色，已着色则检查冲突。
实现 方法一：标准实现 1bipartite :: G -&gt; Bool 2bipartite graph = colorComponents allVertices Map.empty 3 where 4 allVertices = fst (canonical graph) 5 6 colorComponents remaining colors 7 | Set.null remaining = True 8 | otherwise = case bfs [start] (Map.insert start False colors) of 9 Nothing -&gt; False 10 Just colors&#39; -&gt; colorComponents 11 (Set.difference remaining (Map.keysSet colors&#39;)) colors&#39; 12 where start = Set.findMin remaining 13 14 bfs [] colors = Just colors 15 bfs (u:queue) colors = process (Set.toList (neighbors u graph)) queue colors 16 where 17 expected = not (colors Map.! u) 18 process [] rest current = bfs rest current 19 process (v:vs) rest current = case Map.lookup v current of 20 Just color | color /= expected -&gt; Nothing 21 | otherwise -&gt; process vs rest current 22 Nothing -&gt; process vs (rest ++ [v]) (Map.insert v expected current) 方法二：DFS 二着色 1bipartiteDFS :: G -&gt; Bool 2bipartiteDFS graph = colorAll (Set.toList vertices) Map.empty 3 where 4 vertices = fst (canonical graph) 5 6 colorAll [] _ = True 7 colorAll (vertex:rest) colors = case Map.lookup vertex colors of 8 Just _ -&gt; colorAll rest colors 9 Nothing -&gt; case paint vertex False colors of 10 Nothing -&gt; False 11 Just colors&#39; -&gt; colorAll rest colors&#39; 12 13 paint vertex color colors = case Map.lookup vertex colors of 14 Just existing 15 | existing == color -&gt; Just colors 16 | otherwise -&gt; Nothing 17 Nothing -&gt; foldNeighbors 18 (Set.toList (neighbors vertex graph)) 19 (Map.insert vertex color colors) 20 where 21 foldNeighbors [] current = Just current 22 foldNeighbors (neighbor:rest) current = do 23 colored &lt;- paint neighbor (not color) current 24 foldNeighbors rest colored DFS 版本把期望颜色作为递归参数传入。遇到已着色顶点时立即比较颜色；未着色时先记录，再递归地给所有邻居涂相反颜色。
方法对比 方法 遍历策略 BFS 队列逐层传播颜色 DFS 递归沿路径传播颜色 测试 1&gt;&gt;&gt; bipartite (toG (Paths [[1,2,3,4],[1,4,5,2]])) 2True 3&gt;&gt;&gt; bipartite (toG (Paths [[1,2,3,4],[1,4,5,2],[1,3]])) 4False 5&gt;&gt;&gt; bipartiteDFS (toG (Paths [[1,2,3,4],[1,4,5,2]])) 6True 这里用列表尾部追加模拟队列，严谨的 O(V+E)O(V+E)O(V+E) 实现可换用 Data.Sequence。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p89.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p90.html":{title:"P90 - N 皇后问题",tags:["Haskell","99题","回溯"],content:`P90 - N 皇后问题 Find all solutions to the n queens problem
官方模块：Problems.P90　核心函数：queens
← P89 二分图判定 | P91 骑士巡游 →
表示与剪枝 结果列表第 ccc 个数表示第 ccc 列皇后的行号。逐列放置时，候选行不能重复，并且与之前任一皇后不能满足 ∣c−c′∣=∣r−r′∣|c-c&#x27;|=|r-r&#x27;|∣c−c′∣=∣r−r′∣。
实现 方法一：list monad 回溯 1queens :: Int -&gt; [[Int]] 2queens n 3 | n &lt; 0 = [] 4 | otherwise = place 1 [] [1..n] 5 where 6 place _ reversedRows [] = [reverse reversedRows] 7 place column reversedRows availableRows = do 8 row &lt;- availableRows 9 guard (safe column row reversedRows) 10 place (column + 1) (row : reversedRows) 11 (filter (/= row) availableRows) 12 13 safe column row reversedRows = and 14 [abs (column - previousColumn) /= abs (row - previousRow) 15 | (previousColumn, previousRow) &lt;- zip [column-1,column-2..1] reversedRows] 需要 Control.Monad (guard)。列表 Monad 自动收集每个合法分支的结果。
方法二：位掩码搜索 1import Data.Bits ((.&amp;.), (.|.), bit, complement, shiftL, shiftR) 2 3queens :: Int -&gt; [[Int]] 4queens n 5 | n &lt; 0 = [] 6 | otherwise = map columnsToRows (search 0 0 0 0 []) 7 where 8 full :: Integer 9 full = bit n - 1 10 11 search row columns diagonalLeft diagonalRight reversedColumns 12 | row == n = [reverse reversedColumns] 13 | otherwise = concat 14 [ search (row + 1) 15 (columns .|. columnBit) 16 (((diagonalLeft .|. columnBit) \`shiftL\` 1) .&amp;. full) 17 ((diagonalRight .|. columnBit) \`shiftR\` 1) 18 (column : reversedColumns) 19 | column &lt;- [0..n-1] 20 , let columnBit = bit column 21 , available .&amp;. columnBit /= 0 22 ] 23 where 24 available = full .&amp;. complement 25 (columns .|. diagonalLeft .|. diagonalRight) 26 27 columnsToRows columnsByRow = 28 [row + 1 29 | column &lt;- [0..n-1] 30 , (row, placedColumn) &lt;- zip [0..] columnsByRow 31 , placedColumn == column] 这个版本逐行放置皇后，用整数的二进制位同时记录已占用的列和两组对角线。一个按位与即可得到整行候选位置，避免逐个比较此前皇后。最后把“每行所在列”转换回题目要求的“每列所在行”。
方法对比 方法 冲突状态 特点 list monad 皇后行号列表 教学直观，适用于任意棋盘表示 位掩码 三个整数 常数更小，适合较大的 n 测试 1&gt;&gt;&gt; length (queens 8) 292 3&gt;&gt;&gt; minimum (queens 8) 4[1,5,8,6,3,7,2,4] 5&gt;&gt;&gt; queens 1 6[[1]] 最坏搜索仍是指数级，但行占用和对角线剪枝会在很浅的位置排除冲突。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p90.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p91.html":{title:"P91 - 骑士巡游",tags:["Haskell","99题","回溯"],content:`P91 - 骑士巡游 Knight&rsquo;s tour
官方模块：Problems.P91　核心函数：knightsTour、closedKnightsTour
← P90 N 皇后 | P92 优雅树标号 →
Warnsdorff 规则 回溯时优先尝试“下一步可走位置最少”的格子，让最受约束的位置尽早决定，显著减少死路搜索。
实现 方法一：Warnsdorff 排序回溯 1import Data.List (sort, sortOn) 2import qualified Data.Set as Set 3 4type Position = (Int, Int) 5 6knightsTour :: Int -&gt; Position -&gt; Maybe [Position] 7knightsTour n end 8 | not (inside n end) = Nothing 9 | otherwise = search n [end] (Set.delete end board) 10 where board = Set.fromList [(x,y) | x &lt;- [1..n], y &lt;- [1..n]] 11 12search n path@(current:_) remaining 13 | Set.null remaining = Just path 14 | otherwise = firstJust 15 [search n (next:path) (Set.delete next remaining) 16 | next &lt;- ranked] 17 where 18 ranked = sortOn (length . moves remaining) (moves remaining current) 19search _ [] _ = Nothing 20 21moves remaining (x,y) = 22 filter (\`Set.member\` remaining) 23 [(x+dx,y+dy) | (dx,dy) &lt;- jumps] 24 where jumps = [(1,2),(1,-2),(-1,2),(-1,-2), 25 (2,1),(2,-1),(-2,1),(-2,-1)] 26 27firstJust [] = Nothing 28firstJust (Just x:_) = Just x 29firstJust (Nothing:xs) = firstJust xs 30 31inside n (x,y) = 1 &lt;= x &amp;&amp; x &lt;= n &amp;&amp; 1 &lt;= y &amp;&amp; y &lt;= n 从终点反向搜索，最终得到的列表自然以指定位置结尾。
闭合巡游 1closedKnightsTour :: Int -&gt; Maybe [Position] 2closedKnightsTour n 3 | n &lt; 1 = Nothing 4 | otherwise = firstJust 5 [pathTo end [(1,1)] (Set.delete end withoutStart) 6 | end &lt;- moves withoutStart (1,1)] 7 where 8 board = Set.fromList [(x,y) | x &lt;- [1..n], y &lt;- [1..n]] 9 withoutStart = Set.delete (1,1) board 10 11 pathTo end path@(current:_) remaining 12 | Set.null remaining = 13 if knightMove current end 14 then Just (reverse path ++ [end]) 15 else Nothing 16 | otherwise = firstJust 17 [pathTo end (next:path) (Set.delete next remaining) 18 | next &lt;- sortOn (length . moves remaining) 19 (moves remaining current)] 20 pathTo _ [] _ = Nothing 21 22 knightMove (x,y) (x&#39;,y&#39;) = 23 sort [abs (x-x&#39;), abs (y-y&#39;)] == [1,2] 方法二：朴素回溯 1knightsTourPlain :: Int -&gt; Position -&gt; Maybe [Position] 2knightsTourPlain n end 3 | not (inside n end) = Nothing 4 | otherwise = searchPlain [end] (Set.delete end board) 5 where 6 board = Set.fromList [(x, y) | x &lt;- [1..n], y &lt;- [1..n]] 7 8 searchPlain path@(current:_) remaining 9 | Set.null remaining = Just path 10 | otherwise = firstJust 11 [searchPlain (next : path) (Set.delete next remaining) 12 | next &lt;- moves remaining current] 13 searchPlain [] _ = Nothing 朴素版本保持相同的回溯状态，却完全按照坐标顺序尝试下一步。它适合说明 Warnsdorff 排序没有改变解集合，只是把最可能形成死路的选择提前。
方法对比 方法 候选顺序 实际表现 Warnsdorff 后续出口少的格子优先 大棋盘通常很快 朴素回溯 坐标顺序 搜索树巨大，只适合小棋盘对照 测试 1&gt;&gt;&gt; fmap length (knightsTour 6 (3,5)) 2Just 36 3&gt;&gt;&gt; fmap length (closedKnightsTour 6) 4Just 36 5&gt;&gt;&gt; knightsTour 3 (1,1) 6Nothing 7&gt;&gt;&gt; knightsTourPlain 1 (1,1) 8Just [(1,1)] 参考 官方文档 Haskell 99 题学习路线 ← P90 N 皇后 | P92 优雅树标号 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p91.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p92.html":{title:"P92 - 优雅树标号",tags:["Haskell","99题","图"],content:`P92 - 优雅树标号 Graceful tree labeling
官方模块：Problems.P92　核心函数：gracefulTree
← P91 骑士巡游 | P93 算术谜题 →
定义 含 nnn 个顶点的树若能用 1..n1..n1..n 双射标号，并让 n−1n-1n−1 条边两端标号差的绝对值恰好组成 1..n−11..n-11..n−1，这个标号就是优雅标号。
实现 方法一：枚举完整排列 1import Data.List (delete, permutations) 2 3gracefulTree :: G -&gt; Maybe (Map.Map Vertex Int) 4gracefulTree graph 5 | not (isTree graph) = Nothing 6 | otherwise = firstJust 7 [Just labeling | labels &lt;- permutations [1..n] 8 , let labeling = Map.fromList (zip vertices labels) 9 , graceful labeling] 10 where 11 (vs,es) = canonical graph 12 vertices = Set.toList vs 13 n = length vertices 14 graceful labeling = 15 Set.fromList [abs (labeling Map.! u - labeling Map.! v) 16 | (u,v) &lt;- Set.toList es] 17 == Set.fromList [1..n-1] 18 19firstJust [] = Nothing 20firstJust (Just value:_) = Just value 21firstJust (Nothing:rest) = firstJust rest 这个版本直接枚举所有 n!n!n! 个双射，代码短且定义清楚。实用版本应优先标记高度数顶点，并在部分标号产生重复边差时立即回溯。
方法二：部分标号回溯 1import Data.List (delete, sortOn) 2import Data.Ord (Down(..)) 3 4gracefulTreeBacktracking :: G -&gt; Maybe (Map.Map Vertex Int) 5gracefulTreeBacktracking graph 6 | not (isTree graph) = Nothing 7 | otherwise = assign orderedVertices Map.empty Set.empty [1..n] 8 where 9 vertices = Set.toList (fst (canonical graph)) 10 n = length vertices 11 orderedVertices = sortOn 12 (Down . Set.size . (\`neighbors\` graph)) vertices 13 14 assign [] labeling _ _ = Just labeling 15 assign (vertex:rest) labeling usedDifferences availableLabels = 16 firstJust 17 [assign rest 18 (Map.insert vertex label labeling) 19 (Set.union usedDifferences newDifferences) 20 (delete label availableLabels) 21 | label &lt;- availableLabels 22 , let newDifferences = Set.fromList 23 [abs (label - neighborLabel) 24 | neighbor &lt;- Set.toList (neighbors vertex graph) 25 , Just neighborLabel &lt;- [Map.lookup neighbor labeling]] 26 , Set.size newDifferences == length 27 [() | neighbor &lt;- Set.toList (neighbors vertex graph) 28 , Map.member neighbor labeling] 29 , Set.null (Set.intersection usedDifferences newDifferences) 30 ] 每给一个顶点标号，就计算它与已标号邻居产生的新边差。新边差内部重复或与此前边差冲突时立即回溯。优先处理高度数顶点可以更早形成约束。
方法对比 方法 检查时机 完整排列 n 个顶点全部标号后检查 部分标号回溯 每加入一个标号就检查新边差 测试 1&gt;&gt;&gt; let path4 = toG (Paths [[1,2,3,4]]) 2&gt;&gt;&gt; fmap (const True) (gracefulTree path4) 3Just True 4&gt;&gt;&gt; gracefulTree (toG (Paths [[1,2,3,1]])) 5Nothing 6&gt;&gt;&gt; fmap (const True) (gracefulTreeBacktracking path4) 7Just True 不同枚举顺序可能返回不同但同样正确的标号，测试应验证标号集合和边差集合，而不是固定某一映射。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p92.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p93.html":{title:"P93 - 算术谜题",tags:["Haskell","99题","搜索"],content:`P93 - 算术谜题 An arithmetic puzzle
官方模块：Problems.P93　核心函数：arithmeticPuzzle
← P92 优雅树标号 | P94 正则图 →
题目描述 保持数字顺序，在相邻数字之间插入 + - * / = 和必要括号，使等号两侧按有理数运算后相等。等号恰好出现一次，不能除以零。
表达式生成 方法一：递归枚举区间切分 1import Data.List (nub) 2import Data.Ratio ((%)) 3 4data Expr = Expr Rational String 5 6expressions :: [Integer] -&gt; [Expr] 7expressions [] = [] 8expressions [n] = [Expr (n % 1) (show n)] 9expressions numbers = concat 10 [combine left right 11 | split &lt;- [1 .. length numbers - 1] 12 , left &lt;- expressions (take split numbers) 13 , right &lt;- expressions (drop split numbers)] 14 15combine (Expr a sa) (Expr b sb) = 16 [Expr (a+b) (paren sa &#34;+&#34; sb), 17 Expr (a-b) (paren sa &#34;-&#34; sb), 18 Expr (a*b) (paren sa &#34;*&#34; sb)] 19 ++ [Expr (a/b) (paren sa &#34;/&#34; sb) | b /= 0] 20 where paren l op r = &#34;(&#34; ++ l ++ op ++ r ++ &#34;)&#34; 构造等式 1arithmeticPuzzle :: [Integer] -&gt; [String] 2arithmeticPuzzle numbers = nub 3 [strip l ++ &#34; = &#34; ++ strip r 4 | split &lt;- [1 .. length numbers - 1] 5 , Expr lv l &lt;- expressions (take split numbers) 6 , Expr rv r &lt;- expressions (drop split numbers) 7 , lv == rv] 8 where 9 strip text 10 | length text &gt;= 2 &amp;&amp; head text == &#39;(&#39; &amp;&amp; last text == &#39;)&#39; = init (tail text) 11 | otherwise = text 为了让求值语义完全明确，这个实现保留了一些非必要括号；可在展示层根据运算符优先级进一步化简，不影响求解核心。
方法二：区间动态规划 1import Data.Array (Array, (!), array) 2 3arithmeticPuzzleDP :: [Integer] -&gt; [String] 4arithmeticPuzzleDP numbers = nub 5 [strip leftText ++ &#34; = &#34; ++ strip rightText 6 | split &lt;- [1 .. length numbers - 1] 7 , Expr leftValue leftText &lt;- table ! (0, split) 8 , Expr rightValue rightText &lt;- table ! (split, length numbers) 9 , leftValue == rightValue] 10 where 11 table :: Array (Int, Int) [Expr] 12 table = array ((0, 1), (length numbers - 1, length numbers)) 13 [((start, end), build start end) 14 | width &lt;- [1..length numbers] 15 , start &lt;- [0..length numbers - width] 16 , let end = start + width] 17 18 build start end 19 | end == start + 1 = 20 [Expr (numbers !! start % 1) (show (numbers !! start))] 21 | otherwise = concat 22 [combine left right 23 | split &lt;- [start + 1 .. end - 1] 24 , left &lt;- table ! (start, split) 25 , right &lt;- table ! (split, end)] 26 27 strip text 28 | length text &gt;= 2 &amp;&amp; head text == &#39;(&#39; &amp;&amp; last text == &#39;)&#39; = 29 init (tail text) 30 | otherwise = text 递归版本会在不同等号位置和括号结构中重复计算相同数字区间。动态规划表以半开区间 (start,end) 为键，每个区间的所有表达式只生成一次，再被更大区间复用。
方法对比 方法 子区间结果 递归枚举 每次遇到都重新生成 区间 DP 缓存在数组中复用 测试 1&gt;&gt;&gt; not (null (arithmeticPuzzle [2,3,5,7,11])) 2True 3&gt;&gt;&gt; arithmeticPuzzle [1] 4[] 5&gt;&gt;&gt; not (null (arithmeticPuzzleDP [2,3,5,7,11])) 6True 所有二叉括号结构与四种运算组合会指数增长，使用 Rational 则保证等值比较没有浮点误差。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p93.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p94.html":{title:"P94 - 生成非同构正则图",tags:["Haskell","99题","图"],content:`P94 - 生成非同构正则图 Generate regular graphs
官方模块：Problems.P94　核心函数：regularGraphs
← P93 算术谜题 | P95 英文数字单词 →
题目描述 生成含 nnn 个顶点的所有非同构 kkk-正则简单图。每个顶点度数都必须是 kkk；握手定理要求 nknknk 为偶数。
实现 方法一：标准实现 1import Data.List (nubBy) 2import qualified Data.Map.Strict as Map 3 4regularGraphs :: Int -&gt; Int -&gt; [G] 5regularGraphs n k 6 | n &lt; 0 || k &lt; 0 || (n &gt; 0 &amp;&amp; k &gt;= n) || odd (n*k) = [] 7 | otherwise = nubBy isomorphic 8 [graph | chosen &lt;- combinations edgeCount possibleEdges 9 , let graph = toG (Lists (vertices, chosen)) 10 , all ((== k) . Set.size . (\`neighbors\` graph)) vertices] 11 where 12 vertices = [1..n] 13 possibleEdges = [(u,v) | u &lt;- vertices, v &lt;- vertices, u &lt; v] 14 edgeCount = n * k \`div\` 2 先用握手定理固定边数，再过滤度数，最后用 P85 去除同构副本。
方法二：剩余度数剪枝 1regularGraphsBacktracking :: Int -&gt; Int -&gt; [G] 2regularGraphsBacktracking n k 3 | n &lt; 0 || k &lt; 0 || (n &gt; 0 &amp;&amp; k &gt;= n) || odd (n * k) = [] 4 | otherwise = nubBy isomorphic 5 [toG (Lists (vertices, chosen)) 6 | chosen &lt;- search possibleEdges initialDegrees []] 7 where 8 vertices = [1..n] 9 possibleEdges = [(u, v) | u &lt;- vertices, v &lt;- vertices, u &lt; v] 10 initialDegrees = Map.fromList [(vertex, 0) | vertex &lt;- vertices] 11 12 search remaining degrees chosen 13 | any impossible vertices = [] 14 | null remaining = 15 [reverse chosen | all ((== k) . degree) vertices] 16 | otherwise = withoutEdge ++ withEdge 17 where 18 degree vertex = Map.findWithDefault 0 vertex degrees 19 incident vertex (u, v) = vertex == u || vertex == v 20 impossible vertex = 21 degree vertex &gt; k 22 || degree vertex + length (filter (incident vertex) remaining) &lt; k 23 24 edge@(u, v) = head remaining 25 rest = tail remaining 26 withoutEdge = search rest degrees chosen 27 withEdge 28 | degree u &gt;= k || degree v &gt;= k = [] 29 | otherwise = search rest 30 (Map.adjust (+ 1) u (Map.adjust (+ 1) v degrees)) 31 (edge : chosen) 这个版本逐条决定边是否存在，并维护每个顶点的当前度数。如果某个顶点已经超过 kkk，或者剩余相邻边全部加入也达不到 kkk，立即剪掉整棵搜索子树。
方法对比 方法 剪枝 固定边数组合 选满 nk/2 条边后检查所有度数 剩余度数回溯 每次选边后检查上限和可达下限 测试 1&gt;&gt;&gt; length (regularGraphs 6 3) 22 3&gt;&gt;&gt; length (regularGraphs 4 2) 41 5&gt;&gt;&gt; regularGraphs 5 3 6[] 7&gt;&gt;&gt; length (regularGraphsBacktracking 4 2) 81 这是穷举实现，候选数为 (n(n−1)/2nk/2)\\binom{n(n-1)/2}{nk/2}(nk/2n(n−1)/2​)，只适合小图。增量构边并限制剩余度数能显著提前剪枝。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p94.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p95.html":{title:"P95 - 英文数字单词",tags:["Haskell","99题","字符串"],content:`P95 - 英文数字单词 English number words
官方模块：Problems.P95　核心函数：fullWords
← P94 正则图 | P96 Ada 标识符 →
题目描述 把非负整数逐位转换为英文单词，并用连字符连接。题目不是把 175 写成 “one hundred seventy-five”，而是 one-seven-five。
实现 方法一：算术拆分数字 1import Data.List (intercalate) 2 3fullWords :: Integral a =&gt; a -&gt; String 4fullWords n 5 | n &lt; 0 = error &#34;fullWords: non-negative input required&#34; 6 | n == 0 = &#34;zero&#34; 7 | otherwise = intercalate &#34;-&#34; (map digitWord (digits n)) 8 9digits :: Integral a =&gt; a -&gt; [Int] 10digits 0 = [] 11digits n = digits (n \`div\` 10) ++ [fromIntegral (n \`mod\` 10)] 12 13digitWord 0 = &#34;zero&#34; 14digitWord 1 = &#34;one&#34; 15digitWord 2 = &#34;two&#34; 16digitWord 3 = &#34;three&#34; 17digitWord 4 = &#34;four&#34; 18digitWord 5 = &#34;five&#34; 19digitWord 6 = &#34;six&#34; 20digitWord 7 = &#34;seven&#34; 21digitWord 8 = &#34;eight&#34; 22digitWord 9 = &#34;nine&#34; 23digitWord _ = error &#34;digitWord: not a digit&#34; 方法二：复用十进制 show 1fullWordsViaShow :: Integral a =&gt; a -&gt; String 2fullWordsViaShow n 3 | n &lt; 0 = error &#34;fullWords: non-negative input required&#34; 4 | otherwise = intercalate &#34;-&#34; 5 [digitWord (fromEnum c - fromEnum &#39;0&#39;) | c &lt;- show (toInteger n)] show 已经完成十进制位的提取，并且会为 0 产生字符串 &quot;0&quot;。随后只需把每个字符转换成数字下标并查单词。
方法对比 方法 数位来源 算术拆分 反复执行 div 和 mod show 复用标准十进制格式化 测试 1&gt;&gt;&gt; fullWords 175 2&#34;one-seven-five&#34; 3&gt;&gt;&gt; fullWords 0 4&#34;zero&#34; 5&gt;&gt;&gt; fullWords 1002 6&#34;one-zero-zero-two&#34; 7&gt;&gt;&gt; fullWordsViaShow 1002 8&#34;one-zero-zero-two&#34; digits 中的尾部 ++ 对位数很少的整数足够清楚；也可用累加器一次生成正序数字。
参考 官方文档 Haskell 99 题学习路线 ← P94 正则图 | P96 Ada 标识符 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p95.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p96.html":{title:"P96 - 检查 Ada 标识符语法",tags:["Haskell","99题","解析"],content:`P96 - 检查 Ada 标识符语法 Syntax checking for Ada identifiers
官方模块：Problems.P96　核心函数：isIdentifier
← P95 英文数字单词 | P97 数独 →
语法规则 标识符必须以英文字母开头，之后可以包含字母、数字和下划线；下划线不能连续，也不能位于末尾。
实现 方法一：递归解析 1isIdentifier :: String -&gt; Bool 2isIdentifier [] = False 3isIdentifier (first:rest) = asciiLetter first &amp;&amp; consume False rest 4 where 5 consume previousUnderscore [] = not previousUnderscore 6 consume previousUnderscore (c:cs) 7 | asciiLetter c || asciiDigit c = consume False cs 8 | c == &#39;_&#39; &amp;&amp; not previousUnderscore = consume True cs 9 | otherwise = False 10 11asciiLetter c = c \`elem\` [&#39;A&#39;..&#39;Z&#39;] || c \`elem\` [&#39;a&#39;..&#39;z&#39;] 12asciiDigit c = c \`elem\` [&#39;0&#39;..&#39;9&#39;] 状态 previousUnderscore 记录前一个字符是否为下划线；输入结束时它还为真，就说明标识符以下划线结尾。
方法二：按下划线分组 1isIdentifier :: String -&gt; Bool 2isIdentifier input = case splitUnderscores input of 3 [] -&gt; False 4 firstGroup : groups -&gt; 5 not (null firstGroup) 6 &amp;&amp; asciiLetter (head firstGroup) 7 &amp;&amp; all validGroup (firstGroup : groups) 8 where 9 validGroup group = 10 not (null group) &amp;&amp; all (\\c -&gt; asciiLetter c || asciiDigit c) group 11 12splitUnderscores :: String -&gt; [String] 13splitUnderscores = foldr step [&#34;&#34;] 14 where 15 step &#39;_&#39; groups = &#34;&#34; : groups 16 step c (group : groups) = (c : group) : groups 17 step _ [] = [] 连续下划线、开头下划线或结尾下划线都会产生空分组，因此只需检查每组非空，再检查组内字符。首组还要额外保证第一个字符是字母。这个实现不依赖正则表达式包。
方法对比 方法 状态 递归解析 记录前一个字符是否为下划线 分组验证 用空分组表示非法下划线位置 测试 1&gt;&gt;&gt; isIdentifier &#34;this_is_a_long_identifier&#34; 2True 3&gt;&gt;&gt; isIdentifier &#34;This_ends_in_an_underscore_&#34; 4False 5&gt;&gt;&gt; isIdentifier &#34;This__has__two__underscores&#34; 6False 7&gt;&gt;&gt; isIdentifier &#34;1234&#34; 8False 9&gt;&gt;&gt; isIdentifier &#34;Fibonacci_sequence_1_1_2_3_5_8&#34; 10True 算法单次扫描字符串，时间复杂度 O(n)O(n)O(n)。

`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p96.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p97.html":{title:"P97 - 数独求解",tags:["Haskell","99题","回溯"],content:`P97 - 数独求解 Sudoku
官方模块：Problems.P97　核心函数：sudoku
← P96 Ada 标识符 | P98 数织游戏 →
表示与搜索策略 棋盘是 9×99\\times99×9 整数列表，0 表示空格。每轮选择候选数字最少的空格（MRV），逐个尝试；候选为空立即回溯。
实现 方法一：经典回溯 1import Data.List (minimumBy, nub, sort, transpose) 2import Data.Ord (comparing) 3 4sudoku :: [[Int]] -&gt; Maybe [[Int]] 5sudoku board 6 | not (validBoard board) = Nothing 7 | otherwise = solve board 8 where 9 solve current = case blanks current of 10 [] -&gt; Just current 11 positions -&gt; firstJust 12 [solve (setCell current position value) | value &lt;- options] 13 where 14 position = minimumBy (comparing (length . candidates current)) positions 15 options = candidates current position 16 17blanks board = [(r,c) | r &lt;- [0..8], c &lt;- [0..8], board !! r !! c == 0] 18 19candidates board (r,c) = 20 [n | n &lt;- [1..9], n \`notElem\` used] 21 where 22 row = board !! r 23 column = transpose board !! c 24 box = [board !! i !! j | i &lt;- boxRange r, j &lt;- boxRange c] 25 used = row ++ column ++ box 26 boxRange i = let start = i \`div\` 3 * 3 in [start..start+2] 27 28setCell board (r,c) value = 29 take r board ++ [take c row ++ [value] ++ drop (c+1) row] ++ drop (r+1) board 30 where row = board !! r 31 32validBoard board = 33 length board == 9 &amp;&amp; all ((== 9) . length) board 34 &amp;&amp; all (all (\`elem\` [0..9])) board 35 &amp;&amp; all noDuplicates (board ++ transpose board ++ boxes board) 36 where 37 noDuplicates xs = let values = filter (/= 0) xs 38 in length values == length (nub values) 39 boxes b = [[b !! r !! c | r &lt;- [br..br+2], c &lt;- [bc..bc+2]] 40 | br &lt;- [0,3,6], bc &lt;- [0,3,6]] 41 42firstJust [] = Nothing 43firstJust (Just value:_) = Just value 44firstJust (Nothing:rest) = firstJust rest firstJust 返回候选列表中的第一个成功分支。
方法二：约束传播 1sudokuWithPropagation :: [[Int]] -&gt; Maybe [[Int]] 2sudokuWithPropagation board 3 | not (validBoard board) = Nothing 4 | otherwise = solve board 5 where 6 solve current = do 7 reduced &lt;- propagate current 8 case blanks reduced of 9 [] -&gt; Just reduced 10 positions -&gt; firstJust 11 [solve (setCell reduced position value) | value &lt;- options] 12 where 13 position = minimumBy (comparing (length . candidates reduced)) positions 14 options = candidates reduced position 15 16 propagate current 17 | not (validBoard current) = Nothing 18 | any (null . candidates current) emptyCells = Nothing 19 | null forced = Just current 20 | otherwise = propagate (foldl placeForced current forced) 21 where 22 emptyCells = blanks current 23 forced = 24 [(position, head options) 25 | position &lt;- emptyCells 26 , let options = candidates current position 27 , length options == 1] 28 placeForced grid (position, value) = setCell grid position value propagate 反复填入只有一个候选数字的格子，直到没有新的确定值。若某个空格没有候选，或同时填入后产生冲突，就立即回溯；只有传播无法继续时才选择候选最少的位置分支搜索。
方法对比 方法 每轮动作 特点 经典回溯 直接选择 MRV 格子分支 实现短，基准清晰 约束传播 + 回溯 先消除全部单候选 搜索树通常更小 测试 1&gt;&gt;&gt; fmap (all (\\row -&gt; sort row == [1..9])) (sudoku sudokuPuzzle) 2Just True 3&gt;&gt;&gt; sudoku (replicate 9 (replicate 9 1)) 4Nothing 5&gt;&gt;&gt; sudokuWithPropagation sudokuPuzzle == sudoku sudokuPuzzle 6True 数独搜索最坏是指数级，MRV 通常会把分支数压到很低。

官方模块：Problems.P98　核心函数：nonogram
← P97 数独 | P99 填字游戏 →
题目描述 每行、每列给出连续实心块的长度。相邻块之间至少有一个空格；求满足全部行列线索的布尔矩阵。
生成单行候选 1import Data.List (isPrefixOf, transpose) 2 3linePatterns :: Int -&gt; [Int] -&gt; [[Bool]] 4linePatterns width [] = [replicate width False] 5linePatterns width (block:rest) 6 | block &lt;= 0 = [] 7 | otherwise = 8 [ replicate start False ++ replicate block True ++ separator ++ suffix 9 | start &lt;- [0..width - block - minimumTail] 10 , let separator = if null rest then [] else [False] 11 , suffix &lt;- linePatterns (width - start - block - length separator) rest] 12 where 13 minimumTail = sum rest + length rest minimumTail 是剩余块及它们所需分隔空格的最小长度，因此起点枚举不会产生越界布局。
求解 方法一：按行回溯并检查列前缀 1nonogram :: [[Int]] -&gt; [[Int]] -&gt; Maybe [[Bool]] 2nonogram rowClues columnClues = build [] rowOptions 3 where 4 height = length rowClues 5 width = length columnClues 6 rowOptions = map (linePatterns width) rowClues 7 columnOptions = map (linePatterns height) columnClues 8 9 build rows [] 10 | transpose rows \`matches\` columnOptions = Just rows 11 | otherwise = Nothing 12 build rows (options:remaining) = firstJust 13 [build rows&#39; remaining | row &lt;- options 14 , let rows&#39; = rows ++ [row] 15 , compatible rows&#39;] 16 17 compatible rows = and 18 [any (column \`isPrefixOf\`) options 19 | (column, options) &lt;- zip (transpose rows) columnOptions] 20 21 actual \`matches\` options = and (zipWith elem actual options) 22 23firstJust [] = Nothing 24firstJust (Just value:_) = Just value 25firstJust (Nothing:rest) = firstJust rest 方法二：从候选较少的方向搜索 1nonogramAdaptive :: [[Int]] -&gt; [[Int]] -&gt; Maybe [[Bool]] 2nonogramAdaptive rowClues columnClues 3 | rowCost &lt;= columnCost = nonogram rowClues columnClues 4 | otherwise = transpose &lt;$&gt; nonogram columnClues rowClues 5 where 6 height = length rowClues 7 width = length columnClues 8 rowCost = product 9 [toInteger (length (linePatterns width clue)) | clue &lt;- rowClues] 10 columnCost = product 11 [toInteger (length (linePatterns height clue)) | clue &lt;- columnClues] 横纵转置后仍是同一个 Nonogram。先估算逐行和逐列候选组合数，从更小的一侧调用基准求解器；按列求解得到的棋盘最后再转置回来。线索不对称时，这个选择可以显著减少搜索分支。
方法对比 方法 搜索方向 固定按行 实现直接，表现取决于行线索强弱 自适应 比较候选组合数后选择行或列 测试 1&gt;&gt;&gt; fmap (map (map (\\b -&gt; if b then &#39;#&#39; else &#39;.&#39;))) 2... (nonogram [[1],[3],[1]] [[1],[3],[1]]) 3Just [&#34;.#.&#34;,&#34;###&#34;,&#34;.#.&#34;] 4&gt;&gt;&gt; nonogram [[3]] [[1],[1]] 5Nothing 6&gt;&gt;&gt; nonogramAdaptive [[1],[3],[1]] [[1],[3],[1]] == 7... nonogram [[1],[3],[1]] [[1],[3],[1]] 8True 逐行加入后立即检查所有列前缀，可以在错误行布局出现时马上回溯。
