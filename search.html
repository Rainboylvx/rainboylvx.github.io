官方模块：Problems.P99　核心函数：solveCrossword
← P98 数织游戏
数据表示 Left False 是黑格，Left True 是待填格，Right c 是预填字符。连续两个以上可填格形成横向或纵向单词槽。
1import Data.List (delete, minimumBy, transpose) 2import Data.Ord (comparing) 3 4data Crossword = Crossword 5 { word :: [String] 6 , grid :: [[Either Bool Char]] 7 } deriving (Eq, Show) 8 9type Position = (Int, Int) 10type Site = [Position] 11type Board = [[Maybe Char]] 提取单词槽 1allSites :: [[Either Bool Char]] -&gt; [Site] 2allSites puzzle = horizontal ++ vertical 3 where 4 rows = length puzzle 5 cols = maximum (0 : map length puzzle) 6 cell r c 7 | r &lt; rows &amp;&amp; c &lt; length (puzzle !! r) = puzzle !! r !! c 8 | otherwise = Left False 9 spot r c = case cell r c of 10 Left False -&gt; Nothing 11 _ -&gt; Just (r,c) 12 horizontal = concat 13 [runsFrom [spot r c | c &lt;- [0..cols-1]] | r &lt;- [0..rows-1]] 14 vertical = concat 15 [runsFrom [spot r c | r &lt;- [0..rows-1]] | c &lt;- [0..cols-1]] 16 17runsFrom :: [Maybe Position] -&gt; [Site] 18runsFrom = filter ((&gt;= 2) . length) . finish . foldl step ([],[]) 19 where 20 step (done,current) Nothing = (reverse current:done, []) 21 step (done,current) (Just p) = (done, p:current) 22 finish (done,current) = reverse (reverse current:done) 回溯求解核心 方法一：每轮重新计算候选词 1solveCrossword :: Crossword -&gt; Maybe Board 2solveCrossword (Crossword words puzzle) = 3 search initial (allSites puzzle) words 4 where 5 initial = [[initialCell cell | cell &lt;- row] | row &lt;- puzzle] 6 initialCell (Right c) = Just c 7 initialCell _ = Nothing 8 9search board [] _ = Just board 10search board remaining words = firstJust 11 [search (place board site candidate) (delete site remaining) (delete candidate words) 12 | candidate &lt;- candidates] 13 where 14 ranked = [(site, matching board site words) | site &lt;- remaining] 15 (site,candidates) = minimumBy (comparing (length . snd)) ranked 16 17matching board site words = 18 [w | w &lt;- words, length w == length site, fits board site w] 19 20fits board site text = and 21 [maybe True (== c) (board !! r !! col) 22 | ((r,col),c) &lt;- zip site text] 23 24place board site text = foldl put board (zip site text) 25 where 26 put rows ((r,c),value) = 27 take r rows ++ [take c row ++ [Just value] ++ drop (c+1) row] 28 ++ drop (r+1) rows 29 where row = rows !! r 30 31firstJust [] = Nothing 32firstJust (Just value:_) = Just value 33firstJust (Nothing:rest) = firstJust rest 搜索每次选择候选词最少的槽（MRV），填词后交叉位置会自动限制其他槽。
方法二：前向检查候选域 1solveCrosswordForward :: Crossword -&gt; Maybe Board 2solveCrosswordForward (Crossword words puzzle) = 3 searchForward initial domains words 4 where 5 initial = [[initialCell cell | cell &lt;- row] | row &lt;- puzzle] 6 initialCell (Right c) = Just c 7 initialCell _ = Nothing 8 domains = 9 [(site, matching initial site words) | site &lt;- allSites puzzle] 10 11searchForward :: Board -&gt; [(Site, [String])] -&gt; [String] -&gt; Maybe Board 12searchForward board [] _ = Just board 13searchForward board domains words = firstJust 14 [advance candidate | candidate &lt;- candidates] 15 where 16 (site, candidates) = minimumBy (comparing (length . snd)) domains 17 18 advance candidate 19 | any (null . snd) updatedDomains = Nothing 20 | otherwise = searchForward board&#39; updatedDomains words&#39; 21 where 22 board&#39; = place board site candidate 23 words&#39; = delete candidate words 24 remainingSites = 25 [otherSite | (otherSite, _) &lt;- domains, otherSite /= site] 26 updatedDomains = 27 [(otherSite, matching board&#39; otherSite words&#39;) 28 | otherSite &lt;- remainingSites] 方法一只在选中某个槽时计算它的候选词；前向检查在每次填词后更新所有剩余槽的候选域。任一候选域变空就立即回溯，避免等到该槽被 MRV 选中才发现冲突。
方法对比 方法 填词后的工作 重新计算 下一轮只计算当前 MRV 排名所需候选 前向检查 更新所有剩余候选域并检测空域 测试 1&gt;&gt;&gt; fmap (map (map (maybe &#39;#&#39; id))) (solveCrossword crosswordPuzzle) 2Just [&#34;##P##&#34;,&#34;##O##&#34;,&#34;ALPHA&#34;,&#34;##P#R&#34;,&#34;##Y#E&#34;,&#34;####S&#34;] 3&gt;&gt;&gt; solveCrosswordForward crosswordPuzzle == solveCrossword crosswordPuzzle 4True 大型填字题的搜索空间仍可能很大，但“按长度预筛 + 交叉字符传播 + MRV”构成了完整的约束求解主线。

-simple.netlify.com/tags/%E8%A7%A3%E6%9E%90.html"},"https://hugo-dead-simple.netlify.com/tags/%E9%80%BB%E8%BE%91.html":{title:"逻辑",tags:[],content:"",url:"https://hugo-dead-simple.netlify.com/tags/%E9%80%BB%E8%BE%91.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p01.html":{title:"P01 - 取列表最后一个元素",tags:["Haskell","99题","列表"],content:`P01 - 取列表最后一个元素 Last element of a list
官方模块: Problems.P01 核心函数: myLast
P02 取列表倒数第二个元素 →
P02 取列表倒数第二个元素 →
题目描述 找出列表的最后一个元素。如果列表为空，返回 Nothing。
这是列表类问题中最基础的一道，目的是熟悉 Haskell 的递归模式匹配和 Maybe 类型。
函数签名 1myLast :: [a] -&gt; Maybe a 输入一个列表，返回 Just 最后一个元素，空列表返回 Nothing。
思路 Haskell 处理列表的经典手法是递归 + 模式匹配。列表有两种 case：
空列表 []——直接返回 Nothing 列表有元素——需要区分最后一个元素和中间元素： 只有一个元素 [x]（即 x:[]），那 x 就是最后一个，返回 Just x 至少有两个元素 x:xs，那就递归地找 xs 的最后一个元素 实现 方法一：标准递归 这是最直接、最符合 Haskell 风格的写法：
1myLast :: [a] -&gt; Maybe a 2myLast [] = Nothing 3myLast [x] = Just x 4myLast (_:xs) = myLast xs 模式匹配天然处理了三种情况：
[]——空列表 [x]——单元素列表，等价于 (x:[]) (_:xs)——至少两个元素，用 _ 忽略头部，递归处理尾部 这种写法的好处是可读性极强，几乎就是题目描述的直接翻译。
方法二：使用 last + Maybe 包装 Haskell 标准库已经有 Prelude.last 函数，但它对空列表抛异常。我们可以封装一层：
1import Prelude hiding (last) 2 3myLast :: [a] -&gt; Maybe a 4myLast [] = Nothing 5myLast xs = Just (Prelude.last xs) 或者更紧凑地用 maybe 和 listToMaybe（来自 Data.Maybe）：
1import Data.Maybe (listToMaybe) 2 3myLast :: [a] -&gt; Maybe a 4myLast = listToMaybe . reverse reverse 把列表反转，listToMaybe 取反转后列表的第一个元素（即原列表的最后一个），对空列表自动返回 Nothing。
方法三：使用 foldl' 函数式风格还可以用 fold 实现：
1myLast :: [a] -&gt; Maybe a 2myLast [] = Nothing 3myLast xs = Just . foldl&#39; (\\_ x -&gt; x) (head xs) $ xs 但这种方法不如模式匹配直观，仅供理解 fold 的参考。
测试 用官方给出的例子验证：
1-- 基础测试 2&gt;&gt;&gt; myLast [1,2,3,4] 3Just 4 4 5&gt;&gt;&gt; myLast [&#39;x&#39;,&#39;y&#39;,&#39;z&#39;] 6Just &#39;z&#39; 7 8&gt;&gt;&gt; myLast [] 9Nothing 10 11-- 单元素列表 12&gt;&gt;&gt; myLast [42] 13Just 42 14 15-- 嵌套列表（注意类型是 List of Lists） 16&gt;&gt;&gt; myLast [[1,2],[3,4]] 17Just [3,4] 要点总结 模式匹配是处理列表递归的基础工具，[]、[x]、(x:xs) 三种模式覆盖所有情况 用 Maybe 类型处理「可能失败」的操作，是 Haskell 的最佳实践，比抛出异常更安全 这道题虽然简单，但它建立的递归模式（处理空/一个/多个三种情况）会贯穿 P01-P99 参考 官方文档 Haskell 99 题学习路线 P02 取列表倒数第二个元素 →

← P01 取列表最后一个元素 | P03 取列表第 k 个元素 →
题目描述 找出列表的倒数第二个元素（penultimate element）。如果列表不足两个元素，返回 Nothing。
函数签名 1myButLast :: [a] -&gt; Maybe a 思路 和 P01 类似，但需要多一个元素的前瞻。模式匹配时有三种情况：
空列表 [] 或单元素 [_]——不足两个，返回 Nothing 正好两个元素 [x, _]——那 x 就是倒数第二个 至少三个元素 (_:xs)——递归处理 xs，把问题规模缩小 实现 方法一：标准递归 1myButLast :: [a] -&gt; Maybe a 2myButLast [] = Nothing 3myButLast [_] = Nothing 4myButLast [x, _] = Just x 5myButLast (_:xs) = myButLast xs 前两个模式处理不足两元素的 case；[x, _] 匹配正好两个元素，返回第一个；(_:xs) 丢弃头部，在更短的列表上继续找。
方法二：利用 reverse 和 listToMaybe 1import Data.Maybe (listToMaybe) 2 3myButLast :: [a] -&gt; Maybe a 4myButLast [] = Nothing 5myButLast xs = listToMaybe . drop 1 . reverse $ xs reverse 反转后倒数第二个变成正数第二个，drop 1 扔掉第一个，再取 listToMaybe。
方法三：使用标准库 init + last 1myButLast :: [a] -&gt; Maybe a 2myButLast [] = Nothing 3myButLast [_] = Nothing 4myButLast xs = Just . last . init $ xs init 去掉最后一个元素，last 取结果列表的最后一个（即原列表的倒数第二个）。
测试 1&gt;&gt;&gt; myButLast [1,2,3,4] 2Just 3 3 4&gt;&gt;&gt; myButLast [&#39;a&#39;..&#39;z&#39;] 5Just &#39;y&#39; 6 7&gt;&gt;&gt; myButLast [&#39;a&#39;] 8Nothing 9 10&gt;&gt;&gt; myButLast [] 11Nothing 参考 官方文档 Haskell 99 题学习路线 ← P01 取列表最后一个元素 | P03 取列表第 k 个元素 →

← P02 取列表倒数第二个元素 | P04 求列表长度 →
← P02 取列表倒数第二个元素 | P04 求列表长度 →
题目描述 找出列表的第 k 个元素（1-based indexing，第一个元素编号为 1）。如果 k 超出列表范围，返回 Nothing。
函数签名 1elementAt :: [a] -&gt; Int -&gt; Maybe a 思路 这是一个带下标的递归：递归遍历列表的同时递减 k，当 k 减到 1 时返回当前元素。
三种终止条件：
[]——列表提前耗尽，返回 Nothing k &lt; 1——非法下标，返回 Nothing k == 1——命中目标，返回 Just x 实现 方法一：递归递减 1elementAt :: [a] -&gt; Int -&gt; Maybe a 2elementAt [] _ = Nothing 3elementAt _ k | k &lt; 1 = Nothing 4elementAt (x:_) 1 = Just x 5elementAt (_:xs) k = elementAt xs (k - 1) 用 guard k &lt; 1 处理非法下标，模式 (x:_) 配合 1 命中目标，(_:xs) 配合 k 递归缩小。
语法点：Pattern + Guard 写在一行 Haskell 允许把 | guard 直接跟在模式后面写在同一行：
1elementAt _ k | k &lt; 1 = Nothing 等价于更常见的换行写法：
1elementAt _ k 2 | k &lt; 1 = Nothing 这是 Haskell 2010 报告允许的合法语法。适用场景：
guard 条件短且只有一条时，一行更紧凑 guard 条件长或者有多条（| cond1 = ... | cond2 = ...）时，换行更清晰 标准库中也有这种写法，例如 Data.List.isPrefixOf：
1isPrefixOf (x:xs) (y:ys) | x == y = isPrefixOf xs ys 2 | otherwise = False 方法二：使用 drop + listToMaybe 1import Data.Maybe (listToMaybe) 2 3elementAt :: [a] -&gt; Int -&gt; Maybe a 4elementAt xs k 5 | k &lt; 1 = Nothing 6 | otherwise = listToMaybe . drop (k - 1) $ xs drop (k-1) xs 丢掉前 k-1 个元素（如果列表不够长，得到空列表），listToMaybe 取结果列表的第一个元素。
这种写法的好处是不需要手写递归，语义清晰。
方法三：使用 zip 过滤 1elementAt :: [a] -&gt; Int -&gt; Maybe a 2elementAt xs k = lookup k (zip [1..] xs) zip [1..] xs 将列表标号为 [(1, x1), (2, x2), ...]，lookup k 按 key 查找。简洁优雅，但效率是 O(n)。
测试 1&gt;&gt;&gt; elementAt [1,2,3] 2 2Just 2 3 4&gt;&gt;&gt; elementAt &#34;haskell&#34; 5 5Just &#39;e&#39; 6 7&gt;&gt;&gt; elementAt [1,2] 3 8Nothing 9 10&gt;&gt;&gt; elementAt [] 1 11Nothing 12 13&gt;&gt;&gt; elementAt [10,20,30] 0 14Nothing 参考 官方文档 Haskell 99 题学习路线 ← P02 取列表倒数第二个元素 | P04 求列表长度 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p03.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p04.html":{title:"P04 - 求列表长度",tags:["Haskell","99题","列表"],content:`P04 - 求列表长度 Length of a list
官方模块: Problems.P04 核心函数: myLength
← P03 取列表第 k 个元素 | P05 反转列表 →
← P03 取列表第 k 个元素 | P05 反转列表 →
题目描述 求列表的长度，即列表中元素的个数。
函数签名 1myLength :: [a] -&gt; Int 注意这里返回 Int 而不是 Maybe Int——空列表的长度是 0，没有 &ldquo;失败&rdquo; 的情况。
思路 空列表 [] 的长度是 0 非空列表 x:xs 的长度是 1 + myLength xs 这是列表递归的经典入门模式。
实现 方法一：标准递归 1myLength :: [a] -&gt; Int 2myLength [] = 0 3myLength (_:xs) = 1 + myLength xs 最直接的递归定义，可读性最好，但不是尾递归（需要压栈），对大列表可能栈溢出。
方法二：尾递归（累加器） 1myLength :: [a] -&gt; Int 2myLength xs = go 0 xs 3 where 4 go acc [] = acc 5 go acc (_:xs) = go (acc + 1) xs 用累加器 acc 保存已计数的元素，每一步加 1，最后返回累加器。这是尾递归，GHC 会优化为循环，无栈溢出风险。
方法三：使用 foldl' 1import Data.List (foldl&#39;) 2 3myLength :: [a] -&gt; Int 4myLength = foldl&#39; (\\acc _ -&gt; acc + 1) 0 foldl' 是 Haskell 中实现尾递归折叠的标准工具，严格求值避免 thunk 堆积。
方法四：使用 sum + map 1myLength :: [a] -&gt; Int 2myLength = sum . map (const 1) 把每个元素映射为 1，然后求和。思路巧妙但不是最高效的写法。
运算符优先级拆解 初学者常对 sum . map (const 1) 的解析感到困惑。我们像算术表达式一样逐步拆解。
第 1 步：列出所有运算符的优先级
符号 名称 优先级 结合性 空格 (函数应用) application 10 左结合 . 函数组合 9 右结合 数字越大，绑定越紧。这就像算术中 × 优先级 3 &gt; + 优先级 2。
第 2 步：按优先级逐层解析
1sum . map (const 1) 先找优先级最高的——函数应用（空格），优先级 10：
1sum . map (const 1) 2 ├──┬──┘ ← 函数应用: map 应用到 (const 1) 3 └── result ──── ← 得到一个函数: [a] -&gt; [a] map (const 1) 是一个完整的函数应用（就像 2 × 3），得到一个&quot;把每个元素变成 1&quot;的函数。
再找次高的——.，优先级 9：
1sum . (map (const 1)) 2├──┘ ├──────┬──────┘ ← 函数组合: sum 和 map(const 1) 组合 3└────────── result ── ← 等价于 \\xs -&gt; sum (map (const 1) xs) 这就像算术 1 + 2 × 3 → × 优先级更高，所以解析为 1 + (2 × 3)。 同理，sum . map (const 1) → 函数应用优先级更高，所以解析为 sum . (map (const 1))。
第 3 步：如果去掉括号会怎样
1sum . map const 1 函数应用左结合，所以等价于：
1sum . ((map const) 1) ← 先把 map const 组合，再应用到 1 map const 的类型是 [b] -&gt; [a -&gt; a]，再应用到 1（不是列表）→ 类型错误。
记住关键原则：. 右侧如果要传参给函数，必须用括号把整个函数应用包起来。因为函数应用（空格）优先级 10 &gt; . 优先级 9。
测试 1&gt;&gt;&gt; myLength [123, 456, 789] 23 3 4&gt;&gt;&gt; myLength &#34;Hello, world!&#34; 513 6 7&gt;&gt;&gt; myLength [] 80 9 10&gt;&gt;&gt; myLength [1..1000] 111000 要点总结 三种风格：普通递归（直观）、尾递归 + 累加器（高效）、fold（Haskell 惯用） 对于 Int 类型，超过 maxBound :: Int 的长度会溢出，但实际场景几乎不会遇到 foldl' 的严格求值比 foldl 更适合累加场景 参考 官方文档 Haskell 99 题学习路线 ← P03 取列表第 k 个元素 | P05 反转列表 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p04.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p05.html":{title:"P05 - 反转列表",tags:["Haskell","99题","列表"],content:`P05 - 反转列表 Reverse a list
官方模块: Problems.P05 核心函数: myReverse
← P04 求列表长度 | P06 判断回文 →
← P04 求列表长度 | P06 判断回文 →
题目描述 反转列表，将列表中的元素顺序颠倒。
函数签名 1myReverse :: [a] -&gt; [a] 思路 空列表反转后还是空列表 非空列表 x:xs 反转 = reverse xs ++ [x] 这个递归定义很直观，但用 ++ 拼接的效率不高（O(n²)）。更好的方法是尾递归 + 累加器，逐个把元素往前插。
实现 方法一：递归 + ++ 1myReverse :: [a] -&gt; [a] 2myReverse [] = [] 3myReverse (x:xs) = myReverse xs ++ [x] 最直接的递归，但效率很差——总复杂度 O(n²)。小列表没问题，大列表不推荐。
为什么是 O(n²)？ ++ 运算符的代价是 O(左列表长度)，因为它要遍历整个左列表，把每个 cons 单元 (:) 重新指向右列表的头部：
1-- (++) 的定义 2[] ++ ys = ys 3(x:xs) ++ ys = x : (xs ++ ys) 所以 myReverse [1,2,3] 的求值过程是：
1myReverse [1,2,3] 2→ myReverse [2,3] ++ [1] -- ++ 遍历左侧 0 次，递归准备 3→ (myReverse [3] ++ [2]) ++ [1] -- ++ 遍历左侧 0 次，递归准备 4→ ((myReverse [] ++ [3]) ++ [2]) ++ [1] -- ++ 遍历左侧 0 次 5→ (([3]) ++ [2]) ++ [1] -- [3] ++ [2] 遍历 1 个元素 6→ (3 : ([] ++ [2])) ++ [1] -- 继续遍历... 7→ [3,2] ++ [1] -- [3,2] ++ [1] 遍历 2 个元素 8→ 3 : ([2] ++ [1]) -- 继续遍历... 9→ 3 : 2 : ([] ++ [1]) 10→ [3,2,1] 在递归的每一层，当前的左列表长度都在增长：
层级 ++ 左列表长度 遍历次数 第 1 层 0 ([]) 0 第 2 层 1 ([3]) 1 第 3 层 2 ([3,2]) 2 &hellip; &hellip; &hellip; 第 n 层 n-1 n-1 总遍历次数 = 0 + 1 + 2 + &hellip; + (n-1) = n(n-1)/2 = O(n²)
相比之下，尾递归版本（方法二）每步只做一次 : 操作（O(1)），总复杂度 O(n)。
方法二：尾递归（推荐） 1myReverse :: [a] -&gt; [a] 2myReverse xs = go [] xs 3 where 4 go acc [] = acc 5 go acc (x:xs) = go (x:acc) xs 核心思路：遍历原列表，每遇到一个元素就把它放到累加器的最前面（x:acc），当原列表遍历完时，累加器正好是反转结果。
这个实现复杂度 O(n)，是生产环境的标准做法。
方法三：使用 foldl 1myReverse :: [a] -&gt; [a] 2myReverse = foldl (\\acc x -&gt; x : acc) [] foldl 从左到右遍历列表，每次把当前元素 x 插到累计结果 acc 的前面。和方法二的本质完全一样，只是更简洁。
方法四：使用 reverse 标准库 1import Prelude hiding (reverse) 2 3myReverse :: [a] -&gt; [a] 4myReverse = reverse 如果只是想完成任务而不是练习，标准库 reverse（在 GHC.List 中）就是尾递归实现的。
如何理解尾递归反转 假设输入 [1,2,3]：
1go [] [1,2,3] 2→ go (1:[]) [2,3] -- acc = [1] 3→ go (2:1:[]) [3] -- acc = [2,1] 4→ go (3:2:1:[]) [] -- acc = [3,2,1] 5→ [3,2,1] -- 返回 acc 每步都把当前元素前插到累加器，相当于用 : 构造了逆序列表。
测试 1&gt;&gt;&gt; myReverse &#34;A man, a plan, a canal, panama!&#34; 2&#34;!amanap ,lanac a ,nalp a ,nam A&#34; 3 4&gt;&gt;&gt; myReverse [1,2,3,4] 5[4,3,2,1] 6 7&gt;&gt;&gt; myReverse [] 8[] 9 10&gt;&gt;&gt; myReverse [1] 11[1] 参考 官方文档 Haskell 99 题学习路线 ← P04 求列表长度 | P06 判断回文 →

官方模块: Problems.P06 核心函数: isPalindrome
← P05 反转列表 | P07 展平嵌套列表 →
← P05 反转列表 | P07 展平嵌套列表 →
题目描述 判断一个列表是否为回文（palindrome），即正着读和反着读相同。元素类型需要支持相等比较。
函数签名 1isPalindrome :: Eq a =&gt; [a] -&gt; Bool Eq a 约束是因为需要比较元素是否相等。
思路 回文的判定方法有多种：
反转比较：反转列表后与原列表比较 头尾递推：比较首尾元素，然后递归处理中间部分 双指针：用 zip 配对前后元素逐一比较 实现 方法一：反转比较（最简单） 1isPalindrome :: Eq a =&gt; [a] -&gt; Bool 2isPalindrome xs = xs == reverse xs 一行搞定。如果反转后和原列表相同，就是回文。
这是理解上最直接的方法，复杂度 O(n)——reverse 是 O(n)，== 也是 O(n)。
方法二：递归检查首尾 1isPalindrome :: Eq a =&gt; [a] -&gt; Bool 2isPalindrome [] = True 3isPalindrome [_] = True 4isPalindrome (x:xs) = x == last xs &amp;&amp; isPalindrome (init xs) 比较第一个和最后一个，然后递归检查去掉首尾的内部列表。
注意：last 和 init 都是 O(n) 操作，因此这个方法的总复杂度是 O(n²)，不如方法一。
方法三：使用 zip 成对比较（推荐） 1isPalindrome :: Eq a =&gt; [a] -&gt; Bool 2isPalindrome xs = and . zipWith (==) xs . reverse $ xs 将原列表和反转列表用 zipWith 逐对比较，and 检查是否全部相等。如果列表很长，可以只比较前半部分来优化：
1isPalindrome :: Eq a =&gt; [a] -&gt; Bool 2isPalindrome xs = and . zipWith (==) xs . reverse $ xs 3 where 4 half = length xs \`div\` 2 方法四：使用 foldr 构建反转并比较 1isPalindrome :: Eq a =&gt; [a] -&gt; Bool 2isPalindrome xs = xs == foldr (:) [] xs foldr (:) [] xs 用右 fold 重新构造列表——对于列表来说是恒等操作？不对，实际上 foldr (:) [] xs == xs 是恒等的。
要检查回文，正确用法是依赖 reverse，或者用 foldl 构建反转：
1isPalindrome :: Eq a =&gt; [a] -&gt; Bool 2isPalindrome xs = xs == foldl (\\acc x -&gt; x : acc) [] xs 测试 1&gt;&gt;&gt; isPalindrome [1,2,3] 2False 3 4&gt;&gt;&gt; isPalindrome &#34;madamimadam&#34; 5True 6 7&gt;&gt;&gt; isPalindrome [1,2,4,8,16,8,4,2,1] 8True 9 10&gt;&gt;&gt; isPalindrome &#34;&#34; 11True 12 13&gt;&gt;&gt; isPalindrome &#34;a&#34; 14True 参考 官方文档 Haskell 99 题学习路线 ← P05 反转列表 | P07 展平嵌套列表 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p06.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p07.html":{title:"P07 - 展平嵌套列表",tags:["Haskell","99题","列表"],content:`P07 - 展平嵌套列表 Flatten a nested list structure
官方模块: Problems.P07 核心函数: flatten
← P06 判断回文 | P08 去除连续重复元素 →
← P06 判断回文 | P08 去除连续重复元素 →
题目描述 展平一个嵌套列表结构。需要自定义 NestedList 数据类型，可以是单个元素 Elem a 或子列表 List [NestedList a]。
函数签名 1flatten :: NestedList a -&gt; [a] NestedList 数据类型 要表示 &ldquo;嵌套列表&rdquo;，普通列表不够用——[a] 只能存储同一类型的元素，而嵌套列表在任意深度都可能是一个元素或一个子列表。
Haskell 的代数数据类型（ADT）正是解决这类问题的利器：
1data NestedList a 2 = Elem a 3 | List [NestedList a] 4 deriving (Show, Eq) 这定义了一个递归类型：
Elem a——一个普通元素（叶子节点） List [NestedList a]——一个子列表（内部节点），其元素可以是 Elem 或 List 例如 List [Elem 1, List [Elem 2, List [Elem 3, Elem 4], Elem 5]] 表示 [1,[2,[3,4],5]]。
思路 递归遍历 NestedList：
Elem x → [x]（单个元素转成单元素列表） List xs → concatMap flatten xs（对每个子元素递归展平，然后拼接） 这正是 flatten 的语义：遇到叶子就包裹成列表，遇到内部节点就展平后合并。
实现 方法一：递归模式匹配 1flatten :: NestedList a -&gt; [a] 2flatten (Elem x) = [x] 3flatten (List []) = [] 4flatten (List (x:xs)) = flatten x ++ flatten (List xs) 这版写法最显式地展示了递归结构：
Elem x 直接返回单元素列表 List [] 空子列表返回空 List (x:xs) 展平第一个子元素，再拼上展平剩余部分 方法二：concatMap（更简洁） 1flatten :: NestedList a -&gt; [a] 2flatten (Elem x) = [x] 3flatten (List xs) = concatMap flatten xs concatMap flatten xs = concat (map flatten xs)，先对每个子元素 flatten，再把所有结果拼成一个列表。
方法三：纯 fold 风格 1flatten :: NestedList a -&gt; [a] 2flatten (Elem x) = [x] 3flatten (List xs) = foldMap flatten xs foldMap 来自 Data.Foldable，它用 Monoid 的 mappend（对列表就是 ++）来组合结果。这里 foldMap flatten xs 等价于 concatMap flatten xs。
理解 NestedList 的内存结构 1List [ 2 Elem 1, 3 List [ 4 Elem 2, 5 List [Elem 3, Elem 4], 6 Elem 5 7 ] 8] 可以看作树形结构：
1 List 2 / | \\ 3 1 List ... 4 / | \\ 5 2 List 5 6 / \\ 7 3 4 flatten 就是做了一次前序遍历，把所有叶子节点的值收集到列表中。
测试 1&gt;&gt;&gt; flatten (Elem 5) 2[5] 3 4&gt;&gt;&gt; flatten (List [Elem 1, List [Elem 2, List [Elem 3, Elem 4], Elem 5]]) 5[1,2,3,4,5] 6 7&gt;&gt;&gt; flatten (List []) 8[] 9 10&gt;&gt;&gt; flatten (List [Elem 1, Elem 2, Elem 3]) 11[1,2,3] 要点总结 递归 ADT 用递归函数处理：NestedList 是递归类型，flatten 自然地也是递归函数 concatMap flatten xs 是核心模式：遍历每个子元素，递归展平，合并结果——这种模式在后面树的问题中会反复出现 这道题是理解 Haskell 自定义数据类型的绝佳起点，为后面二叉树、多路树打好基础 参考 官方文档 Haskell 99 题学习路线 ← P06 判断回文 | P08 去除连续重复元素 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p07.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p08.html":{title:"P08 - 去除连续重复元素",tags:["Haskell","99题","列表"],content:`P08 - 去除连续重复元素 Eliminate consecutive duplicates of list elements
官方模块: Problems.P08 核心函数: compress
← P07 展平嵌套列表 | P09 将连续重复元素打包成子列表 →
← P07 展平嵌套列表 | P09 将连续重复元素打包成子列表 →
题目描述 去除列表中连续重复的元素，每组连续相同元素只保留一个。元素的相对顺序不变。
函数签名 1compress :: Eq a =&gt; [a] -&gt; [a] 需要 Eq a 约束来比较元素是否相等。
思路 遍历列表，只保留与前一个元素不同的那些元素。即：
空列表 → [] 单元素 → 原样保留 x : y : xs： 如果 x == y，跳过 y，继续检查 x 和 xs 的头部 如果 x /= y，保留 x，递归处理 y : xs 实现 方法一：模式匹配 + 递归 1compress :: Eq a =&gt; [a] -&gt; [a] 2compress [] = [] 3compress [x] = [x] 4compress (x:y:xs) 5 | x == y = compress (x:xs) 6 | otherwise = x : compress (y:xs) 最直接的递归版本。[x] 模式处理单元素列表（避免不必要的对比），双元素 (x:y:xs) 模式决定去重还是保留。
方法二：使用 map + group 1import Data.List (group) 2 3compress :: Eq a =&gt; [a] -&gt; [a] 4compress = map head . group group 把连续重复元素打包成子列表（&quot;aaaabccaadeeee&quot; → [&quot;aaaa&quot;,&quot;b&quot;,&quot;cc&quot;,&quot;aa&quot;,&quot;d&quot;,&quot;eeee&quot;]），map head 取每个子列表的第一个元素。
这是一个经典的 Haskell 单行惯用法。
方法三：使用 foldr 1compress :: Eq a =&gt; [a] -&gt; [a] 2compress = foldr go [] 3 where 4 go x [] = [x] 5 go x acc 6 | x == head acc = acc 7 | otherwise = x : acc 从右向左 fold，如果当前元素等于已积累结果的头部，就跳过它。
理解 group 的工作方式 Data.List.group 是 P09 要解决的问题。但在 P08 中我们可以用它来简化实现：
1输入: &#34;aaaabccaadeeee&#34; 2group: [&#34;aaaa&#34;,&#34;b&#34;,&#34;cc&#34;,&#34;aa&#34;,&#34;d&#34;,&#34;eeee&#34;] 3map head: &#34;abcade&#34; 每一组连续重复元素被压成一个单元素，恰好完成去重。
测试 1&gt;&gt;&gt; compress &#34;aaaabccaadeeee&#34; 2&#34;abcade&#34; 3 4&gt;&gt;&gt; compress [1,1,2,2,3,3,3,1,1] 5[1,2,3,1] 6 7&gt;&gt;&gt; compress [] 8[] 9 10&gt;&gt;&gt; compress &#34;a&#34; 11&#34;a&#34; 注意最后的 1 不会被去掉，因为 compress 只去连续重复，而这两个 1 被 2,3 隔开了。
参考 官方文档 Haskell 99 题学习路线 ← P07 展平嵌套列表 | P09 将连续重复元素打包成子列表 →

官方模块: Problems.P09 核心函数: pack
← P08 去除连续重复元素 | P10 游程编码 →
← P08 去除连续重复元素 | P10 游程编码 →
题目描述 将列表中连续重复的元素打包成子列表。每个子列表包含一组连续相同的元素。
函数签名 1pack :: Eq a =&gt; [a] -&gt; [[a]] 思路 维护一个当前正在构建的子列表（current group）。遍历输入列表：
如果当前元素和当前组的元素相同，加入当前组 如果不同，结束当前组，开始一个新组 在 Haskell 中可以用两种思路实现：
显式递归：手动维护当前组和已完成的组列表 高阶函数：用 span 或 groupBy 抽象分组逻辑 实现 方法一：递归 + 累加器 1pack :: Eq a =&gt; [a] -&gt; [[a]] 2pack [] = [] 3pack (x:xs) = let (group, rest) = span (== x) xs 4 in (x : group) : pack rest span (== x) xs 从 xs 头部开始，提取所有等于 x 的连续元素（返回两个部分：匹配的列表和剩余部分）。然后把 x 放在匹配列表前面，构成一组，再递归处理剩余部分。
方法二：使用 group（标准库） 1import Data.List (group) 2 3pack :: Eq a =&gt; [a] -&gt; [[a]] 4pack = group 标准库 Data.List.group 做的就是这个事。但如果自己实现，用方法一或方法三。
方法三：显式递归（逐元素推进） 1pack :: Eq a =&gt; [a] -&gt; [[a]] 2pack [] = [] 3pack (x:xs) = go [x] xs 4 where 5 go current [] = [current] 6 go current@(c:_) (y:ys) 7 | c == y = go (y:current) ys 8 | otherwise = current : go [y] ys 用累加器 current 手动构建当前组。如果下一元素和当前组元素相同，加入组；否则结束当前组，开始新组。
注意：因为用 : 前插，组内元素是逆序的，但 group 不要求组内元素有序，所以不影响。
如果需要保持组内顺序，可以用 go (current ++ [y]) ys 但效率低。更好的做法是最后 reverse 每个组。
理解 span span :: (a -&gt; Bool) -&gt; [a] -&gt; ([a], [a]) 在谓词首次不满足时切分列表：
1span (== &#39;a&#39;) &#34;aaaabccaadeeee&#34; → (&#34;aaaa&#34;, &#34;bccaadeeee&#34;) 这正是分组需要的操作：从当前元素开始，把所有连续相等的元素切出来。
示例过程 输入 &quot;aaaabccaadeeee&quot;：
1pack &#34;aaaabccaadeeee&#34; 2→ span (== &#39;a&#39;) &#34;aaaabccaadeeee&#34; = (&#34;aaaa&#34;,&#34;bccaadeeee&#34;) 3→ &#34;a&#34; : &#34;aaaa&#34; = &#34;aaaa&#34; → [&#34;aaaa&#34;] ++ pack &#34;bccaadeeee&#34; 4 5pack &#34;bccaadeeee&#34; 6→ span (== &#39;b&#39;) &#34;bccaadeeee&#34; = (&#34;b&#34;,&#34;ccaadeeee&#34;) 7→ [&#34;b&#34;] ++ pack &#34;ccaadeeee&#34; 8 9... 最终 → [&#34;aaaa&#34;,&#34;b&#34;,&#34;cc&#34;,&#34;aa&#34;,&#34;d&#34;,&#34;eeee&#34;] 测试 1&gt;&gt;&gt; pack &#34;aaaabccaadeeee&#34; 2[&#34;aaaa&#34;,&#34;b&#34;,&#34;cc&#34;,&#34;aa&#34;,&#34;d&#34;,&#34;eeee&#34;] 3 4&gt;&gt;&gt; pack [1,1,2,2,2,3] 5[[1,1],[2,2,2],[3]] 6 7&gt;&gt;&gt; pack [] 8[] 9 10&gt;&gt;&gt; pack &#34;a&#34; 11[&#34;a&#34;] 参考 官方文档 Haskell 99 题学习路线 ← P08 去除连续重复元素 | P10 游程编码 →

官方模块: Problems.P10 核心函数: encode
← P09 将连续重复元素打包成子列表 | P11 改进的游程编码 →
← P09 将连续重复元素打包成子列表 | P11 改进的游程编码 →
题目描述 利用 P09 的 pack 函数实现游程编码（run-length encoding）：将连续重复的元素编码为 (元素, 出现次数) 元组。
函数签名 1encode :: Eq a =&gt; [a] -&gt; [(Int, a)] 输出格式为 [(出现次数, 元素)]。
思路 题目明确提示用 P09 的 pack 来实现：
pack 把连续重复元素打包成子列表 对每个子列表，取其长度（出现次数）和第一个元素 组合成 (count, element) 元组 实现 方法一：利用 pack 1encode :: Eq a =&gt; [a] -&gt; [(Int, a)] 2encode xs = [(length group, head group) | group &lt;- pack xs] 列表推导式：每个 group 来自 pack xs，取 length group 作为出现次数，head group 作为元素。
也可以用 map 写：
1encode :: Eq a =&gt; [a] -&gt; [(Int, a)] 2encode = map (\\group -&gt; (length group, head group)) . pack 方法二：自己实现 pack + encode（不依赖外部函数） 1encode :: Eq a =&gt; [a] -&gt; [(Int, a)] 2encode [] = [] 3encode (x:xs) = let (group, rest) = span (== x) xs 4 in (1 + length group, x) : encode rest 不依赖 pack，直接用 span 边分组边编码。每步切分出与 x 相等的连续段，个数是 1 + length group。
方法三：使用 group 标准库 1import Data.List (group) 2 3encode :: Eq a =&gt; [a] -&gt; [(Int, a)] 4encode = map (\\g -&gt; (length g, head g)) . group Data.List.group 等价于 P09 的 pack。
编码与压缩 游程编码是数据压缩中最基础的方法。对于有大量连续重复的数据（如图像的二值化表示），压缩比非常可观：
1encode &#34;WWWWWWWWWWWWBWWWWWWWWWWWWBBBWWWWWWWWWWWWWWWWWWWWWWWWB&#34; 2-- [(12,&#39;W&#39;),(1,&#39;B&#39;),(12,&#39;W&#39;),(3,&#39;B&#39;),(24,&#39;W&#39;),(1,&#39;B&#39;)] 12 个 &lsquo;W&rsquo; 编码为 (12, 'W')，一个字符加一个整数，比存 12 个字符省得多。
测试 1&gt;&gt;&gt; encode &#34;aaaabccaadeeee&#34; 2[(4,&#39;a&#39;),(1,&#39;b&#39;),(2,&#39;c&#39;),(2,&#39;a&#39;),(1,&#39;d&#39;),(4,&#39;e&#39;)] 3 4&gt;&gt;&gt; encode [] 5[] 6 7&gt;&gt;&gt; encode [1,1,2,2,2,3] 8[(2,1),(3,2),(1,3)] 9 10&gt;&gt;&gt; encode &#34;a&#34; 11[(1,&#39;a&#39;)] 参考 官方文档 Haskell 99 题学习路线 ← P09 将连续重复元素打包成子列表 | P11 改进的游程编码 →

官方模块: Problems.P11 核心函数: encodeModified
← P10 游程编码 | P12 解码游程编码 →
题目描述 修改 P10 的 encode 函数——如果元素没有重复，直接以 Single 形式放入结果列表；只有重复的元素才编码为 Multiple n x。
输出类型不再是 [(Int, a)]，而是自定义的 Encoding a 类型。
Encoding 数据类型 1data Encoding a 2 = Single a -- 只出现一次的元素 3 | Multiple Int a -- 出现 n 次的元素 4 deriving (Show, Eq) 函数签名 1encodeModified :: Eq a =&gt; [a] -&gt; [Encoding a] 思路 基于 P09 的 pack（或 P10 的 encode），对每一组连续重复元素：
如果长度为 1 → Single x 如果长度 &gt; 1 → Multiple n x 实现 方法一：基于 pack 1import Data.List (group) 2 3encodeModified :: Eq a =&gt; [a] -&gt; [Encoding a] 4encodeModified = map encodeGroup . group 5 where 6 encodeGroup [x] = Single x 7 encodeGroup xs = Multiple (length xs) (head xs) group 把连续重复元素打包成子列表，然后根据子列表长度选择 Single 或 Multiple。
方法二：基于 P10 的 encode 1encodeModified :: Eq a =&gt; [a] -&gt; [Encoding a] 2encodeModified = map convert . encode 3 where 4 convert (1, x) = Single x 5 convert (n, x) = Multiple n x 先做 P10 的标准编码，再把 (1, x) 转为 Single x。
方法三：手动递归 1encodeModified :: Eq a =&gt; [a] -&gt; [Encoding a] 2encodeModified [] = [] 3encodeModified (x:xs) = case span (== x) xs of 4 (same, rest) -&gt; let n = 1 + length same 5 in (if n == 1 then Single x else Multiple n x) : encodeModified rest span (== x) xs 切分出与 x 相等的连续段，根据长度直接构造 Encoding。
测试 1&gt;&gt;&gt; encodeModified &#34;aaaabccaadeeee&#34; 2[Multiple 4 &#39;a&#39;, Single &#39;b&#39;, Multiple 2 &#39;c&#39;, Multiple 2 &#39;a&#39;, Single &#39;d&#39;, Multiple 4 &#39;e&#39;] 3 4&gt;&gt;&gt; encodeModified [] 5[] 6 7&gt;&gt;&gt; encodeModified &#34;a&#34; 8[Single &#39;a&#39;] 参考 官方文档 Haskell 99 题学习路线 ← P10 游程编码 | P12 解码游程编码 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p11.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p12.html":{title:"P12 - 解码游程编码",tags:["Haskell","99题","列表"],content:`P12 - 解码游程编码 Decode a run-length encoded list
官方模块: Problems.P12 核心函数: decodeModified
← P11 改进的游程编码 | P13 直接实现游程编码 →
题目描述 将 P11 生成的 Encoding 编码列表解码，还原为原始列表。Single x 展开为单个 x，Multiple n x 展开为 n 个 x。
函数签名 1decodeModified :: [Encoding a] -&gt; [a] 思路 遍历编码列表，对每个编码：
Single x → [x] Multiple n x → replicate n x 然后用 concat 把所有结果拼接起来。
实现 方法一：concatMap 1decodeModified :: [Encoding a] -&gt; [a] 2decodeModified = concatMap expand 3 where 4 expand (Single x) = [x] 5 expand (Multiple n x) = replicate n x 最直接的实现，concatMap 遍历并展平。
方法二：列表推导 1decodeModified :: [Encoding a] -&gt; [a] 2decodeModified [] = [] 3decodeModified (Single x : rest) = x : decodeModified rest 4decodeModified (Multiple n x : rest) = replicate n x ++ decodeModified rest 显式递归，逐个处理编码。
方法三：使用 foldr 1decodeModified :: [Encoding a] -&gt; [a] 2decodeModified = foldr expand [] 3 where 4 expand (Single x) acc = x : acc 5 expand (Multiple n x) acc = replicate n x ++ acc 为什么叫&quot;改进的&quot;编码？ 对比 P10 的标准编码 [(Int, a)] 和 P11 的改进编码 [Encoding a]：
1P10: [(4,&#39;a&#39;), (1,&#39;b&#39;), (2,&#39;c&#39;), (2,&#39;a&#39;), (1,&#39;d&#39;), (4,&#39;e&#39;)] 2P11: [Multiple 4 &#39;a&#39;, Single &#39;b&#39;, Multiple 2 &#39;c&#39;, Multiple 2 &#39;a&#39;, Single &#39;d&#39;, Multiple 4 &#39;e&#39;] 改进之处在于用类型系统表达语义——Single 明确表示&quot;只有一个&quot;，比 (1, 'a') 更自解释。
测试 1&gt;&gt;&gt; decodeModified [Multiple 4 &#39;a&#39;, Single &#39;b&#39;, Multiple 2 &#39;c&#39;, Multiple 2 &#39;a&#39;, Single &#39;d&#39;, Multiple 4 &#39;e&#39;] 2&#34;aaaabccaadeeee&#34; 3 4&gt;&gt;&gt; decodeModified [] 5[] 6 7&gt;&gt;&gt; decodeModified [Single &#39;x&#39;] 8&#34;x&#34; ← P11 改进的游程编码 | P13 直接实现游程编码 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p12.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p13.html":{title:"P13 - 直接实现游程编码",tags:["Haskell","99题","列表"],content:`P13 - 直接实现游程编码 Direct run-length encoding of a list
官方模块: Problems.P13 核心函数: encodeDirect
← P12 解码游程编码 | P14 复制每个元素 →
题目描述 实现游程编码，但不借助 pack 或 group 等中间打包步骤——直接边遍历边计数，生成 [Encoding a]。
结果格式与 P11 相同：单个元素用 Single，重复元素用 Multiple n。
函数签名 1encodeDirect :: Eq a =&gt; [a] -&gt; [Encoding a] 思路 遍历列表，用一个计数器记录当前连续重复元素的个数：
当前元素和下一个不同 → 结束当前组，输出 Single 或 Multiple，重置计数器 当前元素和下一个相同 → 计数器加 1，继续 实现 方法一：递归 + 累加器 1encodeDirect :: Eq a =&gt; [a] -&gt; [Encoding a] 2encodeDirect [] = [] 3encodeDirect (x:xs) = go x 1 xs 4 where 5 go a n [] = [toEncoding a n] 6 go a n (b:bs) 7 | a == b = go a (n + 1) bs 8 | otherwise = toEncoding a n : go b 1 bs 9 10 toEncoding x 1 = Single x 11 toEncoding x n = Multiple n x go a n 维护当前元素 a 和出现次数 n。遇到不同元素时，把当前组输出为 Encoding，重置计数器处理新元素。
方法二：使用 span 简化 1encodeDirect :: Eq a =&gt; [a] -&gt; [Encoding a] 2encodeDirect [] = [] 3encodeDirect (x:xs) = case span (== x) xs of 4 (same, rest) -&gt; let n = 1 + length same 5 in (if n == 1 then Single x else Multiple n x) : encodeDirect rest span 自动切分出与 x 相等的连续段，比手动维护计数器更简洁。
方法三：使用 foldr 1encodeDirect :: Eq a =&gt; [a] -&gt; [Encoding a] 2encodeDirect = foldr go [] 3 where 4 go x [] = [Single x] 5 go x (Single y : rest) 6 | x == y = Multiple 2 x : rest 7 | otherwise = Single x : Single y : rest 8 go x (Multiple n y : rest) 9 | x == y = Multiple (n + 1) y : rest 10 | otherwise = Single x : Multiple n y : rest 从右向左扫描，遇到相同元素就递增计数器，不同就插入新的 Single。
三种方法对比 方法 思路 特点 递归 + go 手动维护计数器 逻辑显式，适合理解 span 版 自动切分连续段 最简洁 foldr 版 从右向左构建 巧妙但难读 测试 1&gt;&gt;&gt; encodeDirect &#34;aaaabccaadeeee&#34; 2[Multiple 4 &#39;a&#39;, Single &#39;b&#39;, Multiple 2 &#39;c&#39;, Multiple 2 &#39;a&#39;, Single &#39;d&#39;, Multiple 4 &#39;e&#39;] 3 4&gt;&gt;&gt; encodeDirect [] 5[] 6 7&gt;&gt;&gt; encodeDirect &#34;a&#34; 8[Single &#39;a&#39;] 参考 官方文档 Haskell 99 题学习路线 ← P12 解码游程编码 | P14 复制每个元素 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p13.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p14.html":{title:"P14 - 复制每个元素",tags:["Haskell","99题","列表"],content:`P14 - 复制每个元素 Duplicate elements of a list
官方模块: Problems.P14 核心函数: dupli
← P13 直接实现游程编码 | P15 每个元素重复 N 次 →
题目描述 将列表中的每个元素复制一份，即每个元素在结果中连续出现两次。
函数签名 1dupli :: [a] -&gt; [a] 思路 遍历列表，对每个元素输出两次：x : x : dupli xs。
实现 方法一：递归 1dupli :: [a] -&gt; [a] 2dupli [] = [] 3dupli (x:xs) = x : x : dupli xs 最直接的递归，每个元素放两次。
方法二：concatMap 1dupli :: [a] -&gt; [a] 2dupli = concatMap (\\x -&gt; [x, x]) 或者更简洁地：
1dupli = concatMap (replicate 2) concatMap 详解 concatMap f xs = concat (map f xs)——先 map 再 concat，一步完成&quot;映射并展平&quot;。
拆解 concatMap (\\x -&gt; [x, x]) [1,2,3]：
1第一步 map: f 1 = [1,1] f 2 = [2,2] f 3 = [3,3] 2 → [[1,1], [2,2], [3,3]] 3 4第二步 concat: 拼接所有子列表 → [1,1,2,2,3,3] 所以 concatMap (\\x -&gt; [x, x]) 的意思是：对每个元素，生成一个包含该元素两次的小列表，再把所有小列表拼成一个大列表。
如果 dupli 用 map 实现（忘记 concat）：
1map (\\x -&gt; [x,x]) [1,2,3] → [[1,1],[2,2],[3,3]] -- 类型是 [[Int]]，不对 结果类型不对——map 返回的是列表的列表。concatMap 相当于 map 之后再 concat，一步到位把嵌套展平。
方法三：列表推导 1dupli xs = [x | x &lt;- xs, _ &lt;- [1, 2]] _ &lt;- [1, 2] 让每个 x 被取两次。
测试 1&gt;&gt;&gt; dupli [1, 2, 3] 2[1,1,2,2,3,3] 3 4&gt;&gt;&gt; dupli [] 5[] 6 7&gt;&gt;&gt; dupli &#34;hi&#34; 8&#34;hhii&#34; 参考 官方文档 Haskell 99 题学习路线 ← P13 直接实现游程编码 | P15 每个元素重复 N 次 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p14.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p15.html":{title:"P15 - 每个元素重复 N 次",tags:["Haskell","99题","列表"],content:`P15 - 每个元素重复 N 次 Replicate elements of a list a given number of times
官方模块: Problems.P15 核心函数: repli
← P14 复制每个元素 | P16 每隔 N 个删除一个元素 →
题目描述 将列表中的每个元素重复指定的次数。
函数签名 1repli :: [a] -&gt; Int -&gt; [a] 思路 repli xs n = 对每个 x，输出 replicate n x，然后拼接。
这实际上是 P14（每个元素重复 2 次）的泛化版本。
实现 方法一：递归 1repli :: [a] -&gt; Int -&gt; [a] 2repli [] _ = [] 3repli (x:xs) n = replicate n x ++ repli xs n 对每个元素 replicate 后递归拼接。
方法二：concatMap 1repli :: [a] -&gt; Int -&gt; [a] 2repli xs n = concatMap (\\x -&gt; replicate n x) xs 也可以写成无参风格：
1repli :: [a] -&gt; Int -&gt; [a] 2repli xs n = concatMap (replicate n) xs 方法三：列表推导 1repli :: [a] -&gt; Int -&gt; [a] 2repli xs n = [x | x &lt;- xs, _ &lt;- [1..n]] _ &lt;- [1..n] 让每个 x 被重复 n 次。
repli vs replicate 注意区分两个名字相近的函数：
函数 作用 replicate n x 生成 n 个 x 组成的列表 repli xs n 把列表 xs 的每个元素重复 n 次 测试 1&gt;&gt;&gt; repli &#34;abc&#34; 3 2&#34;aaabbbccc&#34; 3 4&gt;&gt;&gt; repli [1,2] 4 5[1,1,1,1,2,2,2,2] 6 7&gt;&gt;&gt; repli [] 5 8[] 参考 官方文档 Haskell 99 题学习路线 ← P14 复制每个元素 | P16 每隔 N 个删除一个元素 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p15.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p16.html":{title:"P16 - 每隔 N 个删除一个元素",tags:["Haskell","99题","列表"],content:`P16 - 每隔 N 个删除一个元素 Drop every N&rsquo;th element from a list
官方模块: Problems.P16 核心函数: dropEvery
← P15 每个元素重复 N 次 | P17 在 N 处切分列表 →
题目描述 删除列表中每隔 N 个位置的元素（从 1 开始计数）。
函数签名 1dropEvery :: [a] -&gt; Int -&gt; [a] 思路 两种思路：
带计数器递归：维护一个下标计数器，每到 N 就跳过 zip 标号过滤：给每个元素标上位置序号，只保留序号不是 N 的倍数的 实现 方法一：递归 + 计数器 1dropEvery :: [a] -&gt; Int -&gt; [a] 2dropEvery [] _ = [] 3dropEvery (x:xs) n = go x 1 xs 4 where 5 go x i [] = if i == n then [] else [x] 6 go x i (y:ys) 7 | i == n = go y 1 ys 8 | otherwise = x : go y (i + 1) ys 用一个计数器 i 跟踪当前位置，每到 N 就丢弃当前元素。
也可以把当前元素和计数器一起追踪，更简洁的写法：
1dropEvery :: [a] -&gt; Int -&gt; [a] 2dropEvery xs n = [x | (x, i) &lt;- zip xs [1..], i \`mod\` n /= 0] 方法二：zip + 列表推导（推荐） 1dropEvery :: [a] -&gt; Int -&gt; [a] 2dropEvery xs n = map fst . filter (\\(_, i) -&gt; i \`mod\` n /= 0) $ zip xs [1..] zip xs [1..] 给每个元素编号，filter 去掉序号是 n 的倍数的元素，map fst 取回原值。
方法三：take/drop 分块 1dropEvery :: [a] -&gt; Int -&gt; [a] 2dropEvery [] _ = [] 3dropEvery xs n = take (n - 1) xs ++ dropEvery (drop n xs) n 取前 n-1 个保留，跳过第 n 个，递归处理剩余部分。这个实现最符合&quot;间隔删除&quot;的语义理解。
dropEvery 的求值过程 以 dropEvery &quot;abcdefghik&quot; 3 为例：
1dropEvery &#34;abcdefghik&#34; 3 2= take 2 &#34;abcdefghik&#34; ++ dropEvery (drop 3 &#34;abcdefghik&#34;) 3 3= &#34;ab&#34; ++ dropEvery &#34;defghik&#34; 3 4= &#34;ab&#34; ++ (&#34;de&#34; ++ dropEvery &#34;ghik&#34; 3) 5= &#34;ab&#34; ++ (&#34;de&#34; ++ (&#34;gh&#34; ++ dropEvery &#34;k&#34; 3)) 6= &#34;ab&#34; ++ (&#34;de&#34; ++ (&#34;gh&#34; ++ &#34;k&#34;)) 7= &#34;abdeghk&#34; 测试 1&gt;&gt;&gt; dropEvery &#34;abcdefghik&#34; 3 2&#34;abdeghk&#34; 3 4&gt;&gt;&gt; dropEvery [1,2,3,4,5] 2 5[1,3,5] 6 7&gt;&gt;&gt; dropEvery &#34;a&#34; 3 8&#34;a&#34; 9 10&gt;&gt;&gt; dropEvery [] 3 11[] 参考 官方文档 Haskell 99 题学习路线 ← P15 每个元素重复 N 次 | P17 在 N 处切分列表 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p16.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p17.html":{title:"P17 - 在 N 处切分列表",tags:["Haskell","99题","列表"],content:`P17 - 在 N 处切分列表 Split a list into two parts
官方模块: Problems.P17 核心函数: split
← P16 每隔 N 个删除一个元素 | P18 提取子列表 →
题目描述 在指定的位置 N 处将列表切分为两个子列表。前一部分包含前 N 个元素，后一部分包含剩余元素。
函数签名 1split :: [a] -&gt; Int -&gt; ([a], [a]) 思路 take n xs 取前 N 个 drop n xs 取剩余部分 实现 方法一：take + drop 1split :: [a] -&gt; Int -&gt; ([a], [a]) 2split xs n = (take n xs, drop n xs) 标准库 splitAt 做的就是这件事，这就是它的实现方式。
如果 N 大于列表长度，take 返回整个列表，drop 返回空列表，行为安全。
方法二：递归 1split :: [a] -&gt; Int -&gt; ([a], [a]) 2split xs 0 = ([], xs) 3split [] _ = ([], []) 4split (x:xs) n = let (first, second) = split xs (n - 1) 5 in (x : first, second) 不用 take/drop，纯递归实现。N 递减到 0 时停止取元素。
方法三：使用标准库 1import Data.List (splitAt) 2 3split :: [a] -&gt; Int -&gt; ([a], [a]) 4split = splitAt 标准库的 splitAt 就是 P17 的官方解法。
与 splitAt 的关系 实际上 P17 的 split 就是标准库 splitAt 的重新实现。splitAt 在 GHC.List 中的定义就是：
1splitAt n xs = (take n xs, drop n xs) 测试 1&gt;&gt;&gt; split &#34;abcdefghik&#34; 3 2(&#34;abc&#34;,&#34;defghik&#34;) 3 4&gt;&gt;&gt; split [1,2,3] 5 5([1,2,3],[]) 6 7&gt;&gt;&gt; split [] 3 8([],[]) 参考 官方文档 Haskell 99 题学习路线 ← P16 每隔 N 个删除一个元素 | P18 提取子列表 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p17.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p18.html":{title:"P18 - 提取子列表",tags:["Haskell","99题","列表"],content:`P18 - 提取子列表 Extract a slice from a list
官方模块: Problems.P18 核心函数: slice
← P17 在 N 处切分列表 | P19 旋转列表 N 位 →
题目描述 从列表中提取一段子列表，包含从第 i 个到第 k 个元素（1-based indexing，两端包含）。
函数签名 1slice :: [a] -&gt; Int -&gt; Int -&gt; [a] 思路 take (k - i + 1) . drop (i - 1)：
drop (i - 1) 丢掉前 i-1 个元素 take (k - i + 1) 取剩下的前 (k - i + 1) 个元素 实现 方法一：take + drop 组合 1slice :: [a] -&gt; Int -&gt; Int -&gt; [a] 2slice xs i k = take (k - i + 1) (drop (i - 1) xs) 也可以写成无参风格：
1slice :: [a] -&gt; Int -&gt; Int -&gt; [a] 2slice xs i k = take (k - i + 1) . drop (i - 1) $ xs 方法二：递归 1slice :: [a] -&gt; Int -&gt; Int -&gt; [a] 2slice [] _ _ = [] 3slice (x:xs) 1 1 = [x] 4slice (x:xs) 1 k = x : slice xs 1 (k - 1) 5slice (x:xs) i k = slice xs (i - 1) (k - 1) 三个模式分别处理：列表耗尽、命中单元素、在范围内收集、还没到起始位置。
方法三：使用 zip 过滤 1slice :: [a] -&gt; Int -&gt; Int -&gt; [a] 2slice xs i k = map snd . filter (\\(idx, _) -&gt; idx &gt;= i &amp;&amp; idx &lt;= k) $ zip [1..] xs 给每个元素编号，按序号范围过滤。思路直观但不高效（需要遍历整个列表）。
边界情况 注意 i 和 k 可能超出列表范围：
1&gt;&gt;&gt; slice [1,2,3] 2 10 -- k 超出范围 2[2,3] 3 4&gt;&gt;&gt; slice [1,2,3] 0 2 -- i 从 0 开始（不标准，但安全） 5[1,2] 标准定义下如果 i &gt; 列表长度，结果为 []；如果 k &gt; 列表长度，取到末尾为止。
测试 1&gt;&gt;&gt; slice &#34;abcdefghijk&#34; 3 7 2&#34;cdefg&#34; 3 4&gt;&gt;&gt; slice [1,2,3,4,5] 2 4 5[2,3,4] 6 7&gt;&gt;&gt; slice &#34;hello&#34; 1 1 8&#34;h&#34; 9 10&gt;&gt;&gt; slice &#34;hello&#34; 6 10 11[] 参考 官方文档 Haskell 99 题学习路线 ← P17 在 N 处切分列表 | P19 旋转列表 N 位 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p18.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p19.html":{title:"P19 - 旋转列表 N 位",tags:["Haskell","99题","列表"],content:`P19 - 旋转列表 N 位 Rotate a list N places to the left
官方模块: Problems.P19 核心函数: rotate
← P18 提取子列表 | P20 删除第 k 个元素 →
题目描述 将列表向左旋转 N 位。N 为正数时左移，N 为负数时右移（等价于左移负数位）。
函数签名 1rotate :: [a] -&gt; Int -&gt; [a] 思路 旋转操作可以理解为切分后交换：
左移 n 位：drop n xs ++ take n xs 右移 n 位 = 左移 length xs - n 位 关键在于处理负数 N 和 N 超出列表长度的情况。先用 mod 把 N 归一化到 [0, length xs - 1] 范围。
实现 方法一：splitAt + 交换 1rotate :: [a] -&gt; Int -&gt; [a] 2rotate xs n = let (left, right) = splitAt (n \`mod\` length xs) xs 3 in right ++ left n mod length xs 把任意整数归一化到合法范围。然后用 splitAt 切分，交换前后两部分。
注意：length xs 对空列表会报错，需要单独处理。
方法二：安全处理空列表 1rotate :: [a] -&gt; Int -&gt; [a] 2rotate [] _ = [] 3rotate xs n = let k = n \`mod\` length xs 4 (left, right) = splitAt k xs 5 in right ++ left 先处理空列表 case，避免 length [] 导致除以零。
方法三：纯递归 1rotate :: [a] -&gt; Int -&gt; [a] 2rotate xs 0 = xs 3rotate [] _ = [] 4rotate (x:xs) n 5 | n &gt; 0 = rotate (xs ++ [x]) (n - 1) 6 | otherwise = rotate (last xs : init xs) (n + 1) 每次左移一位：把头部移到尾部，递归 n-1 次。直观但效率低（O(n × m)）。
理解 mod 的作用 Haskell 的 mod 对负数也返回非负结果：
13 \`mod\` 8 -- 3 2(-3) \`mod\` 8 -- 5 所以 n mod length xs 可以统一处理正负旋转：
1rotate &#34;abcdefgh&#34; 3 → k = 3 → &#34;defghabc&#34; (左移3) 2rotate &#34;abcdefgh&#34; (-2) → k = 6 → &#34;ghabcdef&#34; (右移2 = 左移6) 测试 1&gt;&gt;&gt; rotate &#34;abcdefgh&#34; 3 2&#34;defghabc&#34; 3 4&gt;&gt;&gt; rotate &#34;abcdefgh&#34; (-2) 5&#34;ghabcdef&#34; 6 7&gt;&gt;&gt; rotate [1,2,3,4,5] 0 8[1,2,3,4,5] 9 10&gt;&gt;&gt; rotate [1,2,3,4,5] 7 -- 7 mod 5 = 2 11[3,4,5,1,2] 12 13&gt;&gt;&gt; rotate [] 3 14[] 参考 官方文档 Haskell 99 题学习路线 ← P18 提取子列表 | P20 删除第 k 个元素 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p19.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p20.html":{title:"P20 - 删除第 k 个元素",tags:["Haskell","99题","列表"],content:`P20 - 删除第 k 个元素 Remove the K&rsquo;th element from a list
官方模块: Problems.P20 核心函数: removeAt
← P19 旋转列表 N 位 | P21 在指定位置插入元素 →
题目描述 删除列表中第 k 个元素（1-based indexing）。返回被删除的元素和剩余列表组成的元组。
函数签名 1removeAt :: Int -&gt; [a] -&gt; (a, [a]) 注意：k 是第一个参数，列表是第二个参数。
思路 用 splitAt 在 k-1 处切分：
前半部分：前 k-1 个元素 被删除元素：后半部分的第一个 后半部分剩余：除第一个外的剩余元素 实现 方法一：splitAt 1removeAt :: Int -&gt; [a] -&gt; (a, [a]) 2removeAt k xs = let (left, right) = splitAt (k - 1) xs 3 in (head right, left ++ tail right) splitAt (k-1) xs 在目标位置前切分。head right 是被删除的元素，left ++ tail right 是剩余列表。
注意：这个实现假设 k 在合法范围内。如果 k &gt; 列表长度，head right 会抛异常。
方法二：递归 1removeAt :: Int -&gt; [a] -&gt; (a, [a]) 2removeAt 1 (x:xs) = (x, xs) 3removeAt n (x:xs) = let (removed, rest) = removeAt (n - 1) xs 4 in (removed, x : rest) 模式匹配 1 (x:xs) 命中目标——删除 x，剩余 xs。否则递归前进。
方法三：带 Maybe 的安全版本（扩展） 官方签名不要求安全处理，但如果想避免异常：
1removeAtSafe :: Int -&gt; [a] -&gt; Maybe (a, [a]) 2removeAtSafe _ [] = Nothing 3removeAtSafe 1 (x:xs) = Just (x, xs) 4removeAtSafe n (x:xs) 5 | n &gt; 1 = (\\(r, rest) -&gt; (r, x : rest)) &lt;$&gt; removeAtSafe (n - 1) xs 6 | otherwise = Nothing 示例：用 removeAt 实现其他操作 removeAt 是列表操作的基础构建块：
1-- 删除第 k 个（只返回剩余列表） 2deleteAt k xs = snd (removeAt k xs) 3 4-- 提取第 k 个（只返回元素） 5extractAt k xs = fst (removeAt k xs) 测试 1&gt;&gt;&gt; removeAt 2 &#34;abcd&#34; 2(&#39;b&#39;, &#34;acd&#34;) 3 4&gt;&gt;&gt; removeAt 1 [10, 20, 30] 5(10, [20, 30]) 6 7&gt;&gt;&gt; removeAt 3 [1, 2, 3] 8(3, [1, 2]) 参考 官方文档 Haskell 99 题学习路线 ← P19 旋转列表 N 位 | P21 在指定位置插入元素 →
`,url:"https://hugo-dead-simple.netlify.com/program_language/haskell-99/p20.html"},"https://hugo-dead-simple.netlify.com/program_language/haskell-99/index.html":{title:"Haskell 99 题学习路线",tags:["Haskell","算法","练习"],content:`Ninety-Nine Haskell Problems 是 Haskell 社区经典的 99 道练习题，源自 Prolog 99 题的 Haskell 移植版。每个题目都有一个函数骨架，你只需要实现它，然后跑预置测试验证。
这套题的独特价值在于：难度梯度设计得好，从最基础的列表递归一路做到图同构、Huffman 编码、数独求解。把 LYAH 学到的语法点串成实战能力。
第一阶段：列表基础（P01-P10） 覆盖 LYAH：Ch1-5
题号 题目 核心语法 推荐 P01 取列表最后一个元素 递归基条件、Maybe ★ P02 取列表倒数第二个元素 多条件递归 ★ P03 取列表第 k 个元素 下标计数 ★ P04 求列表长度 尾递归、fold ★ P05 反转列表 递归 + ++ vs 尾递归优化 ★ P06 判断回文 ==、列表比较 ★ P07 展平嵌套列表 自定义 ADT、递归遍历 ★ P08 去除连续重复元素 Eq 约束、guard ★ P09 将连续重复元素打包成子列表 group 的手动实现 ★★ P10 游程编码 (run-length encoding) 结合 P09、tuple ★★ 阶段要点 P01-P06 是热身，闭着眼也要能写出来。P07 让你第一次接触自定义 data 类型（NestedList），为后面树和图打基础。P08-P10 是 group 的三种变体，理解它们对第 7 章 Data.List 模块的理解有质的提升。
第二阶段：编码与列表变换（P11-P20） 覆盖 LYAH：Ch4-7
题号 题目 核心语法 推荐 P11 改进的游程编码 自定义 data Encoding a，Single/Multiple ★ P12 解码游程编码 replicate、concatMap ★ P13 直接实现游程编码 不用中间子列表，边遍历边计数 ★★ P14 复制每个元素 concatMap、replicate ★ P15 每个元素重复 N 次 concatMap ★ P16 每隔 N 个删除一个元素 zip + 取模计数 ★★ P17 在 N 处切分列表 splitAt ★ P18 提取子列表 [i, k] take/drop 组合 ★★ P19 旋转列表 N 位 正负数旋转、splitAt ★★ P20 删除第 k 个元素，返回 (元素, 剩余列表) splitAt 组合 ★ 阶段要点 P11-P12 教你用自定义代数数据类型（Encoding）表达业务语义——这是 Haskell 最核心的思维方式。P16-P20 在练 take/drop/splitAt/zip 的标准组合套路，对刷题帮助直接。
第三阶段：组合与随机（P21-P28） 覆盖 LYAH：Ch5-7
题号 题目 核心语法 推荐 P21 在指定位置插入元素 splitAt ★ P22 生成整数范围 enumFromTo 或递归 ★ P23 从列表随机选 N 个元素 RandomGen、ST monad ★★★ P24 从 1..M 中随机选 N 个不同数 P23 的应用 ★★ P25 随机排列列表 Fisher-Yates 洗牌 ★★★ P26 生成所有 N 选 K 的组合 递归、list comprehension ★★★ P27 互斥分组 组合 + 回溯 ★★★ P28 按子列表长度排序 / 按出现频率排序 sortOn、group . sort、comparing ★★ 阶段要点 P26 是经典回溯题，用 list comprehension 写比 C++ 的 for 循环嵌套清爽太多。P23-P25 涉及随机性，Haskell 的纯函数随机数（State monad）跟命令式语言完全不同，这一关是思维转换节点。如果卡住，可以暂时跳过 P23-P25 先往后走，回来再看。
第四阶段：数论（P29-P45） 这个阶段跟 LYAH 关系不大，但跟数学底子关系很大。
题号 题目 核心语法 推荐 P29 斐波那契数列 递归、矩阵快速幂 ★ P30 矩阵快速幂求斐波那契 矩阵运算、性能优化 ★★ P31 判断素数 all、因数枚举 ★★ P32 最大公约数 欧几里得算法 ★ P33 互质判断 gcd 应用 ★ P34 欧拉函数 φ(n) 数学推导 ★★ P35 质因数分解 递归遍历 ★★ P36 质因数分解（含重数） group、map ★★ P37 欧拉乘积公式求 φ(n) 质因数分解 + 乘积 ★★ P38 高 totient 数 筛法思想 ★★★ P39 无限素数与区间素数 惰性素数流 ★★ P40 哥德巴赫猜想 素数组合 ★ P41 哥德巴赫数对列表 列表推导 ★ P42 模乘逆元 扩展欧几里得 ★★★ P43 高斯整数整除 共轭与范数 ★★★ P44 朴素判定高斯素数 因子枚举 ★★★ P45 二平方定理判定高斯素数 平方和定理 ★★★ 阶段要点 P39 的无限素数流在 Haskell 里有非常优雅的递归定义。它跟 C++ 中预先确定上界的 bitset 筛法不同，展示了惰性列表按需产生结果的优势。P43 开始的高斯整数部分适合对数论扩展感兴趣的读者。
第五阶段：逻辑与编码（P46-P53） 覆盖 LYAH：Ch7（模块）、Ch11（Functors/Applicative/Monoids）
题号 题目 核心语法 推荐 P46 逻辑表达式真值表 递归布尔运算 ★★ P47 通用逻辑门 电路模拟、组合逻辑 ★★★ P48 n 元布尔函数真值表 高阶函数、列表推导 ★★ P49 格雷码 递归构造、位运算 ★★ P50 霍夫曼编码 树构建、优先队列 ★★★ P51 纠错码 编码/解码算法 ★★★★ P52 合取范式 Formula ADT、递归转换 ★★★ P53 归结原理 自动定理证明 ★★★★ 阶段要点 P49 (格雷码) 和 P50 (霍夫曼编码) 是经典的编码/压缩算法，用 Haskell 的表达力写出来非常清爽。P52-P53 涉及命题逻辑和自动定理证明的初步知识，适合对形式逻辑感兴趣的读者。
第六阶段：二叉树（P54-P69） 覆盖 LYAH：Ch8（自定义类型）
题号 题目 核心语法 推荐 P54 二叉树定义 ADT Tree a ★ P55 构造完全平衡二叉树 递归构造 ★ P56 对称二叉树 镜像递归判断 ★★ P57 二叉搜索树（BST） 插入、构造 ★★ P58 对称且完全平衡的二叉树 组合条件 ★★★ P59 构造高度平衡二叉树 AVL 前身 ★★★ P60 给定节点数的高度平衡二叉树 搜索 + 构造 ★★★ P61 收集叶子节点与内部节点 递归遍历 ★★ P62 收集二叉树指定层的节点 层序遍历 ★★ P63 构造并判断完全二叉树 数组下标映射 ★★★ P64 二叉树布局：中序排列 中序遍历分配坐标 ★★★ P65 二叉树布局：层级等距 层间距恒定 ★★★ P66 二叉树布局：紧凑排列 宽度最小化 ★★★ P67 二叉树的字符串表示 序列化 / 反序列化 ★★ P68 二叉树的中序和前序序列 树重建 (经典面试题) ★★ P69 二叉树的点串表示 dotstring 编解码 ★★ 阶段要点 P58 把平衡树生成与对称判定直接组合，展示了小函数复用的表达力。P68 是经典的 &ldquo;已知前序和中序，重建二叉树&rdquo;，面试高频题。P64-P66 的布局问题则极好地训练了递归思考能力。
第七阶段：多路树（P70-P73） 覆盖 LYAH：Ch8（自定义类型）
题号 题目 核心语法 推荐 P70 从节点字符串构造树 字符串解析、递归 ★★ P71 树的内部路径长度 递归遍历、路径累加 ★★ P72 树的后序遍历 后序递归 ★★ P73 树的 S 表达式表示 括号表示法、递归序列化 ★★★ 阶段要点 多路树（Multiway Tree）是每个节点可以有任意多个子节点的树。P70 的字符串解析和 P73 的 S 表达式是实践中常见的序列化场景。
第八阶段：Monad（P74-P79） 覆盖 LYAH：Ch12-13（Monad）
题号 题目 核心语法 推荐 P74 不用 do 记法的 IO monad &gt;&gt;= / &gt;&gt;、纯函数式 IO ★★★ P75 Maybe monad 校验输入 Maybe 链式操作 ★★ P76 Either monad 返回错误原因 Either 错误处理 ★★ P77 List monad 枚举随机游走 非确定性计算 ★★ P78 Writer monad 统计 Collatz 步数 日志累积 ★★ P79 Monad Transformer 求值后缀表达式 状态、失败与日志 ★★★ 阶段要点 这一阶段是 Haskell 从 &ldquo;好用的函数式语言&rdquo; 到 &ldquo;理解其核心抽象&rdquo; 的跨越。P74 强制你不用 do 语法，直接操作 &gt;&gt;=，这是理解 IO 内部机制的必经之路。P77 的 List monad 是八皇后等回溯问题的语法糖基础。
第九阶段：图（P80-P89） 难度开始爬升，需要额外的数据结构知识。
题号 题目 核心语法 推荐 P80 图的表示转换 ADT 设计 ★★ P81 两点间所有路径 DFS、回溯 ★★★ P82 包含指定顶点的环 DFS + 路径记录 ★★★ P83 构造生成树 图搜索 ★★★ P84 构造最小生成树（Prim） 优先队列、贪心 ★★★ P85 图同构判断 组合搜索 ★★★★★ P86 图着色 贪心 + 回溯 ★★★ P87 深度优先遍历 状态标记、递归 ★★ P88 连通分量 DFS 遍历 ★★ P89 二分图判断 BFS 染色 ★★ 阶段要点 图的部分整体可以对大多数学习者放最后做，因为需要很多额外的数据结构知识。P85（图同构）是 NP-hard 问题，纯粹学术挑战，可以跳过。
第十阶段：综合难题（P90-P99） 难度最高，涵盖算法和工程实践。
题号 题目 核心语法 推荐 P90 n 皇后问题 list monad、回溯 ★★★ P91 骑士巡游 Warnsdorff 规则、回溯 ★★★ P92 优雅树标记 组合搜索 ★★★★ P93 算术谜题 运算符排列、求值 ★★★★ P94 正则图 图构造、同构检测 ★★★★ P95 英文数字单词 递归、映射 ★★ P96 语法检查 递归下降解析 ★★ P97 数独求解 约束传播 + 回溯 ★★★ P98 数织游戏（Nonograms） 行约束推理 ★★★★ P99 填字游戏 约束搜索、回溯 ★★★★ 阶段要点 P90（八皇后）和 P97（数独）是两种经典的回溯问题。用 Haskell 的 do-notation（list monad）可以不到 10 行写完八皇后，这大概是 Haskell 最令人震撼的表达力展示。P98-P99 是真正的大工程，需要良好的算法设计和模块化能力。
实操建议 环境搭建 1cabal install ninetynine 安装后得到 Problems.* 模块，每个模块里有 myLast、myButLast 这样的函数骨架。
学习节奏 刚学完 LYAH Ch1-5：做 P01-P10，边做边巩固递归和模式匹配 学到 LYAH Ch7：做 P11-P28，练习 take/drop/group 组合 学到 LYAH Ch8：做 P54-P69，树和自定义类型 学到 LYAH Ch12-13：做 P46-P53 + P74-P79，逻辑、编码和 Monad 想要挑战：P90 八皇后（掌握 list monad 后有惊喜）、P39 无限素数流（体验惰性求值） 哪些可以跳过 P23-P25（随机性）：涉及 RandomGen 和 State monad，初学者杀手 P43-P45（高斯整数扩展）：除非对数学感兴趣 P85（图同构）：NP-hard 问题，纯粹学术挑战 P98-P99（大型工程）：需要大量调试精力 总结 阶段 题号范围 对应 LYAH 核心收获 列表基础 P01-P10 Ch1-5 递归、模式匹配、Maybe 列表变换 P11-P20 Ch4-7 自定义类型、take/drop 组合 组合与随机 P21-P28 Ch5-7 回溯、惰性列表、State monad 数论 P29-P45 数学 惰性筛法、数论基础 逻辑与编码 P46-P53 Ch7 布尔逻辑、编码算法、定理证明 二叉树 P54-P69 Ch8 自定义 ADT、树遍历、布局 多路树 P70-P73 Ch8 多路树、序列化 Monad P74-P79 Ch12-13 monad 深入理解 图 P80-P89 进阶 图算法、DFS/BFS 综合 P90-P99 进阶 回溯、list monad、大工程 文件索引 本系列的所有题目文件均在当前目录下，以 pNN.md 命名：

Continue 就是答案——一个开源的 AI 编码助手，支持 VS Code 和 JetBrains。配合 DeepSeek V4 Flash，既能智能补全又能对话问答，完全免费（只需要付 API 费用，比 Copilot 便宜得多）。
安装 Continue VS Code 搜索安装 Continue 插件：
安装后在侧边栏会出现 Continue 图标。
获取 DeepSeek API Key 打开 platform.deepseek.com 注册并充值（最低几块钱就行） 在 API Keys 页面创建一个 Key deepseek-v4-flash 定价：输入 0.14 元/百万token，输出 0.28 元/百万token，日常写代码一个月几块钱。
配置 Continue Continue 的配置文件是 ~/.continue/config.yaml。
配置一：完整版（Chat 思考 + Autocomplete 不思考） Chat 保留思考模式获得更好回答，Autocomplete 关闭思考获得更快补全：
1name: Rust Dev Config 2version: 1.0.0 3schema: v1 4models: 5 - name: DeepSeek V4 Flash (Chat) 6 provider: deepseek 7 model: deepseek-v4-flash 8 apiKey: sk-your-api-key-here 9 contextLength: 1048576 10 roles: 11 - chat 12 13 - name: DeepSeek V4 Flash (Autocomplete) 14 provider: deepseek 15 model: deepseek-v4-flash 16 apiKey: sk-your-api-key-here 17 contextLength: 1048576 18 roles: 19 - autocomplete 20 requestOptions: 21 extraBodyProperties: 22 thinking: 23 type: disabled 配置二：简易版（Chat + Autocomplete 同一模型） 1name: Rust Dev Config 2version: 1.0.0 3schema: v1 4models: 5 - name: DeepSeek V4 Flash (Chat) 6 provider: deepseek 7 model: deepseek-v4-flash 8 apiKey: sk-your-api-key-here 9 contextLength: 1048576 10 roles: 11 - chat 12 - autocomplete 几个关键配置说明：
字段 说明 model: deepseek-v4-flash DeepSeek 最新 V4 快模型，性价比最高 contextLength: 1048576 1M token 上下文，等于 2^20 roles: [chat, autocomplete] 同时用于对话和补全 为什么补全要关掉思考？ 思考模式会让模型先「想」一会再输出，对对话质量有帮助，但对代码补全（你敲 let x = 它接 String::new()）不需要推理。关掉后延迟明显降低。
最简配置（仅对话） 如果补全暂时不可用，可以先只用对话功能：
1name: Rust Dev Config 2version: 1.0.0 3schema: v1 4models: 5 - name: DeepSeek V4 Flash (Chat) 6 provider: deepseek 7 model: deepseek-v4-flash 8 apiKey: sk-your-api-key-here 9 contextLength: 1048576 10 roles: 11 - chat 这个配置去掉补全部分，只保留对话。适合先用起来，后续再考虑补全。
使用方式 对话 按 Ctrl+I（或 Cmd+I）打开 Continue 对话窗口，问 Rust 相关问题：
「这段代码怎么改成迭代器写法？」 「解释一下所有权规则」 「帮我把这个 match 简化」 它可以读取当前打开的文件作为上下文，回答更有针对性。
Tab 补全 无需快捷键，敲代码时灰色补全会自动出现，按 Tab 接受：
1fn main() { 2 let mut v: Vec&lt;i32&gt; = Vec:: // Tab → new(); 3 v. // Tab → push(1); 补全对常见模式非常灵敏——let x = String:: 自动补 new()，match 自动补分支结构，vec! 自动补宏调用。
选中代码编辑 选中一段代码，按 Ctrl+I，输入「改成 for 循环」，Continue 会直接替换选中区域。
Continue vs Copilot Continue Copilot 价格 免费（自付 API 费） $10/月 模型 任意（DeepSeek、Claude、Ollama 等） 只能用 Copilot 模型 对话 支持 支持 离线 支持（接 Ollama） 不支持 开源 是 否 总结 Continue 是免费开源的 VS Code AI 插件 接 DeepSeek V4 Flash：chat 保留思考，autocomplete 关掉思考 配置只需一个 config.yaml，填上 API Key 就能用 比 Copilot 便宜、更灵活，还支持本地模型 `,url:"https://hugo-dead-simple.netlify.com/blog/continue-deepseek-rust-setup.html"},"https://hugo-dead-simple.netlify.com/books/index.html":{title:"Books",tags:[],content:"",url:"https://hugo-dead-simple.netlify.com/books/index.html"},"https://hugo-dead-simple.netlify.com/books/rust%E5%AE%98%E6%96%B9%E6%95%99%E7%A8%8B/index.html":{title:"Rust 官方教程",tags:[],content:` 资源 官方英文版：The Rust Programming Language 官方中文翻译：Rust 程序设计语言 - Rust 中文 Rust 标准库文档 Rust by Example (中文) Rustlings — 练习 环境 rustup (推荐) 1curl --proto &#39;=https&#39; --tlsv1.2 -sSf https://sh.rustup.rs | sh 安装完成后：

安装 1# 安装 rust-analyzer（推荐通过 rustup） 2rustup component add rust-analyzer VS Code 中搜索安装 rust-analyzer 扩展（rust-lang.rust-analyzer）。
必须配合 Cargo 项目使用 rust-analyzer 需要一个 Cargo.toml 来确定编译上下文。裸的 .rs 文件无法使用 LSP 功能。 解决办法：把代码放在 Cargo 项目的 src/bin/ 下，每个文件是一个独立的 binary target。
1cargo new practice 2cd practice 3mkdir src/bin 4# 写 src/bin/foo.rs，保存即享受 LSP 5cargo run --bin foo 常用快捷键（VS Code） 快捷键 功能 Ctrl+Shift+P → cargo check 快速检查编译错误 鼠标悬停 查看类型 F12 跳转到定义 Ctrl+. 代码建议 / 自动修复 AI 编码助手 推荐使用 Continue + DeepSeek V4 Flash 作为 Rust 开发中的 AI 辅助工具，提供智能代码补全和对话问答。详见：

,url:"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_18.html"},"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_19.html":{title:"第19章 并发 (Concurrency)",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_19.html"},"https://hugo-dead-simple.netlify.com/books/rust%E5%AE%98%E6%96%B9%E6%95%99%E7%A8%8B/chapter_19.html":{title:"第19章 高级特性 (Advanced Features)",tags:["读书笔记"],content:" 原文（英文） 原文（中文） ",url:"https://hugo-dead-simple.netlify.com/books/rust%E5%AE%98%E6%96%B9%E6%95%99%E7%A8%8B/chapter_19.html"},"https://hugo-dead-simple.netlify.com/books/rust%E5%AE%98%E6%96%B9%E6%95%99%E7%A8%8B/chapter_1.html":{title:"第1章 入门指南 (Getting Started)",tags:["读书笔记"],content:` 原文（英文） 原文（中文） 本章内容：安装 Rust、编写第一个程序、使用 Cargo 管理项目。
1.1 安装 Rust 通过 rustup 安装，这是 Rust 版本管理和工具链管理器。
1curl --proto &#39;=https&#39; --tlsv1.2 -sSf https://sh.rustup.rs | sh 安装后验证：
1rustc --version # 输出类似 rustc x.y.z (abcabcabc yyyy-mm-dd) 2cargo --version 额外依赖：Rust 需要一个 C 编译器来链接。Arch 用 pacman -S base-devel，Ubuntu 用 apt install build-essential，macOS 用 xcode-select --install。
常用管理命令：
1rustup update # 更新 Rust 2rustup self uninstall # 卸载 3rustup doc # 打开本地离线文档 稳定性保证 Rust 编译器保证向后兼容。本书所有能编译的示例，在新版本中依然能通过编译。
1.2 Hello, World! 创建项目 1mkdir ~/projects 2cd ~/projects 3mkdir hello_world 4cd hello_world 编写代码 文件名：main.rs
1fn main() { 2 println!(&#34;Hello, world!&#34;); 3} 编译与运行 1rustc main.rs # 编译：生成二进制文件 main（或 main.exe） 2./main # 运行：输出 Hello, world! Rust 是预编译语言（ahead-of-time compiled），编译后的二进制可以独立发给没有安装 Rust 的人运行，跟 C/C++ 一样。
程序剖析 fn main() {} — 声明 main 函数，每个可执行 Rust 程序的入口。 println! — 这是一个宏（macro），! 是宏的标志。普通的函数调用没有 !。 &quot;Hello, world!&quot; — 字符串字面量，传入 println! 后打印。 ; — 表示表达式结束。Rust 的大多数行以分号结尾。 缩进使用 4 个空格，不是 Tab。可以用 rustfmt 自动格式化。 装在不同平台 rustc 编译后生成平台相关的二进制。在 Linux 上生成 main，Windows 上生成 main.exe。Cargo 统一了命令，后面不再区分平台。
1.3 Hello, Cargo! Cargo 是 Rust 的构建系统和包管理器。绝大多数 Rust 项目都用 Cargo。
创建 Cargo 项目 1cargo new hello_cargo 2cd hello_cargo 生成的文件结构：
1hello_cargo/ 2├── Cargo.toml # 项目配置（包名、版本、依赖） 3├── src/ 4│ └── main.rs # 源代码 5└── .gitignore # Cargo 默认初始化 Git 仓库 Cargo.toml 内容：
1[package] 2name = &#34;hello_cargo&#34; 3version = &#34;0.1.0&#34; 4edition = &#34;2021&#34; # Rust 大版本号 5 6[dependencies] # 依赖项写在这里 edition 表示 Rust 的大版本（2015 / 2018 / 2021）。同一 edition 下 Rust 保证向后兼容。本书使用 2021 edition。
常用 Cargo 命令 命令 作用 cargo build 编译（debug 模式），输出在 target/debug/ cargo run 编译 + 运行 cargo check 仅检查能否编译，不生成二进制（比 build 快得多） cargo build --release 优化编译（release 模式），输出在 target/release/ 1cargo build # 首次 build，还会生成 Cargo.lock（记录实际依赖版本） 2cargo build # 再次 build，代码没改则直接跳过 3cargo run # 修改代码后，run 会自动重新编译再运行 4cargo check # 开发时建议多用 check，速度更快 5cargo build --release # 发布前用 release 模式，运行更快但编译更慢 Cargo 对比 rustc 简单项目用 rustc 和 cargo 区别不大，但项目变复杂（多文件、多 crate、外部依赖）后，Cargo 的价值就体现出来了。从一开始就习惯用 Cargo。
总结 Rust 通过 rustup 一站式安装管理。 rustc 编译 .rs 源文件生成独立二进制，Rust 是预编译语言。 println! 是宏，! 表示宏调用。 Cargo 是 Rust 事实标准构建工具，cargo new 创建项目，cargo build/run/check 管理构建。 Cargo.toml 是项目清单文件，Cargo.lock 锁定依赖版本。 `,url:"https://hugo-dead-simple.netlify.com/books/rust%E5%AE%98%E6%96%B9%E6%95%99%E7%A8%8B/chapter_1.html"},"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_1.html":{title:"第1章 系统程序员也能享受美好 (Why Rust?)",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_1.html"},"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_20.html":{title:"第20章 异步编程 (Asynchronous Programming)",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_20.html"},"https://hugo-dead-simple.netlify.com/books/rust%E5%AE%98%E6%96%B9%E6%95%99%E7%A8%8B/chapter_20.html":{title:"第20章 最后的项目：多线程Web服务器",tags:["读书笔记"],content:" 原文（英文） 原文（中文） ",url:"https://hugo-dead-simple.netlify.com/books/rust%E5%AE%98%E6%96%B9%E6%95%99%E7%A8%8B/chapter_20.html"},"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_21.html":{title:"第21章 宏 (Macros)",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_21.html"},"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_22.html":{title:"第22章 不安全代码 (Unsafe Code)",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_22.html"},"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_23.html":{title:"第23章 外部函数 (Foreign Functions)",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_23.html"},"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_2.html":{title:"第2章 Rust 导览 (A Tour of Rust)",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/rust%E7%A8%8B%E5%BA%8F%E8%AE%BE%E8%AE%A1/chapter_2.html"},"https://hugo-dead-simple.netlify.com/books/rust%E5%AE%98%E6%96%B9%E6%95%99%E7%A8%8B/chapter_2.html":{title:"第2章 猜数字游戏 (Guessing Game)",tags:["读书笔记"],content:` 原文（英文） 原文（中文） 本章通过一个完整的猜数字游戏项目，一次性介绍 Rust 的核心工作机制：let、match、use、外部 crate、类型转换、循环、错误处理等。不深入原理，重在直觉建立。
最终完整代码：
1use rand::Rng; 2use std::cmp::Ordering; 3use std::io; 4 5fn main() { 6 println!(&#34;Guess the number!&#34;); 7 8 let secret_number = rand::thread_rng().gen_range(1..101); 9 10 loop { 11 println!(&#34;Please input your guess.&#34;); 12 13 let mut guess = String::new(); 14 15 io::stdin() 16 .read_line(&amp;mut guess) 17 .expect(&#34;Failed to read line&#34;); 18 19 let guess: u32 = match guess.trim().parse() { 20 Ok(num) =&gt; num, 21 Err(_) =&gt; continue, 22 }; 23 24 println!(&#34;You guessed: {}&#34;, guess); 25 26 match guess.cmp(&amp;secret_number) { 27 Ordering::Less =&gt; println!(&#34;Too small!&#34;), 28 Ordering::Greater =&gt; println!(&#34;Too big!&#34;), 29 Ordering::Equal =&gt; { 30 println!(&#34;You win!&#34;); 31 break; 32 } 33 } 34 } 35} 2.1 项目初始化 1cargo new guessing_game 2cd guessing_game 2.2 读取用户输入 use 引入标准库 1use std::io; std::io 不在 Rust 的 prelude 中，需要显式 use。prelude 是 Rust 自动引入每个程序的一小部分标准库项。
可变变量 1let mut guess = String::new(); let — 创建变量，默认不可变（immutable）。 mut — 标记为可变。 String::new() — new 是 String 的关联函数（associated function），:: 表示它是类型的函数而非实例的方法。返回一个空的 String。 读入一行 1io::stdin() 2 .read_line(&amp;mut guess) 3 .expect(&#34;Failed to read line&#34;); stdin() 返回 Stdin 句柄。 read_line 追加用户输入到字符串，参数 &amp;mut guess 是可变引用（reference）。&amp; 表示引用，数据不被拷贝。引用默认也不可变，所以需 &amp;mut。 read_line 返回 io::Result 类型。 Result 与 expect Result 是枚举（enum），有两个变体（variant）：
Ok — 成功，内部包含成功值 Err — 失败，内部包含错误信息 .expect(msg) — 如果是 Ok，取出内部值；如果是 Err，程序崩溃并打印 msg。
不处理 Result 会编译警告 如果 Result 未被使用，Rust 编译器给出 unused Result that must be used 警告。Rust 强制你显式处理错误。
println! 占位符 1println!(&#34;You guessed: {}&#34;, guess); {} 是占位符，按顺序替换为后面的参数。等价于 format!(&quot;You guessed: {}&quot;, guess)。
2.3 生成随机数 添加外部 crate 编辑 Cargo.toml：
1[dependencies] 2rand = &#34;0.8.3&#34; 0.8.3 是语义化版本的简写，等价于 ^0.8.3（&gt;=0.8.3, &lt;0.9.0）。
cargo build 时 Cargo 会：
从 Crates.io 下载 rand 及其传递依赖 编译所有依赖 生成 Cargo.lock（锁定确切版本，保证可重现构建） Cargo.lock 第一次 build 时产生，锁定实际解析的依赖版本。之后所有 build 复用这个版本，除非手动 cargo update 或修改 Cargo.toml 版本号。
生成随机数 1use rand::Rng; 2 3let secret_number = rand::thread_rng().gen_range(1..101); rand::thread_rng() — 获取线程局部的随机数生成器，从 OS 获取 seed。 .gen_range(1..101) — 生成 [1, 101) 内的随机数（包含 1，不包含 101）。 1..=100 等价于 1..101，..= 包含终点。 use rand::Rng 是为了把 gen_range 等方法引入作用域（方法属于 Rng trait，不引入就不能用）。 2.4 比较数字 Ordering 枚举 1use std::cmp::Ordering; 2 3match guess.cmp(&amp;secret_number) { 4 Ordering::Less =&gt; println!(&#34;Too small!&#34;), 5 Ordering::Greater =&gt; println!(&#34;Too big!&#34;), 6 Ordering::Equal =&gt; println!(&#34;You win!&#34;), 7} .cmp(&amp;x) — 比较两个值，返回 Ordering::Less / Greater / Equal。 match — 逐个匹配分支的模式（pattern），匹配到第一个就执行对应的代码。必须穷举所有可能值（第 6 章详述）。 类型不匹配编译错误 第一次写出来会编译失败：
1error[E0308]: mismatched types 2expected reference \`&amp;String\` 3 found reference \`&amp;{integer}\` 原因：guess 是 String，secret_number 是整数（默认 i32）。Rust 不会隐式转换，必须手动做。
类型转换与变量遮蔽 1let guess: u32 = guess.trim().parse().expect(&#34;Please type a number!&#34;); 变量遮蔽（shadowing） — 用 let 重用同一变量名，旧值被新值遮蔽。常用于类型转换后复用变量名。 .trim() — 去除首尾空白（包括用户输入末尾的 \\n）。 .parse() — 解析字符串为数字。通过 let guess: u32 标注目标类型（冒号 : 后写类型名）。 .parse() 也返回 Result，非数字输入会导致 Err 进而崩溃。类型标注还帮助 Rust 推断 secret_number 也是 u32。 parse 返回 Result，此时用 expect 处理——输入非数字就崩溃。后面会改进。
2.5 循环 loop 1loop { 2 // ... 3} loop 创建无限循环，需要手动 break 或 ctrl-c。
猜中后退出 1Ordering::Equal =&gt; { 2 println!(&#34;You win!&#34;); 3 break; // 退出 loop 4}, break 退出当前（最内层）循环。猜中后程序结束。
用 match 代替 expect 处理无效输入 1let guess: u32 = match guess.trim().parse() { 2 Ok(num) =&gt; num, 3 Err(_) =&gt; continue, // 忽略错误，回到 loop 顶部请求新输入 4}; 将 expect 替换为 match，不再崩溃。 Ok(num) =&gt; num — 解析成功，把 u32 值绑定给 guess。 Err(_) =&gt; continue — _ 是通配符，匹配任意 Err 值（不管错误内容）。continue 跳到 loop 下一次迭代。 match 穷举性 match 必须覆盖所有可能的分支。Result 有 Ok 和 Err 两个变体，两个都要处理才不会编译报错。
总结：本章引入的 Rust 概念 概念 位置 说明 use use std::io 将标准库/外部 crate 的项引入作用域 let mut let mut guess 变量默认不可变，mut 使其可变 :: String::new() 关联函数（类型的函数），:: 前缀 &amp; / &amp;mut &amp;mut guess 引用，&amp;mut 是可变的引用（第4章详述） Result read_line 返回值 Ok/Err 枚举，强制错误处理 expect .expect(&quot;msg&quot;) Ok 时取值，Err 时崩溃 {} println!(&quot;{}&quot;, x) println! 中字符串插值占位符 外部 crate rand = &quot;0.8.3&quot; Cargo.toml 的 [dependencies] 声明依赖 match match guess.cmp(...) 模式匹配，按分支执行，覆盖必须穷举 类型标注 let guess: u32 冒号后写类型，也帮助类型推断 shadowing let guess = ... 同名 let 遮蔽旧变量，用于类型转换 loop / break / continue 循环控制 无限循环和退出/跳过 _ 通配符 Err(_) 在 match 中匹配任意值 关键心态 这一章是快速概览，不是深入讲解。每章只引入了概念的表层，后面章节会逐步展开原理。如果某个概念（如引用 &amp;、Result）让你困惑，很正常——继续学，第 4~10 章会一个个吃透。

3.1 变量与可变性 默认不可变 1let x = 5; 2x = 6; // 编译错误：cannot assign twice to immutable variable Rust 变量默认不可变（immutable）。设计理由：如果代码假设某个值不变却意外被修改，bug 很难追踪。编译器帮你杜绝这种情况。
mut 关键字 1let mut x = 5; // mut 标记为可变 2x = 6; // OK mut 也是一份文档信号——告诉读代码的人这个值会变。
常量 const 1const THREE_HOURS_IN_SECONDS: u32 = 60 * 60 * 3; 与 let 的区别：
let const 可变性 默认不可变，可加 mut 始终不可变 类型标注 可推断 必须标注 作用域 任意作用域 任意作用域，包括全局 值 运行时计算 只能是编译期常量表达式 命名 snake_case SCREAMING_SNAKE_CASE 遮蔽 shadowing 1let x = 5; 2let x = x + 1; // x = 6，遮蔽前一个 x 3 4{ 5 let x = x * 2; // x = 12，内部遮蔽 6 println!(&#34;{x}&#34;); // 12 7} 8println!(&#34;{x}&#34;); // 6 — 内部作用域结束，外层 x 恢复 关键点：重复 let 创建新变量并遮蔽同名旧变量。与 mut 的区别：
let 重新绑定不允许意外赋值（不用 mut 写 x = 6 会编译错误）。 可以变类型： 1let spaces = &#34; &#34;; // &amp;str 2let spaces = spaces.len(); // usize — 类型变了，OK 3 4let mut spaces = &#34; &#34;; 5spaces = spaces.len(); // 编译错误：不能改变 mut 变量的类型 3.2 数据类型 Rust 是静态类型语言，编译期必须知道所有变量的类型。编译器通常能推断，但多义时需要显式标注：
1let guess: u32 = &#34;42&#34;.parse().expect(&#34;Not a number&#34;); 2// ^^^^ 不写会编译错误：type annotations needed 标量类型 scalar 单个值。4 种基本标量：整型、浮点型、布尔型、字符。
整数 长度 有符号 无符号 8 i8 u8 16 i16 u16 32 i32 u32 64 i64 u64 128 i128 u128 arch isize usize 默认整数类型：i32 isize/usize 用于集合索引（64 位平台上即 64 位） 整数字面量：
进制 示例 十进制 98_222 十六进制 0xff 八进制 0o77 二进制 0b1111_0000 字节(u8) b'A' 整型溢出 debug 模式：溢出会 panic。release 模式：溢出会回绕（wrapping），u8 256→0，257→1。如需显式处理：wrapping_add、checked_add、overflowing_add、saturating_add。
浮点数 1let x = 2.0; // f64，默认 2let y: f32 = 3.0; // f32 IEEE-754 标准，f32 单精度，f64 双精度。默认 f64（速度相近但精度更高）。
布尔 1let t = true; 2let f: bool = false; 条件必须是 bool if number { ... } 非法。Rust 不会隐式转换非布尔值为布尔（不像 C/JS）。
字符 char 1let c = &#39;z&#39;; 2let z = &#39;ℤ&#39;; 3let cat = &#39;😻&#39;; 用单引号（' 而非 &quot;），4 字节，存 Unicode 标量值（不只是 ASCII）。
复合类型 compound 元组 tuple 1let tup: (i32, f64, u8) = (500, 6.4, 1); 固定长度，元素类型可以不同。两种访问方式：
1// 解构 2let (x, y, z) = tup; 3 4// 索引访问 5let five_hundred = tup.0; // 从 0 开始 6let one = tup.2; 单元类型 () — 空元组，零个元素。不返回值的表达式默认返回 ()。
数组 array 1let a = [1, 2, 3, 4, 5]; 2let a: [i32; 5] = [1, 2, 3, 4, 5]; // 类型+长度 3let a = [3; 5]; // [3, 3, 3, 3, 3] 固定长度，元素必须同类型。 存在栈上。元素数确定时用数组，否则用 Vec（第 8 章）。 1let first = a[0]; // 索引访问 越界检查 运行时越界会立刻 panic（不是返回垃圾值）。Rust 不允许无保护内存访问。
3.3 函数 命名约定：snake_case（全小写+下划线）。定义顺序无关，fn 定义即可。
1fn another_function(x: i32) { 2 println!(&#34;The value of x is: {}&#34;, x); 3} 每个参数必须标注类型（编译器借此推断，无需其他地方再写）。 无参数用空 ()。 语句 vs 表达式 语句 statement 表达式 expression 执行操作，无返回值 计算值 let y = 6; 5 + 6 → 11 fn 定义 函数调用 不能嵌套在赋值的右边 可以 1let x = (let y = 6); // 编译错误：let 是语句，不返回值 类似 C 中的 x = y = 6 在 Rust 不成立。
代码块 {} 是表达式：
1let y = { 2 let x = 3; 3 x + 1 // 注意：无分号！ 4}; 5// y = 4 结尾有分号 → 变成语句，返回 ()。
返回值 1fn five() -&gt; i32 { 2 5 // 无分号 = 表达式 = 返回值 3} 4 5fn plus_one(x: i32) -&gt; i32 { 6 x + 1 // 无分号 = 返回 x+1 7} 用 -&gt; type 声明返回类型。 隐式返回：函数体最后一个表达式的值。 显式返回：return value;（提前退出时使用）。 1fn plus_one(x: i32) -&gt; i32 { 2 x + 1; // 有分号！变成语句，返回 ()，与 -&gt; i32 不匹配 3} // 编译错误：mismatched types 分号决定一切 最后一行有 ; → 返回 ()。没 ; → 返回该表达式的值。这是初学者最容易搞混的地方。
3.4 注释 1// 单行注释 2 3// 多行注释 4// 每行都要写 // 5 6let x = 5; // 行尾注释也可以 文档注释 /// 和 //! 见第 14 章。
3.5 控制流 if 表达式 1if number &lt; 5 { 2 println!(&#34;condition was true&#34;); 3} else if number % 3 == 0 { 4 println!(&#34;divisible by 3&#34;); 5} else { 6 println!(&#34;condition was false&#34;); 7} 条件必须是 bool，不会隐式转换。 只执行第一个匹配分支，不 fall-through。 if 是表达式，可在 let 右边使用：
1let number = if condition { 5 } else { 6 }; 所有分支返回类型必须相同：
1let number = if condition { 5 } else { &#34;six&#34; }; 2// 编译错误：if and else have incompatible types 三种循环 循环 用途 loop 无限循环，手动 break while 条件满足时循环 for 遍历集合/区间（最常用） loop 1loop { 2 println!(&#34;again!&#34;); 3 // break; // 才能退出 4} 从 loop 返回值：
1let result = loop { 2 counter += 1; 3 if counter == 10 { 4 break counter * 2; // break 后跟值 = 返回给 result 5 } 6}; 7// result = 20 循环标签，用于嵌套循环：
1&#39;counting_up: loop { // 标签 2 loop { 3 break; // 退出内层循环 4 break &#39;counting_up; // 退出外层循环 5 } 6} while 1let mut number = 3; 2while number != 0 { 3 println!(&#34;{}!&#34;, number); 4 number -= 1; 5} 条件为 true 时执行循环体。
for（最推荐） 1let a = [10, 20, 30, 40, 50]; 2 3// 遍历数组 4for element in a { 5 println!(&#34;{element}&#34;); 6} 7 8// 遍历区间 9for number in (1..4).rev() { // 3, 2, 1 10 println!(&#34;{number}&#34;); 11} 优先用 for Ranges 1..4 — 含起点不含终点。1..=4 — 含两端。 rev() 反转区间。
for 是 Rust 中最常用的循环，没有索引边界错误，编译器也不需要插入运行时边界检查。用 while 遍历数组反而更危险且更慢。

ugo-dead-simple.netlify.com/english_learning/a-couple-of.html":{title:"a couple of 及类似数量表达",tags:["短语"],content:`a couple of 及类似数量表达 含义：几个、两三个——字面是&quot;一对&quot;，口语中泛指少量几个
You can just skip a couple of steps if the condition isn&rsquo;t satisfied. 条件不满足时你可以跳过几个步骤。
数量从小到大排列 表达 大致数量 语气 a / an 1 一个 a couple of 2-3 口语，少量 a few 3-5 几个，偏少 several 3-7 好几个，比 a few 多 a number of 若干 不确定，偏多 many / a lot of 很多 大量 例句对比 I have a couple of ideas. 我有两三个想法。（很少）
I have a few questions. 我有几个问题。（不多但有一些）

A number of bugs were found. 发现了若干 bug。（不少）
注意 a couple of 口语中经常不严格等于 2，泛指&quot;少量&quot; a couple 不带 of 时指&quot;一对情侣&quot;：They are a cute couple. couple 作动词 = 连接：The train cars are coupled together. `,url:"https://hugo-dead-simple.netlify.com/english_learning/a-couple-of.html"},"https://hugo-dead-simple.netlify.com/english_learning/as-it-is.html":{title:"as it is",tags:["短语"],content:`as it is 含义：照现状、事实上；按原样
结构：固定短语，可作状语或后置定语
拆解：
as — 如同、按照 it — 指代当前情况/事物 is — 存在、处于（当前状态） 两种用法：
1. 表示&quot;事实上、照现状&quot;（= in the current situation） 常用于句首或句中，引出与预期不同的现实情况。
As it is, we can&rsquo;t afford to buy a new car. 事实上，我们买不起新车。
I thought he would apologize, but as it is, he didn&rsquo;t even say sorry. 我以为他会道歉，但事实上他连对不起都没说。
2. 表示&quot;按原样、保持原样&quot;（= in its current state, unchanged） 常用于 leave / keep / take / accept 等动词后。
Just leave the room as it is. 就让房间保持原样吧。
We need to accept the code as it is and work from there. 我们需要按原样接受这段代码，然后在此基础上改进。
Take the sentence as it is — don&rsquo;t overthink the grammar. 原封不动地看这个句子——别过度分析语法。
Now we&rsquo;re going to make a function that multiplies a number by 2 but only if that number is smaller than or equal to 100 because numbers bigger than 100 are big enough as it is! 我们要写一个函数，把数乘以 2，但仅当该数小于等于 100 时才乘——因为大于 100 的数本身就已经够大了！
易混淆：
as it is — 照现状（强调当前事实） as if — 好像（虚拟语气，描述不真实的情况） as is — 按原样（更口语化，常见于商业/法律场景：&ldquo;sold as is&rdquo; = 按现状出售，不保修） 类似表达：
as things stand — 就目前情况而言 in fact / actually — 事实上（语气更直接） as it stands — 就目前来看（与用法 1 几乎等价） `,url:"https://hugo-dead-simple.netlify.com/english_learning/as-it-is.html"},"https://hugo-dead-simple.netlify.com/english_learning/could-have-done.html":{title:"could have done 及类似虚拟语气结构",tags:["语法"],content:`could have done 及类似虚拟语气结构 含义：本来可以……（但没做）——表示过去有能力/可能性做某事，但实际没有做
We could have also written that if statement in one line but I find this way more readable. 我们本来也可以把那个 if 语句写成一行，但我觉得这样更易读。
结构 情态动词 + have + 过去分词，用于谈论过去未发生的事。
结构 含义 例句 could have done 本来能做（但没做） I could have passed the exam, but I didn&rsquo;t study. would have done 本来会做（但没做） I would have helped, but you didn&rsquo;t ask. should have done 本来应该做（但没做） You should have told me earlier. might have done 本来可能做了 She might have left already. needn't have done 本来不必做（但做了） You needn&rsquo;t have bought so much food. 注意 口语中常缩写：could've、would've、should've、might've should have done 常带后悔/责备语气 needn't have done 比较特殊——事情做了，但事后发现没必要 `,url:"https://hugo-dead-simple.netlify.com/english_learning/could-have-done.html"},"https://hugo-dead-simple.netlify.com/english_learning/its-a-matter-of.html":{title:"It's a matter of...",tags:["句型"],content:`It&rsquo;s a matter of&hellip; 含义：只不过是……、就是……的问题——表示某事本质上是 / 取决于某方面
It&rsquo;s simply a matter of separating the first two elements with a comma and then specifying what the upper limit is. 这只不过就是用逗号分隔前两个元素，然后指定上限。
常见搭配 例句 含义 It&rsquo;s a matter of time. 只是时间问题。 It&rsquo;s a matter of life and death. 事关生死。 It&rsquo;s a matter of practice. 只是多练习的问题。 It&rsquo;s a matter of opinion. 见仁见智（各人看法不同）。 It&rsquo;s a matter of taste. 口味问题（各有所好）。 加强语气 可以在前面加 simply / just / merely，表示&quot;只不过就是&quot;，强调没有别的花头：
It&rsquo;s just a matter of time. 只是时间问题。
It&rsquo;s merely a matter of preference. 只是偏好问题。
It&rsquo;s simply a matter of practice. 无非就是多练习的问题。
It&rsquo;s simply a matter of changing a few lines of code. 只不过就是改几行代码的事。
It&rsquo;s just a matter of finding the right tool. 无非就是找到合适的工具。
simply vs simple 区别 simply 是副词，simple 是形容词，不能互换：
用法 含义 It&rsquo;s simply a matter&hellip; simply 修饰整句 这只不过是……的问题 It&rsquo;s a simple matter&hellip; simple 修饰名词 matter 这是个简单的问题 原文想表达&quot;只不过就是&quot;，所以用副词 simply。
simply 的位置 simply 表示&quot;只不过&quot;时，通常放句中（紧邻动词），放句末意思会变：
It&rsquo;s simply a matter of time. ← 只不过（强调语气） Explain it simply. ← 简单地（方式副词）
变体 a matter of + 名词 → 取决于、关乎 Success is a matter of persistence.（成功取决于坚持。） a matter of + 从句 → 就是……的问题 It&rsquo;s a matter of whether we have enough time.（就是时间够不够的问题。） `,url:"https://hugo-dead-simple.netlify.com/english_learning/its-a-matter-of.html"},"https://hugo-dead-simple.netlify.com/english_learning/right-as-intensifier.html":{title:"right 作强调词",tags:["词汇"],content:`right 作强调词 含义：正好、就在、立刻——用来加强后面词的语气，表示&quot;精确&quot;或&quot;立即&quot;
结构：right + 地点 / 时间 / 方向词
常见搭配 地点 Right here we introduced Haskell&rsquo;s if statement. 就在这里，我们引入了 Haskell 的 if 语句。
The answer was right there in the documentation. 答案就在那里，在文档里。
I&rsquo;ll be right behind you. 我就在你后面。
时间 I need this done right now. 我现在就要完成。
Right then, I knew something was wrong. 就在那时，我知道出问题了。
I&rsquo;ll be right back. 我马上回来。
方向 / 程度 Turn right around and go back. 直接掉头回去。
The bullet went right through the wall. 子弹径直穿过了墙。
It fell right off the table. 它直接从桌上掉了下来。
固定短语 Do it right away. 立刻做。
That&rsquo;s right. 没错。（表示同意）
Right on! 太对了！（表示赞同）
规律 right 加在介词、副词、地点词前面，作用是缩小范围、强调精确性：
不加 right 加 right 区别 here right here 这里 → 就在这里 now right now 现在 → 就现在 there right there 那里 → 就在那里 behind right behind 后面 → 紧跟在后面 through right through 穿过 → 径直穿过 `,url:"https://hugo-dead-simple.netlify.com/english_learning/right-as-intensifier.html"},"https://hugo-dead-simple.netlify.com/english_learning/inverted-conditionals.html":{title:"倒装条件句 Had/Were/Should",tags:["语法"],content:`倒装条件句 Had/Were/Should 含义：省略 if，把助动词提前——更正式的虚拟条件句写法
Had we omitted the parentheses, it would have added one only if x wasn&rsquo;t greater than 100. 如果我们省略了括号，它就只会在 x 不大于 100 时才加 1。
结构 省略 if，将 had / were / should 提到主语前面。
正常写法 倒装写法 类型 If I had known Had I known 第三条件句（过去虚拟） If she were here Were she here 第二条件句（现在虚拟） If he should call Should he call 第一条件句（将来可能） 例句 Had + 主语 + 过去分词（过去虚拟） Had I known the answer, I would have told you. 如果我当时知道答案，我就会告诉你。
Had they arrived earlier, they wouldn&rsquo;t have missed the train. 如果他们早到一点，就不会错过火车了。
Were + 主语（现在虚拟） Were she here, she would know what to do. 如果她在这里，她会知道该怎么做。
Were I you, I wouldn&rsquo;t do that. 如果我是你，我不会那样做。
Should + 主语 + 动词原形（将来可能） Should you need any help, please let me know. 如果你需要帮助，请告诉我。
Should it rain tomorrow, the match will be cancelled. 如果明天下雨，比赛将取消。
条件句分类：本质是真实程度，不是时间 第一、第二、第三条件句的核心区别不是时间，而是真实程度（可能 vs 不可能）：
类型 真实程度 时间 结构 零条件句 客观事实 任何时间 if + 现在, 现在 第一条件句 很可能发生 将来 if + 现在, will + 动词 第二条件句 不太可能/假设 现在或将来 if + 过去, would + 动词 第三条件句 不可能（已过去） 过去 if + 过去完成, would have + 过去分词 关键区别：
第一 vs 第二：不是时间不同，而是可能性不同
If it rains, I will stay home.（很可能下雨） If it rained, I would stay home.（不太可能下雨，假设而已） 第三条件句：一定是过去的、不可能改变的——因为事情已经发生了
If I had studied, I would have passed.（但实际没学，也没过） 本质：真实 → 虚拟 → 反事实，时间只是附带特征。
注意 倒装写法更正式，常见于书面语和学术文章 只有 had、were、should 可以倒装，其他情态动词不行 否定形式：Had I **not** known（not 留在主语后，不能缩写为 Hadn't I known） `,url:"https://hugo-dead-simple.netlify.com/english_learning/inverted-conditionals.html"},"https://hugo-dead-simple.netlify.com/tags/%E5%8F%A5%E5%9E%8B.html":{title:"句型",tags:[],content:"",url:"https://hugo-dead-simple.netlify.com/tags/%E5%8F%A5%E5%9E%8B.html"},"https://hugo-dead-simple.netlify.com/tags/%E7%9F%AD%E8%AF%AD.html":{title:"短语",tags:[],content:"",url:"https://hugo-dead-simple.netlify.com/tags/%E7%9F%AD%E8%AF%AD.html"},"https://hugo-dead-simple.netlify.com/tags/%E8%AF%8D%E6%B1%87.html":{title:"词汇",tags:[],content:"",url:"https://hugo-dead-simple.netlify.com/tags/%E8%AF%8D%E6%B1%87.html"},"https://hugo-dead-simple.netlify.com/english_learning/the-other-way-around.html":{title:"the other way around",tags:["短语"],content:`the other way around 含义：反过来、调转顺序
结构：固定副词短语，作状语修饰动词
拆解：
the other — 另一个（两种顺序的第二种） way — 方式、顺序 around — 调转方向 例句：
Functions in Haskell don&rsquo;t have to be in any particular order, so it doesn&rsquo;t matter if you define doubleMe first and then doubleUs or if you do it the other way around.
Haskell 函数不需要按特定顺序定义，所以你先定义 doubleMe 再 doubleUs，还是反过来做，都没关系。
类似表达：
the other way round — 英式英语同义 vice versa — 反之亦然（更正式） `,url:"https://hugo-dead-simple.netlify.com/english_learning/the-other-way-around.html"},"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_10.html":{title:"chapter 10 Functionally Solving Problems",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_10.html"},"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_11.html":{title:"chapter 11 Functors, Applicative Functors and Monoids",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_11.html"},"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_12.html":{title:"chapter 12 A Fistful of Monads",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_12.html"},"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_13.html":{title:"chapter 13 For a Few Monads More",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_13.html"},"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_14.html":{title:"chapter 14 Zippers",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_14.html"},"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_5.html":{title:"chapter 5 Recursion",tags:["读书笔记"],content:`一、 递归 (Recursion) 的核心思想 在 Haskell 中，根本没有循环（没有 for、while）。要实现重复操作，唯一的方式就是递归。
递归的核心模式就两步：
基线条件 (Base Case)：问题的最简形式，直接返回结果。 递归条件 (Recursive Case)：将问题缩小一步，然后调用自身处理缩小后的版本。 二、 经典递归示例 1. 最大值 maximum' 1maximum&#39; :: (Ord a) =&gt; [a] -&gt; a 2maximum&#39; [] = error &#34;maximum of empty list&#34; 3maximum&#39; [x] = x 4maximum&#39; (x:xs) 5 | x &gt; maxTail = x 6 | otherwise = maxTail 7 where maxTail = maximum&#39; xs 可以写成更简洁的形式：
1maximum&#39; :: (Ord a) =&gt; [a] -&gt; a 2maximum&#39; [] = error &#34;maximum of empty list&#34; 3maximum&#39; [x] = x 4maximum&#39; (x:xs) = max x (maximum&#39; xs) 执行过程：maximum' [2,5,1]：
1maximum&#39; [2,5,1] 2 → max 2 (maximum&#39; [5,1]) 3 → max 2 (max 5 (maximum&#39; [1])) 4 → max 2 (max 5 1) 5 → max 2 5 6 → 5 2. 复制 replicate' 1replicate&#39; :: Int -&gt; a -&gt; [a] 2replicate&#39; n x 3 | n &lt;= 0 = [] -- 基线：复制 0 次或负数次，返回空列表 4 | otherwise = x : replicate&#39; (n-1) x -- 递归：放一个元素，然后复制剩下的 3. 取前 n 个元素 take' 1take&#39; :: Int -&gt; [a] -&gt; [a] 2take&#39; n _ 3 | n &lt;= 0 = [] -- 基线 1：取 0 个元素，空列表 4take&#39; _ [] = [] -- 基线 2：空列表，取啥都是空 5take&#39; n (x:xs) = x : take&#39; (n-1) xs -- 递归：取一个，再取剩下的 注意：这里使用了 _ 来忽略不需要的参数，以及多个基数条件。
4. 反转 reverse' 1reverse&#39; :: [a] -&gt; [a] 2reverse&#39; [] = [] 3reverse&#39; (x:xs) = reverse&#39; xs ++ [x] 5. 无限递归 repeat' Haskell 支持无限列表，所以递归可以没有基线条件：
1repeat&#39; :: a -&gt; [a] 2repeat&#39; x = x : repeat&#39; x repeat' 3 会产生 3:3:3:3:... 永不停歇。单独调用它会无限循环，但配合 take 就能截取想要的长度：
1-- ghci&gt; take 5 (repeat&#39; 3) 2-- [3,3,3,3,3] 这与 replicate 5 3 等价。
6. 判断相等 zip' 1zip&#39; :: [a] -&gt; [b] -&gt; [(a, b)] 2zip&#39; _ [] = [] 3zip&#39; [] _ = [] 4zip&#39; (x:xs) (y:ys) = (x, y) : zip&#39; xs ys 关键是同时匹配两个列表的基线条件。
7. 元素是否在列表中 elem' 1elem&#39; :: (Eq a) =&gt; a -&gt; [a] -&gt; Bool 2elem&#39; a [] = False 3elem&#39; a (x:xs) 4 | a == x = True 5 | otherwise = a \`elem&#39;\` xs 8. 快速排序 (Quicksort) 这是 Haskell 用递归实现算法的经典例子——极其优雅：
1quicksort :: (Ord a) =&gt; [a] -&gt; [a] 2quicksort [] = [] 3quicksort (x:xs) = 4 let smallerSorted = quicksort [a | a &lt;- xs, a &lt;= x] 5 biggerSorted = quicksort [a | a &lt;- xs, a &gt; x] 6 in smallerSorted ++ [x] ++ biggerSorted 怎么理解？
基线条件：空列表已经排好序。 取第一个元素 x 作为 基准 (pivot)。 smallerSorted：所有 &lt;= x 的元素排序后的结果。 biggerSorted：所有 &gt; x 的元素排序后的结果。 结果就是：smallerSorted ++ [x] ++ biggerSorted。 测试一下：
1-- ghci&gt; quicksort [10, 2, 5, 3, 1, 6, 7, 4, 2, 8, 5] 2-- [1,2,2,3,4,5,5,6,7,8,10] 纯函数式 Quicksort 和命令式的区别：
特性 C/Java Haskell 排序方式 原地交换 (in-place) 产生新列表 内存 O(log n) 额外 O(n) 额外 代码行数 ~30 行 4 行 可读性 需要仔细跟踪指针 声明式，一目了然 三、 思考递归的方式 不要手动展开递归！
坏习惯：
1-- 不要这样想： 2-- quicksort [5,1,9,3] 3-- = quicksort [1,3] ++ [5] ++ quicksort [9] 4-- = (quicksort [] ++ [1] ++ quicksort [3]) ++ [5] ++ (quicksort [] ++ [9] ++ quicksort []) 5-- ... 好习惯：相信递归能正确处理子问题。你只需要：
定义最简单的情况（基线条件）。 把问题缩小一步。 假设递归调用已经正确处理了缩小后的子问题。 把当前这一小步和递归结果组合起来。 &ldquo;You take an empty list—that&rsquo;s the base case. Then you assume the function can sort any non-empty list&rsquo;s tail, and you just handle the head.&rdquo;
单位元 (Identity Element) 每种递归操作都有一个单位元——与该值运算不会改变结果：
操作 单位元 原因 阶乘 factorial n = n * factorial (n-1) 1 1 * x = x 求和 sum (x:xs) = x + sum xs 0 0 + x = x 反转 reverse (x:xs) = reverse xs ++ [x] [] [] ++ xs = xs Quicksort 边界 [] [] ++ xs = xs 在定义基线条件时，问问自己：最小情况返回什么值才不会破坏结果？
四、 总结 Haskell 用递归代替循环，这是函数式编程的核心思维方式。 模式匹配是定义递归的天然工具：用 [] 和 (x:xs) 来匹配列表。 列表的递归模式非常统一：处理头部，递归尾部。 Quicksort 是最能体现 Haskell 声明式编程优雅性的例子。 `,url:"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_5.html"},"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_6.html":{title:"chapter 6 Higher-order Functions",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_6.html"},"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_9.html":{title:"chapter 9 Input and Output",tags:["读书笔记"],content:"",url:"https://hugo-dead-simple.netlify.com/books/learn_you_haskell/chapter_9.html"},"https://hugo-dead-simple.netlify.com/books/%E7%BA%BF%E6%80%A7%E4%BB%A3%E6%95%B0%E5%8F%8A%E5%85%B6%E5%BA%94%E7%94%A8/1.10.html":{title:"1.10 线性模型",tags:["读书笔记"],content:`TODO
`,url:"https://hugo-dead-simple.netlify.com/books/%E7%BA%BF%E6%80%A7%E4%BB%A3%E6%95%B0%E5%8F%8A%E5%85%B6%E5%BA%94%E7%94%A8/1.10.html"},"https://hugo-dead-simple.netlify.com/books/%E7%BA%BF%E6%80%A7%E4%BB%A3%E6%95%B0%E5%8F%8A%E5%85%B6%E5%BA%94%E7%94%A8/1.3.html":{title:"1.3 向量方程",tags:["读书笔记"],content:`向量 Rn\\mathbb{R}^nRn 中的向量是一个 n×1n \\times 1n×1 的列矩阵：
v=[v1v2⋮vn],v1,…,vn∈R \\mathbf{v} = \\begin{bmatrix} v_1 \\\\ v_2 \\\\ \\vdots \\\\ v_n \\end{bmatrix}, \\quad v_1,\\dots,v_n \\in \\mathbb{R} v=​v1​v2​⋮vn​​​,v1​,…,vn​∈RR2\\mathbb{R}^2R2 可理解为平面上的点，R3\\mathbb{R}^3R3 为空间中的点。向量与几何点一一对应。
向量运算 加法（对应分量相加）、标量乘法（每个分量乘以同一个数）：
[1−2]+[25]=[33],2⋅[1−2]=[2−4] \\begin{bmatrix} 1 \\\\ -2 \\end{bmatrix} + \\begin{bmatrix} 2 \\\\ 5 \\end{bmatrix} = \\begin{bmatrix} 3 \\\\ 3 \\end{bmatrix}, \\qquad 2 \\cdot \\begin{bmatrix} 1 \\\\ -2 \\end{bmatrix} = \\begin{bmatrix} 2 \\\\ -4 \\end{bmatrix} [1−2​]+[25​]=[33​],2⋅[1−2​]=[2−4​]几何解释：加法 = 平行四边形法则；标量乘 = 沿直线方向拉伸/压缩。
向量的代数性质 对任意 u,v,w∈Rn\\mathbf{u}, \\mathbf{v}, \\mathbf{w} \\in \\mathbb{R}^nu,v,w∈Rn 和标量 c,d∈Rc,d \\in \\mathbb{R}c,d∈R：
性质 u+v=v+u\\mathbf{u} + \\mathbf{v} = \\mathbf{v} + \\mathbf{u}u+v=v+u 加法交换律 (u+v)+w=u+(v+w)(\\mathbf{u} + \\mathbf{v}) + \\mathbf{w} = \\mathbf{u} + (\\mathbf{v} + \\mathbf{w})(u+v)+w=u+(v+w) 加法结合律 u+0=u\\mathbf{u} + \\mathbf{0} = \\mathbf{u}u+0=u 零向量 u+(−u)=0\\mathbf{u} + (-\\mathbf{u}) = \\mathbf{0}u+(−u)=0 负向量 c(u+v)=cu+cvc(\\mathbf{u} + \\mathbf{v}) = c\\mathbf{u} + c\\mathbf{v}c(u+v)=cu+cv 标量分配律 (c+d)u=cu+du(c + d)\\mathbf{u} = c\\mathbf{u} + d\\mathbf{u}(c+d)u=cu+du 标量分配律 c(du)=(cd)uc(d\\mathbf{u}) = (cd)\\mathbf{u}c(du)=(cd)u 标量结合律 1u=u1\\mathbf{u} = \\mathbf{u}1u=u 乘法单位元 这些性质和&quot;数&quot;的运算完全一样，意味着在做向量运算时可以放心地&quot;像数一样算&quot;。
